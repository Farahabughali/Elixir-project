<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elixir | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
   <link rel="stylesheet" href="employee-dashboard.css">
</head>
<body>

<div class="dashboard-container">
    <div class="header">
        <div class="welcome">
            <h2><i class="fas fa-user-check"></i> مرحباً، <span id="empName">...</span></h2>
            <p><span id="empRole"></span> @ Elixir</p>
        </div>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل خروج</button>
    </div>

    <div class="tasks-grid">
        <!-- المهام الحالية -->
        <div class="task-card">
            <h3><i class="fas fa-spinner"></i> المهام الحالية</h3>
            <ul class="task-list" id="currentTasksList"></ul>
        </div>

        <!-- المهام السابقة (المكتملة) -->
        <div class="task-card">
            <h3><i class="fas fa-check-circle"></i> المهام السابقة / المنجزة</h3>
            <ul class="task-list" id="completedTasksList"></ul>
        </div>

        <!-- المهام الملغاة -->
        <div class="task-card">
            <h3><i class="fas fa-trash-alt"></i> المهام الملغاة</h3>
            <ul class="task-list" id="cancelledTasksList"></ul>
        </div>
    </div>

    <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
</div>

<script>
    let currentEmployee = null;
    let currentEmployeeEmail = null;

    function loadEmployeeData() {
        // 1️⃣ نجيب البريد الإلكتروني للموظف من localStorage
        currentEmployeeEmail = localStorage.getItem('elixir_employee_email');
        
        if (!currentEmployeeEmail) {
            window.location.href = 'employee-login.html';
            return;
        }
        
        // 2️⃣ نجيب بيانات الموظف باستخدام المفتاح الصحيح
        let empData = JSON.parse(localStorage.getItem(`elixir_employee_${currentEmployeeEmail}`));
        
        if (!empData || !empData.loggedIn) {
            window.location.href = 'employee-login.html';
            return;
        }

        // التأكد من وجود المصفوفات
        if (!empData.tasks) empData.tasks = [];
        if (!empData.completedTasks) empData.completedTasks = [];
        if (!empData.cancelledTasks) empData.cancelledTasks = [];
        
        currentEmployee = empData;
        
        document.getElementById('empName').innerText = empData.name;
        document.getElementById('empRole').innerText = empData.role;

        renderTasks();
        
        // 3️⃣ بدء مراقبة المهام الجديدة من الأدمن (كل 3 ثواني)
        startTaskSync();
    }

    function renderTasks() {
        // المهام الحالية (غير مكتملة)
        const currentList = document.getElementById('currentTasksList');
        const pendingTasks = (currentEmployee.tasks || []).filter(t => t.status !== 'completed');
        
        if (pendingTasks.length === 0) {
            currentList.innerHTML = '<li class="empty-msg">🎉 لا توجد مهام حالياً</li>';
        } else {
            currentList.innerHTML = pendingTasks.map(task => `
                <li>
                    <div style="flex:1">
                        <div class="task-text">${task.text || task.desc}</div>
                        <div class="task-date"><i class="far fa-calendar-alt"></i> استلمت: ${task.assignedAt || 'الآن'}</div>
                    </div>
                    <div class="actions">
                        <button class="complete-btn" onclick="completeTask(${task.id})"><i class="fas fa-check"></i> تم الإنجاز</button>
                        <button class="delete-btn" onclick="cancelTask(${task.id})"><i class="fas fa-times"></i> إلغاء</button>
                    </div>
                </li>
            `).join('');
        }

        // المهام المكتملة
        const completedList = document.getElementById('completedTasksList');
        const completedTasks = (currentEmployee.completedTasks || []).filter(t => t.status === 'completed');
        
        if (completedTasks.length === 0) {
            completedList.innerHTML = '<li class="empty-msg">📭 لا توجد مهام منجزة</li>';
        } else {
            completedList.innerHTML = completedTasks.map(task => `
                <li class="completed-task">
                    <div style="flex:1">
                        <div class="task-text">${task.text || task.desc}</div>
                        <div class="task-date"><i class="far fa-calendar-alt"></i> أنجزت: ${task.completedAt}</div>
                    </div>
                    <div class="actions">
                        <button class="delete-btn" onclick="permanentlyDeleteTask(${task.id}, 'completed')"><i class="fas fa-trash"></i> حذف</button>
                    </div>
                </li>
            `).join('');
        }

        // المهام الملغاة
        const cancelledList = document.getElementById('cancelledTasksList');
        const cancelledTasks = (currentEmployee.cancelledTasks || []).filter(t => t.status === 'cancelled');
        
        if (cancelledTasks.length === 0) {
            cancelledList.innerHTML = '<li class="empty-msg">🗑️ لا توجد مهام ملغاة</li>';
        } else {
            cancelledList.innerHTML = cancelledTasks.map(task => `
                <li>
                    <div style="flex:1">
                        <div class="task-text">${task.text || task.desc}</div>
                        <div class="task-date"><i class="far fa-calendar-alt"></i> ألغيت: ${task.cancelledAt}</div>
                    </div>
                    <div class="actions">
                        <button class="delete-btn" onclick="permanentlyDeleteTask(${task.id}, 'cancelled')"><i class="fas fa-trash"></i> حذف نهائي</button>
                    </div>
                </li>
            `).join('');
        }
    }

    function completeTask(taskId) {
        const task = (currentEmployee.tasks || []).find(t => t.id === taskId);
        if (task && task.status !== 'completed') {
            // نقل المهمة إلى completedTasks
            if (!currentEmployee.completedTasks) currentEmployee.completedTasks = [];
            currentEmployee.completedTasks.push({
                id: task.id,
                text: task.text || task.desc,
                type: task.type,
                productId: task.productId,
                amount: task.amount,
                status: 'completed',
                completedAt: new Date().toLocaleString('ar-EG')
            });
            // حذفها من المهام الحالية
            task.status = 'completed';
            currentEmployee.tasks = (currentEmployee.tasks || []).filter(t => t.id !== taskId);
            
            saveAndRender();
            showNotification('✅ تم إنجاز المهمة بنجاح!');
        }
    }

    function cancelTask(taskId) {
        const task = (currentEmployee.tasks || []).find(t => t.id === taskId);
        if (task) {
            if (!currentEmployee.cancelledTasks) currentEmployee.cancelledTasks = [];
            currentEmployee.cancelledTasks.push({
                id: task.id,
                text: task.text || task.desc,
                status: 'cancelled',
                cancelledAt: new Date().toLocaleString('ar-EG')
            });
            currentEmployee.tasks = (currentEmployee.tasks || []).filter(t => t.id !== taskId);
            
            saveAndRender();
            showNotification('🗑️ تم إلغاء المهمة');
        }
    }

    function permanentlyDeleteTask(taskId, from) {
        if (from === 'completed') {
            currentEmployee.completedTasks = (currentEmployee.completedTasks || []).filter(t => t.id !== taskId);
        } else if (from === 'cancelled') {
            currentEmployee.cancelledTasks = (currentEmployee.cancelledTasks || []).filter(t => t.id !== taskId);
        }
        saveAndRender();
        showNotification('🗑️ تم حذف المهمة نهائياً');
    }

    function saveAndRender() {
        localStorage.setItem(`elixir_employee_${currentEmployeeEmail}`, JSON.stringify(currentEmployee));
        renderTasks();
    }

    function logout() {
        if (currentEmployeeEmail) {
            const empData = JSON.parse(localStorage.getItem(`elixir_employee_${currentEmployeeEmail}`));
            if (empData) {
                empData.loggedIn = false;
                localStorage.setItem(`elixir_employee_${currentEmployeeEmail}`, JSON.stringify(empData));
            }
        }
        localStorage.removeItem('elixir_employee_email');
        window.location.href = 'employee-login.html';
    }

    // 4️⃣ مراقبة المهام الجديدة من الأدمن
    function startTaskSync() {
        setInterval(() => {
            const freshData = JSON.parse(localStorage.getItem(`elixir_employee_${currentEmployeeEmail}`));
            if (freshData) {
                const oldTaskIds = (currentEmployee.tasks || []).map(t => t.id);
                const newTasks = (freshData.tasks || []).filter(t => !oldTaskIds.includes(t.id));
                
                if (newTasks.length > 0) {
                    currentEmployee = freshData;
                    renderTasks();
                    showNotification(`📋 لديك ${newTasks.length} مهمة جديدة!`);
                } else {
                    currentEmployee = freshData;
                    renderTasks();
                }
            }
        }, 3000);
    }

    function showNotification(message) {
        let toast = document.getElementById('customToast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'customToast';
            toast.style.cssText = 'position:fixed; bottom:20px; left:20px; background:#438e56; color:white; padding:12px 20px; border-radius:30px; z-index:9999; display:none; align-items:center; gap:8px; font-weight:bold; box-shadow:0 5px 15px rgba(0,0,0,0.2);';
            toast.innerHTML = '<i class="fas fa-bell"></i> <span id="toastText"></span>';
            document.body.appendChild(toast);
        }
        const toastText = document.getElementById('toastText');
        toastText.innerText = message;
        toast.style.display = 'flex';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    loadEmployeeData();
</script>

</body>
</html>

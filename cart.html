<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elixir | سلة التسوق</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="cart.css">
</head>
<body>
<div class="page-header" style="text-align:center; margin-bottom:2rem;">

<h1 style="color:#2c5f2d; background:rgba(255,255,255,0.6); display:inline-block; padding:0.5rem 2rem; border-radius:50px;">
                     سلّتي
                </h1>
</div> 
<div class="cart-container">
    <div id="cartContent">

    </div>
</div>

<script>
    function renderCart() {
        let cart = JSON.parse(localStorage.getItem('elixir_cart') || '[]');
        const container = document.getElementById('cartContent');

        if (cart.length === 0) {
            container.innerHTML = `
                <div class="empty-cart">
                    <div class="empty-icon">
                        <i class="fas fa-shopping-cart"></i>
                    </div>
                    <h1>سلتك فارغة</h1>
                    <p class="empty-message">لا يوجد أي منتجات في سلة تسوقك<br>أضف منتجاتك لبدء الطلب</p>
                    <a href="index.html" class="shop-btn">
                        <i class="fas fa-arrow-left"></i> ابدأ التسوق
                    </a>
                </div>
            `;
            return;
        }

        let html = `<div class="cart-grid">`;
        let total = 0;
        cart.forEach((item, index) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            html += `
                <div class="cart-item">
                    <img class="cart-item-img" src="${item.img}" alt="${item.name}" onerror="this.src='asset/images/placeholder.png'">
                    <div class="cart-item-info">
                        <div class="cart-item-title">${item.name}</div>
                        <div class="cart-item-price">${item.price} ₪</div>
                        <div class="quantity-control">
                            <button class="qty-btn minus-btn" data-index="${index}">-</button>
                            <span>${item.quantity}</span>
                            <button class="qty-btn plus-btn" data-index="${index}">+</button>
                        </div>
                        <button class="remove-btn" data-index="${index}"> إزالة</button>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        html += `
            <div class="cart-summary">
                <h3>إجمالي السلة</h3>
                <div class="total-price">${total} ₪</div>
                <button class="checkout-btn" onclick="window.location.href='checkout.html'">إتمام الشراء</button>
            </div>
            <div class="back-link">
                <a href="index.html"><i class="fas fa-arrow-right"></i> العودة إلى الرئيسية</a>
            </div>
        `;
        container.innerHTML = html;

        // ربط الأحداث
        document.querySelectorAll('.minus-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                let idx = parseInt(btn.dataset.index);
                let cart = JSON.parse(localStorage.getItem('elixir_cart')) || [];
                if (cart[idx].quantity > 1) cart[idx].quantity--;
                else cart.splice(idx, 1);
                localStorage.setItem('elixir_cart', JSON.stringify(cart));
                renderCart();
            });
        });
        document.querySelectorAll('.plus-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                let idx = parseInt(btn.dataset.index);
                let cart = JSON.parse(localStorage.getItem('elixir_cart')) || [];
                cart[idx].quantity++;
                localStorage.setItem('elixir_cart', JSON.stringify(cart));
                renderCart();
            });
        });
        document.querySelectorAll('.remove-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                let idx = parseInt(btn.dataset.index);
                let cart = JSON.parse(localStorage.getItem('elixir_cart')) || [];
                cart.splice(idx, 1);
                localStorage.setItem('elixir_cart', JSON.stringify(cart));
                renderCart();
            });
        });
    }

    renderCart();
</script>

</body>
</html>

    let currentQuantity = 1;

    // الحصول على id البكج من الرابط
    const urlParams = new URLSearchParams(window.location.search);
    const packageId = parseInt(urlParams.get('id'));

    // عرض تفاصيل البكج
    function renderPackageDetails() {
        const pkg = packagesData[packageId];
        if (!pkg) {
            document.getElementById('packageContent').innerHTML = '<div style="text-align:center; padding:50px;"><i class="fas fa-exclamation-triangle"></i> عذراً، هذا البكج غير موجود</div>';
            return;
        }
       
        const oldPriceHtml = pkg.oldPrice ? `<span class="old-price">${pkg.oldPrice} ₪</span>` : '';
        
        const html = `
            <div class="product-main">
                <div class="product-gallery">
                    <img class="main-img" src="${pkg.img}" alt="${pkg.name}" onerror="this.src='asset/images/placeholder.png'">
                </div>
                <div class="product-info">
                    <h1 class="product-title">${pkg.name}</h1>
                    <p class="short-desc">${pkg.shortDesc}</p>
                    <div class="price-row">
                        ${oldPriceHtml}
                        <span class="new-price">${pkg.price} ₪</span>
                    </div>
                    <div class="quantity-control">
                        <button class="qty-btn" id="decreaseQty">-</button>
                        <span class="qty-value" id="qtyValue">1</span>
                        <button class="qty-btn" id="increaseQty">+</button>
                    </div>
                    <button class="add-to-cart-btn" id="addToCartBtn"> إضافة إلى السلة</button>
                    <a href="checkout.html" class="checkout-btn" style="text-decoration: none;"> إتمام الشراء</a>
                    <div class="share-buttons">
                        <button class="share-btn" id="shareWhatsapp" onclick="window.location.href='https://wa.me/970598288142?text=السلام عليكم ورحة الله وبركاته، أريد السؤال عن المزيد من التفاصيل عن هذه المجموعة    ${pkg.name} - السعر: ${pkg.price} ₪'"><i class="fab fa-whatsapp"></i> واتساب/ تواصل معنا لمزيد من التفاصيل</button>
                        <button class="share-btn" id="copyLinkBtn"><i class="fas fa-link"></i> نسخ الرابط</button>
                    </div>
                </div>
            </div>
            <div class="details-section">
                <div class="detail-card">
                    <h3> الفوائد</h3>
                    <ul>
                        ${pkg.benefits.map(b => `<li>${b}</li>`).join('')}
                    </ul>
                </div>
                <div class="detail-card">
                    <h3><i class="fas fa-hand-sparkles"></i> طريقة الاستخدام</h3>
                    <p>${pkg.howToUse}</p>
                </div>
                <div class="detail-card warning">
                    <h3><i class="fas fa-exclamation-triangle"></i> التحذيرات</h3>
                    <p>${pkg.warnings}</p>
                </div>
                <div class="detail-card source">
    <h3><i class="fas fa-book-open"></i> المصدر</h3>
    <p><a href="https://www.webteb.com/" target="_blank" rel="noopener noreferrer">🌐 ويب طب - Webteb</a></p>
</div>
            </div>
        `;
        
        document.getElementById('packageContent').innerHTML = html;

        // ربط أحداث الكمية
        document.getElementById('decreaseQty').addEventListener('click', () => {
            if (currentQuantity > 1) currentQuantity--;
            document.getElementById('qtyValue').innerText = currentQuantity;
        });
        document.getElementById('increaseQty').addEventListener('click', () => {
            currentQuantity++;
            document.getElementById('qtyValue').innerText = currentQuantity;
        });

        // إضافة إلى السلة
        document.getElementById('addToCartBtn').addEventListener('click', () => {
            addToCart(pkg.id, pkg.name, pkg.price, pkg.img, currentQuantity);
        });

       

        // نسخ الرابط
        document.getElementById('copyLinkBtn').addEventListener('click', () => {
            navigator.clipboard.writeText(window.location.href);
            showToast('✅ تم نسخ الرابط بنجاح ');
        });
    }

    function addToCart(id, name, price, img, quantity) {
        let cart = JSON.parse(localStorage.getItem('elixir_cart') || '[]');
        const existing = cart.find(item => item.id === id);
        if (existing) {
            existing.quantity += quantity;
        } else {
            cart.push({ id, name, price, img, quantity: quantity });
        }
        localStorage.setItem('elixir_cart', JSON.stringify(cart));
        updateCartBadge();
        showToast(`✅ تمت إضافة ${name} بنجاح`);
    }

    function updateCartBadge() {
        const cart = JSON.parse(localStorage.getItem('elixir_cart') || '[]');
        const total = cart.reduce((sum, i) => sum + i.quantity, 0);
        const badge = document.querySelector('.cart-count');
        if (badge) badge.innerText = total;
    }

    function showToast(message) {
        const toast = document.getElementById('customToast');
        const toastText = document.getElementById('toastText');
        toastText.innerText = message;
        toast.style.display = 'flex';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    // ========== قلوب متطايرة للمفضلة (اختياري) ==========
    function burstHearts(x, y) {
        for (let i = 0; i < 12; i++) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.classList.add('heart-particle');
            const offsetX = (Math.random() - 0.5) * 60;
            const offsetY = (Math.random() - 0.5) * 50;
            heart.style.left = (x + offsetX) + 'px';
            heart.style.top = (y + offsetY) + 'px';
            heart.style.animationDelay = (Math.random() * 0.2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }
    }


    

    updateCartBadge();
    renderPackageDetails();
    addFavoriteIcon();
</script>

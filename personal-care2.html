<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elixir | منتجات العناية الشخصية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="personal-care.css">
    <style>
        .discount-modal-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            z-index: 10000; display: flex; align-items: center; justify-content: center;
        }
        .discount-modal { background: white; border-radius: 28px; padding: 30px; width: 350px; text-align: center; }
        .discount-modal h3 { font-size: 1.3rem; color: #1a2e21; }
        .discount-modal input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 12px; }
        .discount-modal button { background: #d696a8; color: white; border: none; padding: 10px 25px; border-radius: 40px; cursor: pointer; margin: 5px; }
        .discount-modal .cancel-btn { background: #ccc; color: #333; }
        .custom-toast { position: fixed; bottom: 30px; right: 30px; background: #2c5f2d; color: white; padding: 12px 24px; border-radius: 50px; display: flex; align-items: center; gap: 10px; animation: slideIn 0.3s ease; z-index: 9999; }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="main-header">
        <div class="header-right">
            <a href="index2.html" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
                <div class="logo-circle"><img src="asset/images/logo.png" alt="Logo"></div>
                <span class="web-name">Elixir</span>
            </a>
            <a href="personal-care2.html" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
                <span class="page-title-in-header">العناية الشخصية & الورد</span>
            </a>
        </div>
        <div class="header-left">
            <span class="help-text">🌸 هل تحتاجين مساعدة في اختيار منتج العناية المناسب؟</span>
            <a href="chatbot.html" class="ai-consult-link"><i class="fas fa-robot"></i> استشر الذكاء الاصطناعي</a>
        </div>
    </div>
</header>

<div class="container">
    <div class="filter-bar">
        <span class="filter-label"> تصفية المنتجات:</span>
        <select id="filterSelect" class="filter-select">
            <option value="all">الكل</option>
            <option value="تونر">تونر منعش</option>
            <option value="صابون">صابون طبيعي</option>
            <option value="مقشر">مقشرات طبيعية</option>
            <option value="مرطب">مرطبات وكريمات</option>
            <option value="أخرى">أخرى</option>
        </select>
        <button id="resetFilter" class="reset-filter"> إعادة ضبط</button>
    </div>
    <div class="products-grid" id="careGrid"></div>
    <div class="back-home"><a href="index2.html"><i class="fas fa-arrow-right"></i> العودة إلى الرئيسية</a></div>
</div>

<div id="customToast" class="toast-message"><i class="fas fa-check-circle"></i><span id="toastText"></span></div>
<button id="scrollTopBtn" class="scroll-top-btn"><i class="fas fa-arrow-up"></i></button>

<link rel="stylesheet" href="floating-cart.css">
<script src="floating-cart.js"></script>

<script>
    let currentProductForDiscount = null;

    function showNiceToast(message, type = 'success') {
        const oldToast = document.querySelector('.custom-toast');
        if (oldToast) oldToast.remove();
        const toast = document.createElement('div');
        toast.className = 'custom-toast';
        const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
        toast.innerHTML = `<i class="fas ${icon}"></i><span>${message}</span>`;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(100px)';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    // ====== البيانات الثابتة للعناية الشخصية ======
    const defaultCareData = [
        { id: 1, name: "تونر ماء الورد وإكليل الجبل", category: "تونر", desc: "تونر منعش ومنقي للبشرة، يجمع بين فوائد ماء الورد المهدئة وزيت إكليل الجبل المنشط", price: 28, img: "asset/images/toner-rosemary-rose.jpg" },
        { id: 2, name: "تونر النعناع والشاي الأخضر", category: "تونر", desc: "تونر منعش للبشرة الدهنية والمختلطة، يقلل من إفراز الزيوت", price: 22, img: "asset/images/toner-mint.jpg" },
        { id: 3, name: "تونر البابونج", category: "تونر", desc: "تونر مهدئ ولطيف للبشرة الحساسة، يساعد في تهدئة الالتهابات", price: 24, img: "asset/images/chamomiletoner.png" },
        { id: 4, name: "صابون زيت الزيتون الطبيعي", category: "صابون", desc: "صابون طبيعي مصنوع من زيت الزيتون البكر، يتميز بخصائصه المرطبة", price: 18, img: "asset/images/olive-soap.jpg" },
        { id: 5, name: "صابونة الفحم النشط", category: "صابون", desc: "صابونة تحتوي على فحم نشط بخصائص امتصاص عالية", price: 22, img: "asset/images/charcoal-soap.jpg" },
        { id: 6, name: "صابون العسل الطبيعي", category: "صابон", desc: "صابون طبيعي مصنوع من العسل، غني بمضادات الأكسدة", price: 20, img: "asset/images/honey-soap.jpg" },
        { id: 7, name: "زبدة الشيا", category: "مرطب", desc: "مادة طبيعية مستخرجة من شجرة الشيا، لترطيب البشرة", price: 30, img: "asset/images/shea-butter.jpg" },
        { id: 8, name: "كريم الورد المركز", category: "مرطب", desc: "كريم منعش يحتوي على 70% ماء ورد طبيعي", price: 28, img: "asset/images/rose-cream.jpg" },
        { id: 9, name: "ماء الورد المقطر الطبيعي", category: "أخرى", desc: "ماء عطري طبيعي مستخلص من تقطير بتلات الورد", price: 15, img: "asset/images/rose-water.jpg" },
        { id: 10, name: "الليفة المغربية الأصلية", category: "أخرى", desc: "ليفة فاخرة للتقشير العميق", price: 25, img: "asset/images/moroccan-loofah.png" }
    ];

    // جلب جميع المنتجات (من localStorage + الافتراضية)
    function getAllCare() {
        const storedProducts = JSON.parse(localStorage.getItem('elixir_products') || '[]');
        const adminCare = storedProducts.filter(p => p.category === 'منتجات عناية' && p.active !== false);
        
        const defaultCare = defaultCareData.map(item => ({
            id: item.id,
            name: item.name,
            category: item.category,
            desc: item.desc,
            price: item.price,
            img: item.img,
            usage: item.desc,
            active: true
        }));
        
        const allCare = [...defaultCare];
        
        adminCare.forEach(adminItem => {
            const exists = allCare.some(c => c.name === adminItem.name);
            if (!exists) {
                let productCategory = adminItem.subCategory || adminItem.category;
                if (productCategory === "منتجات عناية") productCategory = "أخرى";
                allCare.push({
                    id: adminItem.id,
                    name: adminItem.name,
                    category: productCategory,
                    desc: adminItem.desc || adminItem.usage || "منتج عناية طبيعي 100%",
                    price: adminItem.price,
                    img: adminItem.image || "asset/images/placeholder.png",
                    usage: adminItem.usage || adminItem.desc,
                    active: adminItem.active
                });
            } else {
                const existingIndex = allCare.findIndex(c => c.name === adminItem.name);
                if (existingIndex !== -1) {
                    allCare[existingIndex] = {
                        ...allCare[existingIndex],
                        price: adminItem.price,
                        desc: adminItem.desc || adminItem.usage || allCare[existingIndex].desc,
                        img: adminItem.image || allCare[existingIndex].img
                    };
                }
            }
        });
        
        return allCare;
    }

    function renderProducts() {
        const grid = document.getElementById("careGrid");
        const filterVal = document.getElementById('filterSelect').value;
        let careData = getAllCare();
        let filtered = filterVal === 'all' ? careData : careData.filter(c => c.category === filterVal);
        
        const offers = JSON.parse(localStorage.getItem('elixir_offers')) || [];
        const favorites = JSON.parse(localStorage.getItem('elixir_favorites')) || '[]';
        
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="no-results">لا توجد منتجات</div>';
            return;
        }
        
        grid.innerHTML = filtered.map(item => {
            let catText = "";
            switch(item.category) {
                case "تونر": catText = "تونر منعش"; break;
                case "صابون": catText = "صابون طبيعي"; break;
                case "مقشر": catText = "مقشر طبيعي"; break;
                case "مرطب": catText = "مرطب وكريم"; break;
                default: catText = "عناية شخصية";
            }
            const description = item.desc || item.usage || "منتج طبيعي فاخر";
            const offer = offers.find(o => o.productId === item.id && o.section === "care");
            const displayPrice = offer ? offer.newPrice : item.price;
            const hasOffer = !!offer;
            const isFav = favorites.includes(item.id);
            
            return `
                <div class="care-card" data-id="${item.id}" style="position:relative;">
                    <div class="fav-icon ${isFav ? 'active' : ''}" data-id="${item.id}">
                        <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart"></i>
                    </div>
                    ${hasOffer ? `<span class="offer-badge-small" style="position:absolute; top:12px; left:12px; background:#e74c3c; color:white; padding:3px 8px; border-radius:20px;">-${offer.discount}%</span>` : ''}
                    <img class="care-img" src="${item.img}" onerror="this.src='asset/images/placeholder.png'">
                    <div class="care-info">
                        <div class="care-cat">${catText}</div>
                        <div class="care-title">${item.name}</div>
                        <div class="care-desc">${description}</div>
                        <div class="price-row">
                            <span class="price">${displayPrice} ₪</span>
                            <div class="btn-group">
                                <button class="view-details" data-id="${item.id}" data-name="${item.name}"> عرض التفاصيل</button>
                                <button class="add-cart" data-id="${item.id}" data-name="${item.name}" data-price="${displayPrice}" data-img="${item.img}"> إضافة إلى السلة</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        addAdminButtons();
    }

    function addAdminButtons() {
        document.querySelectorAll('.care-card').forEach(card => {
            if (!card.querySelector('.admin-product-btn')) {
                const btn = document.createElement('div');
                btn.className = 'admin-product-btn';
                btn.innerHTML = '<i class="fas fa-plus"></i>';
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const addCartBtn = card.querySelector('.add-cart');
                    const productId = addCartBtn ? parseInt(addCartBtn.dataset.id) : null;
                    if (productId) showAdminDropdown(productId, btn);
                };
                card.appendChild(btn);
            }
        });
    }

    function showAdminDropdown(productId, btnElement) {
        document.querySelectorAll('.admin-dropdown').forEach(d => d.classList.remove('show'));
        let dropdown = btnElement.parentElement.querySelector('.admin-dropdown');
        if (!dropdown) {
            dropdown = document.createElement('div');
            dropdown.className = 'admin-dropdown';
            dropdown.innerHTML = `
                <a href="#" onclick="addToNewArrivals(${productId}); return false;">
                    <i class="fas fa-star"></i> إضافة إلى جديدنا
                </a>
                <a href="#" onclick="openDiscountModal(${productId}); return false;">
                    <i class="fas fa-percent"></i> إضافة إلى العروض
                </a>
            `;
            btnElement.parentElement.appendChild(dropdown);
        }
        dropdown.classList.toggle('show');
        setTimeout(() => {
            document.addEventListener('click', function closeDropdown(e) {
                if (!dropdown.contains(e.target) && !btnElement.contains(e.target)) {
                    dropdown.classList.remove('show');
                    document.removeEventListener('click', closeDropdown);
                }
            });
        }, 10);
    }

    window.addToNewArrivals = function(productId) {
        let product = defaultCareData.find(p => p.id === productId);
        if (!product) {
            const storedProducts = JSON.parse(localStorage.getItem('elixir_products') || '[]');
            product = storedProducts.find(p => p.id === productId);
        }
        if (!product) { showNiceToast("❌ المنتج غير موجود", "error"); return; }
        
        let newArrivals = JSON.parse(localStorage.getItem('elixir_new_arrivals')) || [];
        if (newArrivals.some(p => p.id === productId)) {
            showNiceToast(`⚠️ "${product.name}" موجود بالفعل في جديدنا`, "error");
            document.querySelectorAll('.admin-dropdown').forEach(d => d.classList.remove('show'));
            return;
        }
        
        let catText = "";
        switch(product.category) {
            case "تونر": catText = "تونر منعش"; break;
            case "صابون": catText = "صابون طبيعي"; break;
            case "مقشر": catText = "مقشر طبيعي"; break;
            case "مرطب": catText = "مرطب وكريم"; break;
            default: catText = "عناية شخصية";
        }
        
        const expiryDate = new Date();
        expiryDate.setDate(expiryDate.getDate() + 7);
        
        newArrivals.push({
            id: product.id,
            name: product.name,
            price: product.price,
            img: product.img,
            category: product.category,
            section: "care",
            catText: catText,
            desc: product.desc || "منتج عناية طبيعي",
            addedAt: new Date().toISOString(),
            expiryDate: expiryDate.toISOString()
        });
        localStorage.setItem('elixir_new_arrivals', JSON.stringify(newArrivals));
        showNiceToast(`✅ تم إضافة "${product.name}" إلى قسم جديدنا لمدة 7 أيام ✨`);
        document.querySelectorAll('.admin-dropdown').forEach(d => d.classList.remove('show'));
    };

    window.openDiscountModal = function(productId) {
        const product = defaultCareData.find(p => p.id === productId);
        if (!product) return;
        currentProductForDiscount = product;
        document.querySelectorAll('.admin-dropdown').forEach(d => d.classList.remove('show'));
        
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        const minDate = tomorrow.toISOString().split('T')[0];
        const defaultEndDate = new Date();
        defaultEndDate.setDate(defaultEndDate.getDate() + 30);
        const defaultDate = defaultEndDate.toISOString().split('T')[0];
        
        const overlay = document.createElement('div');
        overlay.className = 'discount-modal-overlay';
        overlay.innerHTML = `
            <div class="discount-modal">
                <h3>🎯 إضافة "${product.name}" إلى العروض</h3>
                <input type="number" id="discountPercent" placeholder="نسبة الخصم (%)" min="1" max="90" style="width:100%; padding:10px; margin:10px 0; border-radius:12px;">
                <label style="display:block; text-align:right; margin-top:10px;">📅 تاريخ انتهاء العرض:</label>
                <input type="date" id="endDate" value="${defaultDate}" min="${minDate}" style="width:100%; padding:10px; margin:10px 0; border-radius:12px;">
                <p style="font-size:12px; color:#888; text-align:right;">⚠️ إذا تركت التاريخ فارغاً سيكون العرض دائماً</p>
                <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
                    <button id="confirmDiscountBtn" style="background: #d696a8; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer;">تأكيد</button>
                    <button id="cancelDiscountBtn" style="background: #ccc; color: #333; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer;">إلغاء</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        
        const confirmBtn = overlay.querySelector('#confirmDiscountBtn');
        const cancelBtn = overlay.querySelector('#cancelDiscountBtn');
        
        confirmBtn.onclick = function() {
            const discountPercent = parseInt(overlay.querySelector('#discountPercent').value);
            if (!discountPercent || discountPercent < 1 || discountPercent > 90) {
                showNiceToast("⚠️ الرجاء إدخال نسبة خصم صحيحة (1-90)", "error");
                return;
            }
            const endDate = overlay.querySelector('#endDate').value;
            let offers = JSON.parse(localStorage.getItem('elixir_offers')) || [];
            const existingIndex = offers.findIndex(o => o.productId === productId);
            const newPrice = (product.price * (100 - discountPercent) / 100).toFixed(2);
            const offerData = {
                id: Date.now(), productId: productId, productName: product.name,
                productPrice: product.price, productImg: product.img, discount: discountPercent,
                newPrice: newPrice, startDate: new Date().toISOString().split('T')[0],
                endDate: endDate || "", active: true, createdAt: new Date().toISOString(),
                section: "care", category: product.category, desc: product.desc
            };
            if (existingIndex !== -1) offers[existingIndex] = { ...offers[existingIndex], ...offerData };
            else offers.push(offerData);
            localStorage.setItem('elixir_offers', JSON.stringify(offers));
            overlay.remove();
            renderProducts();
        };
        cancelBtn.onclick = () => overlay.remove();
    };

    // أحداث السلة والمفضلة
    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.add-cart');
        if (!btn) return;
        e.preventDefault();
        let cart = JSON.parse(localStorage.getItem('elixir_cart')) || [];
        let existing = cart.find(item => item.id == btn.dataset.id);
        if (existing) existing.quantity++;
        else cart.push({ id: parseInt(btn.dataset.id), name: btn.dataset.name, price: parseFloat(btn.dataset.price), img: btn.dataset.img, quantity: 1 });
        localStorage.setItem('elixir_cart', JSON.stringify(cart));
        if (window.updateFloatingCart) window.updateFloatingCart();
        let badge = document.querySelector('.cart-count');
        if (badge) badge.innerText = cart.reduce((s,i) => s + i.quantity, 0);
        showNiceToast(`✅ تمت إضافة ${btn.dataset.name} إلى السلة`);
    });

    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.view-details');
        if (btn) {
            e.preventDefault();
            window.location.href = `product-details.html?id=${btn.dataset.id}`;
        }
    });

    document.addEventListener('click', function(e) {
        const icon = e.target.closest('.fav-icon');
        if (!icon) return;
        e.preventDefault();
        e.stopPropagation();
        const id = parseInt(icon.dataset.id);
        let fav = JSON.parse(localStorage.getItem('elixir_favorites')) || [];
        let idx = fav.indexOf(id);
        if (idx === -1) {
            fav.push(id);
            icon.classList.add('active');
            icon.innerHTML = '<i class="fa-solid fa-heart"></i>';
        } else {
            fav.splice(idx, 1);
            icon.classList.remove('active');
            icon.innerHTML = '<i class="fa-regular fa-heart"></i>';
        }
        localStorage.setItem('elixir_favorites', JSON.stringify(fav));
    });

    document.getElementById('filterSelect').addEventListener('change', () => renderProducts());
    document.getElementById('resetFilter').addEventListener('click', () => {
        document.getElementById('filterSelect').value = 'all';
        renderProducts();
    });

    const scrollBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => scrollBtn.style.display = window.scrollY > 300 ? 'flex' : 'none');
    scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    function initCartBadge() {
        const cart = JSON.parse(localStorage.getItem('elixir_cart')) || [];
        const total = cart.reduce((s,i) => s + i.quantity, 0);
        const badge = document.querySelector('.cart-count');
        if (badge) badge.innerText = total;
        if (window.updateFloatingCart) window.updateFloatingCart();
    }
    
    initCartBadge();
    renderProducts();
</script>
</body>
</html>

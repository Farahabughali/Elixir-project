<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>تسجيل الدخول | Elixir Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(145deg, #e2ecd9 0%, #cfdfc4 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem;
        }
        .login-panel {
            max-width: 450px;
            width: 100%;
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            border: 1px solid rgba(67, 142, 86, 0.3);
        }
        .hero-login {
            background: #438e56;
            padding: 1.8rem 1.5rem;
            text-align: center;
        }
        .logo-circle {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px auto;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .logo-circle img {
            width: 55px;
            height: 55px;
            object-fit: contain;
            border-radius: 50%;
        }
        .hero-login h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #ffffff;
        }
        .hero-login p {
            color: #f9f3cf;
            font-weight: 500;
            font-size: 0.8rem;
            margin-top: 6px;
        }
        .login-form {
            padding: 2rem 1.8rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        .input-group label {
            display: block;
            font-weight: 700;
            color: #438e56;
            margin-bottom: 8px;
            font-size: 0.85rem;
        }
        .input-group label i {
            margin-left: 8px;
        }
        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e7da;
            border-radius: 1.2rem;
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            transition: all 0.2s;
            background: #fefef7;
        }
        .input-group input:focus {
            outline: none;
            border-color: #438e56;
            box-shadow: 0 0 0 3px rgba(67, 142, 86, 0.15);
        }
        .password-wrapper {
            position: relative;
        }
        .password-wrapper input {
            padding-left: 45px;
        }
        .toggle-password {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #8ba07a;
            background: transparent;
            border: none;
            font-size: 1.1rem;
        }
        .login-btn {
            width: 100%;
            background: #438e56;
            border: none;
            padding: 14px;
            border-radius: 1.5rem;
            color: white;
            font-weight: 800;
            font-size: 1rem;
            font-family: 'Tajawal', sans-serif;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .login-btn:hover {
            background: #2f6b3e;
            transform: translateY(-2px);
        }
        .forgot-link {
            text-align: center;
            margin-top: 15px;
        }
        .forgot-link a {
            color: #8ba07a;
            font-size: 0.75rem;
            text-decoration: none;
            cursor: pointer;
        }
        .forgot-link a:hover {
            color: #438e56;
            text-decoration: underline;
        }
        .error-message {
            background: #fef3e2;
            color: #c0392b;
            padding: 12px;
            border-radius: 1rem;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 1.5rem;
            border-right: 4px solid #c0392b;
            display: none;
        }
        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 1rem;
            font-size: 0.8rem;
            text-align: center;
            margin-bottom: 1.5rem;
            border-right: 4px solid #2e7d32;
            display: none;
        }
        .footer-note {
            background: #fafcf7;
            padding: 0.8rem;
            text-align: center;
            font-size: 0.7rem;
            color: #6f7e64;
            border-top: 1px solid #e2efda;
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            visibility: hidden;
            opacity: 0;
            transition: all 0.2s;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .reset-modal {
            background: white;
            border-radius: 2rem;
            max-width: 400px;
            width: 90%;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 25px 45px rgba(0,0,0,0.2);
        }
        .reset-modal h3 {
            color: #2c5f2d;
            margin-bottom: 0.5rem;
        }
        .reset-modal p {
            color: #6f7e64;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
        .reset-modal input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e7da;
            border-radius: 1.2rem;
            margin: 0.8rem 0;
            font-family: 'Tajawal', sans-serif;
        }
        .reset-modal button {
            background: #438e56;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 2rem;
            cursor: pointer;
            margin: 5px;
            font-size: 0.9rem;
        }
        .reset-modal .close-modal {
            background: #ccc;
            color: #333;
        }
        hr {
            margin: 15px 0;
            border: none;
            border-top: 1px solid #e2e7da;
        }
        .warning-text {
            color: #f39c12;
            font-size: 0.7rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="login-panel">
    <div class="hero-login">
        <div class="logo-circle">
            <img src="asset/images/logo.png" alt="Elixir Logo" onerror="this.src='https://via.placeholder.com/55?text=E'">
        </div>
        <h2>Elixir | المدير</h2>
        <p>يرجى تسجيل الدخول للمتابعة</p>
    </div>
    <div class="login-form">
        <div id="errorMsg" class="error-message">
            <i class="fas fa-exclamation-triangle"></i> <span>البريد الإلكتروني أو كلمة المرور غير صحيحة</span>
        </div>
        <div id="successMsg" class="success-message">
            <i class="fas fa-check-circle"></i> <span></span>
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-envelope"></i> البريد الإلكتروني</label>
            <input type="email" id="loginEmail" placeholder="admin@elixir.com" autocomplete="off">
        </div>
        
        <div class="input-group">
            <label><i class="fas fa-lock"></i> كلمة المرور</label>
            <div class="password-wrapper">
                <input type="password" id="loginPassword" placeholder="•••••••••••" autocomplete="off">
                <button type="button" class="toggle-password" onclick="togglePassword()">
                    <i class="far fa-eye-slash"></i>
                </button>
            </div>
        </div>
        
        <button class="login-btn" onclick="validateLogin()">
            <i class="fas fa-arrow-left"></i> دخول إلى لوحة التحكم
        </button>
        
        <div class="forgot-link">
            <a onclick="openResetModal()">نسيت كلمة المرور؟</a>
        </div>
    </div>
    <div class="footer-note">
        <i class="fas fa-hand-sparkles"></i> Elixir - إدارة المتجر بالكامل من هنا
    </div>
</div>

<!-- مودال إعادة تعيين كلمة المرور - بدون رقم هاتف -->
<div id="resetModal" class="modal-overlay">
    <div class="reset-modal">
        <i class="fas fa-shield-alt" style="font-size: 2rem; color: #438e56;"></i>
        <h3>إعادة تعيين كلمة المرور</h3>
        <p>أدخل كلمة المرور الجديدة</p>
        
        <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة">
        <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور الجديدة">
        
        <div class="warning-text">
            <i class="fas fa-info-circle"></i> سيتم تغيير كلمة المرور فوراً
        </div>
        
        <div style="margin-top: 15px;">
            <button onclick="resetAdminPassword()">تأكيد التغيير</button>
            <button class="close-modal" onclick="closeResetModal()">إلغاء</button>
        </div>
    </div>
</div>

<script>
    // بيانات الدخول الثابتة (المدير)
    let ADMIN_EMAIL = "admin@elixir.com";
    let ADMIN_PASSWORD = "Elixir2026@";
    
    function validateLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errorDiv = document.getElementById('errorMsg');
        const successDiv = document.getElementById('successMsg');
        
        successDiv.style.display = 'none';
        
        if (email === ADMIN_EMAIL && password === ADMIN_PASSWORD) {
            sessionStorage.setItem('admin_logged_in', 'true');
            sessionStorage.setItem('admin_email', email);
            window.location.href = 'admin2.html';
        } else {
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }
    }
    
    function togglePassword() {
        const passwordInput = document.getElementById('loginPassword');
        const toggleIcon = document.querySelector('.toggle-password i');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        }
    }
    
    function openResetModal() {
        document.getElementById('resetModal').classList.add('active');
        document.getElementById('newPassword').value = '';
        document.getElementById('confirmPassword').value = '';
        document.getElementById('errorMsg').style.display = 'none';
        document.getElementById('successMsg').style.display = 'none';
    }
    
    function closeResetModal() {
        document.getElementById('resetModal').classList.remove('active');
    }
    
    function resetAdminPassword() {
        const newPassword = document.getElementById('newPassword').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const errorDiv = document.getElementById('errorMsg');
        const successDiv = document.getElementById('successMsg');
        
        // التحقق من أن كلمة المرور غير فارغة
        if (!newPassword) {
            errorDiv.querySelector('span').innerHTML = '❌ الرجاء إدخال كلمة المرور الجديدة';
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 2000);
            return;
        }
        
        // التحقق من تطابق كلمتي المرور
        if (newPassword !== confirmPassword) {
            errorDiv.querySelector('span').innerHTML = '❌ كلمة المرور الجديدة وتأكيدها غير متطابقين';
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 2000);
            return;
        }
        
        // التحقق من طول كلمة المرور
        if (newPassword.length < 6) {
            errorDiv.querySelector('span').innerHTML = '❌ كلمة المرور يجب أن تكون 6 أحرف على الأقل';
            errorDiv.style.display = 'block';
            successDiv.style.display = 'none';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 2000);
            return;
        }
        
        // ✅ تغيير كلمة المرور
        ADMIN_PASSWORD = newPassword;
        
        successDiv.querySelector('span').innerHTML = `✅ تم تغيير كلمة المرور بنجاح!<br>يمكنك الآن تسجيل الدخول بكلمة المرور الجديدة.`;
        successDiv.style.display = 'block';
        errorDiv.style.display = 'none';
        
        // تفريغ حقل كلمة المرور في صفحة الدخول
        document.getElementById('loginPassword').value = '';
        
        // إغلاق المودال بعد 3 ثواني
        setTimeout(() => {
            closeResetModal();
        }, 3000);
    }
    
    // الضغط على Enter
    document.getElementById('loginPassword').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') validateLogin();
    });
    document.getElementById('loginEmail').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') validateLogin();
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elixir | الأعشاب الطبيعية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="herbs.css">
    <style>
        .discount-modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .discount-modal {
            background: white;
            border-radius: 28px;
            padding: 30px;
            width: 350px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.3);
        }
        .discount-modal h3 { font-size: 1.3rem; color: #1a2e21; margin-bottom: 10px; }
        .discount-modal input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 16px; text-align: center; }
        .discount-modal button { background: #2e7d32; color: white; border: none; padding: 10px 25px; border-radius: 40px; cursor: pointer; margin: 5px; font-weight: bold; }
        .discount-modal .cancel-btn { background: #ccc; color: #333; }
        .custom-toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #2c5f2d;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.9rem;
            z-index: 9999;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<header>
    <div class="main-header">
        <div class="header-right">
            <a href="index2.html" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
                <div class="logo-circle"><img src="asset/images/logo.png" alt="Logo"></div>
                <span class="web-name">Elixir</span>
            </a>
            <a href="herbs2.html" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
                <span class="page-title-in-header">الأعشاب الطبيعية</span>
            </a>
        </div>
        <div class="header-left">
            <span class="help-text">🌿 هل تحتاج لمساعدة في اختيار العشبة المناسبة؟</span>
            <a href="chatbot.html" class="ai-consult-link"><i class="fas fa-robot"></i> استشر الذكاء الاصطناعي</a>
        </div>
    </div>
</header>

<div class="container">
    <div class="filter-bar">
        <span class="filter-label"> تصفية الأعشاب:</span>
        <select id="filterSelect" class="filter-select">
            <option value="all">الكل</option>
            <option value="طبية">أعشاب طبية</option>
            <option value="عطرية">أعشاب عطرية</option>
            <option value="خلطات">خلطات خاصة</option>
        </select>
        <button id="resetFilter" class="reset-filter"> إعادة ضبط</button>
    </div>
    <div class="products-grid" id="herbsGrid"></div>
    <div class="back-home"><a href="index2.html"><i class="fas fa-arrow-right"></i> العودة إلى الرئيسية</a></div>
</div>

<div id="customToast" class="toast-message"><i class="fas fa-check-circle"></i><span id="toastText"></span></div>
<button id="scrollTopBtn" class="scroll-top-btn" style="display:none;"><i class="fas fa-arrow-up"></i></button>

<link rel="stylesheet" href="floating-cart.css">
<script src="floating-cart.js"></script>

        { id: 17, name: "القراص", category: "طبية", desc: "مضاد للحساسية، غني بالحديد، مفيد للشعر", price: 10, rating: 4.6, img: "asset/images/nettle.jpg" },

        { id: 21, name: "البقدونس", category: "خلطات", desc: "مدر للبول، غني بالفيتامينات، مفيد للكلى", price: 6, rating: 4.5, img: "asset/images/parsley.jpg" },

        { id: 30, name: "الكركم", category: "خلطات", desc: "مضاد قوي للالتهابات، غني بمضادات الأكسدة", price: 15, rating: 4.9, img: "asset/images/turmeric.jpg" },
        { id: 31, name: "الجنسنغ", category: "طبية", desc: "مقوي عام، يزيد الطاقة، يحسن الأداء الذهني", price: 35, rating: 4.9, img: "asset/images/ginseng.jpg" },
        { id: 32, name: "الإخناسيا", category: "طبية", desc: "مقوي للمناعة، يقي من نزلات البرد", price: 22, rating: 4.8, img: "asset/images/echinacea.jpg" },
        { id: 33, name: "القطيفة", category: "طبية", desc: "مضادة للالتهابات، تهدئ البشرة، مفيدة للجروح", price: 13, rating: 4.6, img: "asset/images/calendula.jpg" },
        { id: 34, name: "الريحان", category: "عطرية", desc: "مضاد للتوتر، يحسن المزاج، مفيد للجهاز الهضمي", price: 12, rating: 4.7, img: "asset/images/basil.jpg" },
        { id: 35, name: "الزعفران", category: "خلطات", desc: "مضاد للاكتئاب، يحسن المزاج، غني بمضادات الأكسدة", price: 50, rating: 4.9, img: "asset/images/saffron.jpg" },
        { id: 36, name: "الكمون", category: "خلطات", desc: "يساعد على الهضم، مضاد للأكسدة، يخفض الكوليسترول", price: 8, rating: 4.6, img: "asset/images/cumin.jpg" },
        { id: 37, name: "القرطم", category: "طبية", desc: "مضاد للالتهابات، مفيد للقلب والشرايين", price: 18, rating: 4.7, img: "asset/images/safflower.jpg" }
    ];

    let currentProductForDiscount = null;

    function showNiceToast(message, type = 'success') {
        const oldToast = document.querySelector('.custom-toast');
        if (oldToast) oldToast.remove();
        const toast = document.createElement('div');
        toast.className = 'custom-toast';
        const icon = type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle';
        toast.innerHTML = `<i class="fas ${icon}"></i><span>${message}</span>`;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transform = 'translateX(100px)';
            setTimeout(() => toast.remove(), 300);
        }, 3000);
    }

    function renderProducts() {
        const grid = document.getElementById("herbsGrid");
        const filterVal = document.getElementById('filterSelect').value;
        let filtered = filterVal === 'all' ? herbsData : herbsData.filter(h => h.category === filterVal);
        
        const offers = JSON.parse(localStorage.getItem('elixir_offers')) || [];
        const favorites = JSON.parse(localStorage.getItem('elixir_favorites') || '[]');
        
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="no-results">لا توجد أعشاب</div>';
            return;
        }
        
        grid.innerHTML = filtered.map(herb => {
            let catText = herb.category === "طبية" ? "عشبة طبية" : (herb.category === "عطرية" ? "عشبة عطرية" : "خلطة خاصة");
            const offer = offers.find(o => o.productId === herb.id && o.section === "herbs");
            const displayPrice = offer ? offer.newPrice : herb.price;
            const hasOffer = !!offer;
            const isFav = favorites.includes(herb.id);
            
            return `
                <div class="herb-card" data-id="${herb.id}" style="position:relative;">
                    <div class="fav-icon ${isFav ? 'active' : ''}" data-id="${herb.id}">
                        <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart"></i>
                    </div>
                    ${hasOffer ? `<span class="offer-badge-small" style="position:absolute; top:12px; left:12px; background:#e74c3c; color:white; padding:3px 8px; border-radius:20px; font-size:11px;">-${offer.discount}%</span>` : ''}
                    <img class="herb-img" src="${herb.img}" onerror="this.src='asset/images/placeholder.png'">
                    <div class="herb-info">
                        <div class="herb-cat">${catText}</div>
                        <div class="herb-title">${herb.name}</div>
                        <div class="herb-desc">${herb.desc}</div>
                        <div class="price-row">
                            <span class="price">${displayPrice} ₪</span>
                            <div class="btn-group">
                                <button class="view-details" data-id="${herb.id}" data-name="${herb.name}"> عرض التفاصيل</button>
                                <button class="add-cart" data-id="${herb.id}" data-name="${herb.name}" data-price="${displayPrice}" data-img="${herb.img}"> إضافة إلى السلة</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        addAdminButtons();
    }

    function addAdminButtons() {
        document.querySelectorAll('.herb-card').forEach(card => {
            if (!card.querySelector('.admin-product-btn')) {
                const btn = document.createElement('div');
                btn.className = 'admin-product-btn';
                btn.innerHTML = '<i class="fas fa-plus"></i>';
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const addCartBtn = card.querySelector('.add-cart');
                    const productId = addCartBtn ? parseInt(addCartBtn.dataset.id) : null;
                    if (productId) showAdminDropdown(productId, btn);
                };
                card.appendChild(btn);
            }
        });
    }

    function showAdminDropdown(productId, btnElement) {
        document.querySelectorAll('.admin-dropdown').forEach(d => d.classList.remove('show'));
        let dropdown = btnElement.parentElement.querySelector('.admin-dropdown');
        if (!dropdown) {
            dropdown = document.createElement('div');
            dropdown.className = 'admin-dropdown';
            dropdown.innerHTML = `
                <a href="#" onclick="addToNewArrivals(${productId}); return false;">
                    <i class="fas fa-star"></i> إضافة إلى جديدنا
                </a>
                <a href="#" onclick="openDiscountModal(${productId}); return false;">
                    <i class="fas fa-percent"></i> إضافة إلى العروض
                </a>
            `;
            btnElement.parentElement.appendChild(dropdown);
        }
        dropdown.classList.toggle('show');
        setTimeout(() => {
            document.addEventListener('click', function closeDropdown(e) {
                if (!dropdown.contains(e.target) && !btnElement.contains(e.target)) {
                    dropdown.classList.remove('show');
                    document.removeEventListener('click', closeDropdown);
                }
            });
        }, 10);
    }

    window.addToNewArrivals = function(productId) {
        const product = herbsData.find(p => p.id === productId);
        if (!product) { showNiceToast("❌ المنتج غير موجود", "error"); return; }
        
        let newArrivals = JSON.parse(localStorage.getItem('elixir_new_arrivals')) || [];
        if (newArrivals.some(p => p.id === productId)) {
            showNiceToast(`⚠️ "${product.name}" موجود بالفعل في جديدنا`, "error");
            document.querySelectorAll('.admin-dropdown').forEach(d => d.classList.remove('show'));
            return;
        }
        
        let catText = product.category === "طبية" ? "عشبة طبية" : (product.category === "عطرية" ? "عشبة عطرية" : "خلطة خاصة");
        newArrivals.push({
            id: product.id, name: product.name, price: product.price, img: product.img,
            category: product.category, section: "herbs", catText: catText,
            desc: product.desc, addedAt: new Date().toISOString()
        });
        localStorage.setItem('elixir_new_arrivals', JSON.stringify(newArrivals));
        showNiceToast(`✅ تم إضافة "${product.name}" إلى قسم جديدنا ✨`);
        document.querySelectorAll('.admin-dropdown').forEach(d => d.classList.remove('show'));
    };

    window.openDiscountModal = function(productId) {
        const product = herbsData.find(p => p.id === productId);
        if (!product) return;
        currentProductForDiscount = product;
        document.querySelectorAll('.admin-dropdown').forEach(d => d.classList.remove('show'));
        
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        const minDate = tomorrow.toISOString().split('T')[0];
        const defaultEndDate = new Date();
        defaultEndDate.setDate(defaultEndDate.getDate() + 30);
        const defaultDate = defaultEndDate.toISOString().split('T')[0];
        
        const overlay = document.createElement('div');
        overlay.className = 'discount-modal-overlay';
        overlay.innerHTML = `
            <div class="discount-modal">
                <h3>🎯 إضافة "${product.name}" إلى العروض</h3>
                <input type="number" id="discountPercent" placeholder="نسبة الخصم (%)" min="1" max="90" style="width:100%; padding:10px; margin:10px 0; border-radius:12px; border:1px solid #ddd;">
                <label style="display:block; text-align:right; font-size:14px; margin-top:10px;">📅 تاريخ انتهاء العرض:</label>
                <input type="date" id="endDate" value="${defaultDate}" min="${minDate}" style="width:100%; padding:10px; margin:10px 0; border-radius:12px; border:1px solid #ddd;">
                <p style="font-size:12px; color:#888; text-align:right;">⚠️ إذا تركت التاريخ فارغاً سيكون العرض دائماً</p>
                <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
                    <button id="confirmDiscountBtn" style="background: #2e7d32; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer;">تأكيد</button>
                    <button id="cancelDiscountBtn" style="background: #ccc; color: #333; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer;">إلغاء</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        
        const confirmBtn = overlay.querySelector('#confirmDiscountBtn');
        const cancelBtn = overlay.querySelector('#cancelDiscountBtn');
        
        confirmBtn.onclick = function() {
            const discountPercent = parseInt(overlay.querySelector('#discountPercent').value);
            if (!discountPercent || discountPercent < 1 || discountPercent > 90) {
                showNiceToast("⚠️ الرجاء إدخال نسبة خصم صحيحة (1-90)", "error");
                return;
            }
            const endDate = overlay.querySelector('#endDate').value;
            if (!currentProductForDiscount) return;
            
            let offers = JSON.parse(localStorage.getItem('elixir_offers')) || [];
            const existingIndex = offers.findIndex(o => o.productId === currentProductForDiscount.id);
            const newPrice = (currentProductForDiscount.price * (100 - discountPercent) / 100).toFixed(2);
            const offerData = {
                id: Date.now(), productId: currentProductForDiscount.id,
                productName: currentProductForDiscount.name,
                productPrice: currentProductForDiscount.price,
                productImg: currentProductForDiscount.img,
                discount: discountPercent, newPrice: newPrice,
                startDate: new Date().toISOString().split('T')[0],
                endDate: endDate || "", active: true,
                createdAt: new Date().toISOString(),
                section: "herbs", category: currentProductForDiscount.category,
                desc: currentProductForDiscount.desc
            };
            if (existingIndex !== -1) offers[existingIndex] = { ...offers[existingIndex], ...offerData };
            else offers.push(offerData);
            localStorage.setItem('elixir_offers', JSON.stringify(offers));
            overlay.remove();
            currentProductForDiscount = null;
            renderProducts();
        };
        cancelBtn.onclick = () => overlay.remove();
        overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    };

    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.add-cart');
        if (!btn) return;
        e.preventDefault();
        let cart = JSON.parse(localStorage.getItem('elixir_cart') || '[]');
        let existing = cart.find(item => item.id == btn.dataset.id);
        if (existing) existing.quantity++;
        else cart.push({ id: parseInt(btn.dataset.id), name: btn.dataset.name, price: parseFloat(btn.dataset.price), img: btn.dataset.img, quantity: 1 });
        localStorage.setItem('elixir_cart', JSON.stringify(cart));
        if (window.updateFloatingCart) window.updateFloatingCart();
        let badge = document.querySelector('.cart-count');
        if (badge) badge.innerText = cart.reduce((s,i) => s + i.quantity, 0);
        showNiceToast(`✅ تمت إضافة ${btn.dataset.name} إلى السلة 🛒`);
    });

    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.view-details');
        if (btn) {
            e.preventDefault();
            window.location.href = `product-details.html?id=${btn.dataset.id}`;
        }
    });

    document.addEventListener('click', function(e) {
        const icon = e.target.closest('.fav-icon');
        if (!icon) return;
        e.preventDefault();
        e.stopPropagation();
        const id = parseInt(icon.dataset.id);
        let fav = JSON.parse(localStorage.getItem('elixir_favorites') || '[]');
        let idx = fav.indexOf(id);
        if (idx === -1) {
            fav.push(id);
            icon.classList.add('active');
            icon.innerHTML = '<i class="fa-solid fa-heart"></i>';
        } else {
            fav.splice(idx, 1);
            icon.classList.remove('active');
            icon.innerHTML = '<i class="fa-regular fa-heart"></i>';
        }
        localStorage.setItem('elixir_favorites', JSON.stringify(fav));
        showNiceToast(idx === -1 ? `❤️ تم إضافة ${icon.closest('.herb-card')?.querySelector('.herb-title')?.innerText || 'المنتج'} إلى المفضلة` : `💔 تم إزالة من المفضلة`);
    });

    document.getElementById('filterSelect').addEventListener('change', () => renderProducts());
    document.getElementById('resetFilter').addEventListener('click', () => {
        document.getElementById('filterSelect').value = 'all';
        renderProducts();
    });

    // زر الرجوع للأعلى
    const scrollBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => scrollBtn.style.display = window.scrollY > 300 ? 'flex' : 'none');
    scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    function initCartBadge() {
        const cart = JSON.parse(localStorage.getItem('elixir_cart')) || [];
        const total = cart.reduce((s,i) => s + i.quantity, 0);
        const badge = document.querySelector('.cart-count');
        if (badge) badge.innerText = total;
        if (window.updateFloatingCart) window.updateFloatingCart();
    }
    
    initCartBadge();
    renderProducts();
</script>
</body>
</html>

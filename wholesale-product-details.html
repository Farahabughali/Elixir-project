        { id: 303, name: "بهارات شاورما", category: "بهارات", price: 9, img: "asset/images/shawarma-spice.jpg", desc: "للدجاج واللحوم." },

        { id: 406, name: "زبدة الشيا", category: "عناية", price: 24, img: "asset/images/shea-butter.jpg", desc: "لترطيب البشرة." },
        { id: 407, name: "كريم الورد", category: "عناية", price: 22, img: "asset/images/rose-cream.jpg", desc: "كريم منعش." },
        { id: 408, name: "جل الصبار", category: "عناية", price: 14, img: "asset/images/aloe-gel.jpg", desc: "مهدئ." },
        { id: 409, name: "ماء الورد", category: "عناية", price: 12, img: "asset/images/rose-water.jpg", desc: "تونر." },
        { id: 410, name: "الليفة المغربية", category: "عناية", price: 20, img: "asset/images/moroccan-loofah.png", desc: "للتقشير." },
        { id: 411, name: "طين الغسول", category: "عناية", price: 16, img: "asset/images/ghassoul-clay.jpg", desc: "طين معدني." },
        { id: 412, name: "صابون فيتامين سي", category: "عناية", price: 20, img: "asset/images/vitc-soap.jpg", desc: "لتفتيح البشرة." },
        { id: 414, name: "مقشر السكر بالورد", category: "عناية", price: 17, img: "asset/images/rose-scrub.jpg", desc: "لتجديد البشرة." }
    ];

    // تحديث localStorage بقاعدة البيانات الكاملة
    localStorage.setItem('elixir_wholesale_products', JSON.stringify(fullWholesaleDatabase));
    const allProducts = fullWholesaleDatabase;

    const product = allProducts.find(p => p.id === productId);

    if (!product) {
        document.getElementById('productContent').innerHTML = `
            <div style="text-align:center; padding:50px;">
                <i class="fas fa-exclamation-triangle" style="font-size:3rem; color:#e67e22;"></i>
                <h3>⚠️ المنتج غير موجود في متجر الجملة</h3>
                <p>تأكد من الرابط: <strong style="color:#438e56;">wholesale-product-details.html?id=201</strong></p>
                <a href="wholesale.html" style="color:#438e56;">← العودة إلى متجر الجملة</a>
            </div>`;
    } else {
        renderWholesaleProductDetails(product);
    }

    function renderWholesaleProductDetails(p) {
        const benefitsArray = p.benefits || ["منتج طبيعي 100%", "سعر الجملة – مناسب لأصحاب المتاجر", "جودة عالية مضمونة"];
        const howToUseText = p.howToUse || p.desc || "استخدم حسب التعليمات الموجودة على المنتج";
        const warningsText = p.warnings || "للاستخدام الخارجي فقط. يحفظ بعيداً عن متناول الأطفال.";
        const sourceText = p.source || "ويب طب";
        const sourceLink = p.sourceLink || "https://www.webteb.com/";
        const unit = p.unit || getUnitByCategory(p.category);

        const html = `
            <div class="product-main">
                <div class="product-gallery">
                    <img class="main-img" src="${p.img}" alt="${p.name}" onerror="this.src='asset/images/placeholder.png'">
                </div>
                <div class="product-info">
                    <h1 class="product-title">${p.name}</h1>
                    <p class="short-desc">${p.desc || ""}</p>
                    <div class="price-row">
                        <span class="wholesale-price">${p.price} ₪</span>
                        <span class="wholesale-label">سعر الجملة</span>
                    </div>
                    <div class="unit-info"><i class="fas fa-balance-scale"></i> الوحدة: ${unit}</div>
                    <div class="quantity-control">
                        <button class="qty-btn" id="decreaseQty">-</button>
                        <span class="qty-value" id="qtyValue">1</span>
                        <button class="qty-btn" id="increaseQty">+</button>
                    </div>
                    <button class="add-to-cart-btn" id="addToCartBtn"> إضافة إلى سلة الجملة</button>
                    <button class="share-btn" id="shareWhatsappBtn"><i class="fab fa-whatsapp"></i> واتساب / تواصل معنا</button>
                    <button class="share-btn" id="copyLinkBtn"><i class="fas fa-link"></i> نسخ الرابط</button>
                    <a href="wholesalecheckout.html" class="checkout-btn"> إتمام طلب الجملة</a>
                </div>
            </div>
            <div class="details-section">
                <div class="detail-card"><h3><i class="fas fa-leaf"></i> الفوائد</h3><ul>${benefitsArray.map(b => `<li>${b}</li>`).join('')}</ul></div>
                <div class="detail-card"><h3><i class="fas fa-hand-sparkles"></i> طريقة الاستخدام</h3><p>${howToUseText}</p></div>
                <div class="detail-card warning"><h3><i class="fas fa-exclamation-triangle"></i> التحذيرات</h3><p>${warningsText}</p></div>
<div class="detail-card source"><h3> المصدر</h3><p><a href="${sourceLink}" target="_blank"> ${sourceText}</a></p></div>            </div>
        `;
        document.getElementById('productContent').innerHTML = html;

        document.getElementById('decreaseQty').onclick = () => { if (currentQuantity > 1) currentQuantity--; document.getElementById('qtyValue').innerText = currentQuantity; };
        document.getElementById('increaseQty').onclick = () => { currentQuantity++; document.getElementById('qtyValue').innerText = currentQuantity; };
        document.getElementById('addToCartBtn').onclick = () => { addToWholesaleCart(p.id, p.name, p.price, p.img, currentQuantity); };
        document.getElementById('shareWhatsappBtn').onclick = () => { window.open(`https://wa.me/970598288142?text=${encodeURIComponent('السلام عليكم، أريد الاستفسار عن منتج الجملة: ' + p.name)}`, '_blank'); };
        document.getElementById('copyLinkBtn').onclick = () => { navigator.clipboard.writeText(window.location.href); showToast('✅ تم نسخ الرابط بنجاح'); };
    }

    function addToWholesaleCart(id, name, price, img, quantity) {
        let cart = JSON.parse(localStorage.getItem('elixir_wholesale_cart') || '[]');
        const existing = cart.find(item => item.id === id);
        if (existing) existing.quantity += quantity;
        else cart.push({ id, name, price, img, quantity });
        localStorage.setItem('elixir_wholesale_cart', JSON.stringify(cart));
        
        const total = cart.reduce((s, i) => s + i.quantity, 0);
        const badge = document.querySelector('.cart-count');
        if (badge) badge.innerText = total;
        if (window.updateWholesaleFloatingCart) window.updateWholesaleFloatingCart();
        
        showToast(`✅ تمت إضافة ${name} إلى سلة الجملة`);
    }

    function showToast(msg) {
        const toast = document.getElementById('customToast');
        document.getElementById('toastText').innerText = msg;
        toast.style.display = 'flex';
        setTimeout(() => toast.style.display = 'none', 3000);
    }

    const cart = JSON.parse(localStorage.getItem('elixir_wholesale_cart') || '[]');
    const total = cart.reduce((s, i) => s + i.quantity, 0);
    const badge = document.querySelector('.cart-count');
    if (badge) badge.innerText = total;
</script>
</body>
</html>

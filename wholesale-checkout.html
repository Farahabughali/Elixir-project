<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elixir | إتمام طلب الجملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link rel="stylesheet" href="styles/wholesale-checkout.css">
</head>
<body>

<div class="hero-banner">
    <h1>🌿 Elixir | طلب جملة</h1>
    <p>تعبئة بياناتك لإتمام طلب الجملة</p>
</div>

<div class="checkout-grid">
    <div class="cart-section">
        <h2><i class="fas fa-box-open"></i> منتجات الجملة</h2>
        <div id="wholesaleCartItems" class="cart-items"></div>
        <div id="wholesaleCartTotal" class="cart-total"></div>
        <div style="text-align: center; margin-top: 20px;">
            <a href="wholesale.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة للتسوق</a>
        </div>
    </div>
    <div class="info-section">
        <h2><i class="fas fa-user-check"></i> معلومات التوصيل (جملة)</h2>
        <div class="form-group">
            <label>اسم المؤسسة / الشخص</label>
            <input type="text" id="wholesaleName" placeholder="اسم الشركة أو التاجر">
        </div>
        <div class="form-group">
            <label>رقم الهاتف</label>
            <input type="tel" id="wholesalePhone" placeholder="0598 000 000">
        </div>
        <div class="form-group">
            <label>عنوان التوصيل</label>
            <textarea id="wholesaleAddress" rows="2" placeholder="المدينة، الشارع، رقم المنزل"></textarea>
        </div>
        <div class="form-group">
            <label>طريقة الدفع (جملة)</label>
            <select id="wholesalePayment">
                <option value="cash">💵 دفع عند الاستلام</option>
                <option value="bank">🏦 تحويل بنكي</option>
            </select>
        </div>
        <button class="btn-submit" id="submitWholesaleOrderBtn"><i class="fas fa-check-circle"></i> تأكيد طلب الجملة</button>
    </div>
</div>

<div class="footer-policies">
    <div class="policy-badge"><i class="fas fa-exchange-alt"></i> استبدال 24 ساعة</div>
    <div class="policy-badge"><i class="fas fa-ban"></i> استرجاع ممنوع</div>
    <div class="policy-badge"><i class="fas fa-truck"></i> شحن سريع</div>
    <div class="policy-badge"><i class="fas fa-lock"></i> خصوصية آمنة</div>
    <div class="policy-badge"><i class="fas fa-seedling"></i> طبيعي 100%</div>
</div>

<script>
    const STORAGE_CART = 'elixir_wholesale_cart';
    const STORAGE_ORDERS = 'elixir_wholesale_orders';

    function renderWholesaleCart() {
        let cart = JSON.parse(localStorage.getItem(STORAGE_CART) || '[]');
        const container = document.getElementById('wholesaleCartItems');
        const totalSpan = document.getElementById('wholesaleCartTotal');

        if (!cart.length) {
            container.innerHTML = '<div style="text-align:center;padding:40px;">🛒 سلة الجملة فارغة<br>⚠️ أضف منتجات أولاً</div>';
            totalSpan.innerHTML = '';
            return;
        }

        let html = '';
        let total = 0;
        cart.forEach((item, idx) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            html += `
                <div class="cart-item" data-index="${idx}">
                    <img class="cart-item-img" src="${item.img}" alt="${item.name}" onerror="this.src='asset/images/placeholder.png'">
                    <div class="cart-item-details">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">${item.price} ₪</div>
                        <div class="cart-item-actions">
                            <button class="qty-btn decWholesale" data-idx="${idx}">-</button>
                            <span class="item-qty">${item.quantity}</span>
                            <button class="qty-btn incWholesale" data-idx="${idx}">+</button>
                            <button class="remove-item-btn removeWholesale" data-idx="${idx}"><i class="fa-regular fa-trash-can"></i> حذف</button>
                        </div>
                    </div>
                    <div style="font-weight:bold; color:#2c5f2d;">${itemTotal} ₪</div>
                </div>
            `;
        });
        container.innerHTML = html;
        totalSpan.innerHTML = `💰 إجمالي طلب الجملة: ${total} ₪`;

        document.querySelectorAll('.decWholesale').forEach(btn => {
            btn.addEventListener('click', () => {
                let idx = parseInt(btn.dataset.idx);
                let cart = JSON.parse(localStorage.getItem(STORAGE_CART));
                if (cart[idx].quantity > 1) cart[idx].quantity--;
                else cart.splice(idx, 1);
                localStorage.setItem(STORAGE_CART, JSON.stringify(cart));
                renderWholesaleCart();
            });
        });
        document.querySelectorAll('.incWholesale').forEach(btn => {
            btn.addEventListener('click', () => {
                let idx = parseInt(btn.dataset.idx);
                let cart = JSON.parse(localStorage.getItem(STORAGE_CART));
                cart[idx].quantity++;
                localStorage.setItem(STORAGE_CART, JSON.stringify(cart));
                renderWholesaleCart();
            });
        });
        document.querySelectorAll('.removeWholesale').forEach(btn => {
            btn.addEventListener('click', () => {
                let idx = parseInt(btn.dataset.idx);
                let cart = JSON.parse(localStorage.getItem(STORAGE_CART));
                cart.splice(idx, 1);
                localStorage.setItem(STORAGE_CART, JSON.stringify(cart));
                renderWholesaleCart();
            });
        });
    }

    function submitWholesaleOrder() {
        const name = document.getElementById('wholesaleName').value.trim();
        const phone = document.getElementById('wholesalePhone').value.trim();
        const address = document.getElementById('wholesaleAddress').value.trim();
        const payment = document.getElementById('wholesalePayment').value;
        let cart = JSON.parse(localStorage.getItem(STORAGE_CART) || '[]');

        if (!name || !phone || !address) {
            alert('❌ الرجاء تعبئة جميع بيانات التوصيل');
            return;
        }
        if (cart.length === 0) {
            alert('❌ سلة الجملة فارغة');
            return;
        }

        let total = 0;
        cart.forEach(item => total += item.price * item.quantity);

        const newOrder = {
            id: Date.now(),
            name, phone, address,
            payment: payment === 'cash' ? 'دفع عند الاستلام' : 'تحويل بنكي',
            items: cart.map(item => ({
                name: item.name,
                quantity: item.quantity,
                price: item.price,
                total: item.price * item.quantity,
                img: item.img
            })),
            total: total,
            date: new Date().toLocaleString('ar-EG'),
            status: 'جديد',
            type: 'wholesale'
        };

        let orders = JSON.parse(localStorage.getItem(STORAGE_ORDERS) || '[]');
        orders.unshift(newOrder);
        localStorage.setItem(STORAGE_ORDERS, JSON.stringify(orders));

        localStorage.removeItem(STORAGE_CART);
        alert(`✅ تم استلام طلب الجملة رقم ${newOrder.id}`);
        window.location.href = 'wholesale.html';
    }

    document.getElementById('submitWholesaleOrderBtn').addEventListener('click', submitWholesaleOrder);
    renderWholesaleCart();
</script>
</body>
</html>

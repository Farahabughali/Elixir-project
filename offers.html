<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elixir | عروض وخصومات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="floating-cart.css">
    <link rel="stylesheet" href="floating-share.css">
    <link rel="stylesheet" href="offers.css">
</head>
<body>

<div class="container">
    <div class="main-header">
        <div class="logo-area">
            <a href="index.html" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
                <div class="logo-circle"><img src="asset/images/logo.png" alt="Logo"></div>
            </a>
            <div>
                <div class="web-name">Elixir</div>
                <div class="page-title">عروض وخصومات</div>
            </div>
        </div>
        <div class="ai-consult-area">
            <span class="help-text"> هل تحتاج لمساعدة في اختيار المنتجات المناسبة؟</span>
            <a href="chatbot.html" class="ai-consult-link"><i class="fas fa-robot"></i> استشر الذكاء الاصطناعي</a>
        </div>
    </div>

    <div class="offers-header">
        <h1> عروض وخصومات Elixir </h1>
    </div>

    <div class="products-grid" id="offersGrid"></div>

    <div class="back-home">
        <a href="index.html"><i class="fas fa-arrow-right"></i> العودة إلى الرئيسية</a>
    </div>
</div>

<div id="customToast" style="display:none; position:fixed; bottom:20px; right:20px; background:#438e56; color:white; padding:12px 20px; border-radius:30px; z-index:9999;">
    <i class="fas fa-check-circle"></i> <span id="toastText"></span>
</div>

<script src="floating-cart.js"></script>
<script src="floating-share.js"></script>

<script>
    // ========== العروض الثابتة (الافتراضية) ==========
    const DEFAULT_OFFERS = [
        { 
            id: 1, 
            productId: 1,
            productName: "عسل طبيعي متعدد الأعشاب", 
            productPrice: 150,
            discount: 10,
            newPrice: 135,
            productImg: "asset/images/herbalhoney.png",
            endDate: null,  // عرض دائم
            isFixed: true
        },
        { 
            id: 113, 
            productId: 113,
            productName: "الليفة المغربية", 
            productPrice: 70,
            discount: 30,
            newPrice: 49,
            productImg: "asset/images/moroccan-loofah.png",
            endDate: null,
            isFixed: true
        },
        { 
            id: 42, 
            productId: 42,
            productName: "زيت الياسمين", 
            productPrice: 45,
            discount: 20,
            newPrice: 36,
            productImg: "asset/images/jasmine-oil.png",
            endDate: null,
            isFixed: true
        }
    ];

    // ========== تهيئة العروض الافتراضية ==========
    function initializeDefaultOffers() {
        let existingOffers = localStorage.getItem('elixir_offers');
        
        if (!existingOffers || existingOffers === '[]') {
            localStorage.setItem('elixir_offers', JSON.stringify(DEFAULT_OFFERS));
            console.log("✅ تم تهيئة العروض الافتراضية");
        }
    }

    // ========== تحميل العروض من localStorage ==========
    function loadOffers() {
        initializeDefaultOffers();
        
        let offers = JSON.parse(localStorage.getItem('elixir_offers') || '[]');
        
        // فلترة العروض الصالحة (لم تنته صلاحيتها)
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        let validOffers = offers.filter(offer => {
            if (!offer.endDate || offer.endDate === "") return true;
            const endDate = new Date(offer.endDate);
            endDate.setHours(0, 0, 0, 0);
            return endDate >= today;
        });
        
        if (validOffers.length !== offers.length) {
            localStorage.setItem('elixir_offers', JSON.stringify(validOffers));
        }
        
        return validOffers;
    }



    // ========== تنظيف العروض من المنتجات المحذوفة ==========
function cleanDeletedProductsOffers() {
    // نجلب العروض من localStorage
    let offers = JSON.parse(localStorage.getItem('elixir_offers') || '[]');
    
    // نجلب المنتجات النشطة من localStorage (أو نفحص)
    // بما أن offers.html لا تعرف المنتجات، نعتمد على علامة isFixed
    
    let validOffers = offers.filter(offer => {
        // العروض الثابتة نتركها
        if (offer.isFixed) return true;
        
        // العروض العادية: نتحقق من وجودها في قاعدة البيانات عن طريق API
        // ولكن هذا سيكون async، لذلك نستخدم localStorage آخر لتخزين IDs المنتجات النشطة
        
        return true;
    });
    
    if (validOffers.length !== offers.length) {
        localStorage.setItem('elixir_offers', JSON.stringify(validOffers));
        console.log(` تم تنظيف ${offers.length - validOffers.length} عرض لمنتجات محذوفة`);
        renderOffers(); // إعادة تحميل العروض
    }
}

// تشغيل التنظيف عند تحميل الصفحة
setTimeout(cleanDeletedProductsOffers, 1000);


    // ========== حساب الوقت المتبقي ==========
    function getTimeRemaining(endDate) {
        if (!endDate || endDate === "") return null;
        
        const now = new Date().getTime();
        const end = new Date(endDate).getTime();
        const distance = end - now;
        
        if (distance <= 0) return null;
        
        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);
        
        return { days, hours, minutes, seconds };
    }

    // ========== عرض المنتجات ==========
    function renderOffers() {
        const grid = document.getElementById('offersGrid');
        let offers = loadOffers();
        let favorites = JSON.parse(localStorage.getItem('elixir_favorites') || '[]');

        if (offers.length === 0) {
            grid.innerHTML = `<div class="no-products" style="text-align:center; padding:60px; background:rgba(255,255,255,0.85); border-radius:30px;">
                <i class="fas fa-tags" style="font-size:50px; color:#438e56;"></i><br>
                <strong style="font-size:20px;">لا توجد عروض حالياً</strong><br>
                <span style="color:#666;">ترقبوا عروضنا القادمة!</span>
            </div>`;
            return;
        }

        grid.innerHTML = offers.map(offer => {
            let isFav = favorites.includes(offer.productId);
            const productImg = offer.productImg && offer.productImg !== "" ? offer.productImg : "asset/images/placeholder.png";
            
            
            return `
                <div class="product-card fade-up" data-id="${offer.productId}" data-end="${offer.endDate || ''}">
                    <div class="discount-badge">-${offer.discount}%</div>
                    <div class="fav-icon ${isFav ? 'active' : ''}" data-id="${offer.productId}">
                        <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart"></i>
                    </div>
                    <img class="product-img" src="${productImg}" alt="${offer.productName}" onerror="this.src='asset/images/placeholder.png'">
                    <div class="product-info">
                        <div class="product-title">${offer.productName}</div>
                        <div class="price-row">
                            <span class="old-price">${parseFloat(offer.productPrice).toFixed(2)} ₪</span>
                            <span class="new-price">${parseFloat(offer.newPrice).toFixed(2)} ₪</span>
                        </div>
                        
                        <div class="btn-group">
                            <button class="details-btn view-details" data-id="${offer.productId}"> عرض التفاصيل</button>
                            <button class="add-cart-btn add-to-cart" data-id="${offer.productId}" data-name="${offer.productName}" data-price="${offer.newPrice}" data-img="${productImg}"> إضافة إلى السلة</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        attachEventListeners();
        animateCards();
       
    }

    function attachEventListeners() {
        document.querySelectorAll('.fav-icon').forEach(icon => {
            icon.removeEventListener('click', handleFavClick);
            icon.addEventListener('click', handleFavClick);
        });

        document.querySelectorAll('.view-details').forEach(btn => {
            btn.removeEventListener('click', handleViewDetails);
            btn.addEventListener('click', handleViewDetails);
        });

        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.removeEventListener('click', handleAddToCart);
            btn.addEventListener('click', handleAddToCart);
        });
    }

    function handleFavClick(e) {
        e.stopPropagation();
        const icon = e.currentTarget;
        const id = parseInt(icon.getAttribute('data-id'));
        const rect = icon.getBoundingClientRect();
        burstHearts(rect.left + rect.width / 2, rect.top + rect.height / 2);
        
        let favorites = JSON.parse(localStorage.getItem('elixir_favorites') || '[]');
        const index = favorites.indexOf(id);
        if (index === -1) {
            favorites.push(id);
            icon.classList.add('active');
            icon.innerHTML = '<i class="fa-solid fa-heart"></i>';
        } else {
            favorites.splice(index, 1);
            icon.classList.remove('active');
            icon.innerHTML = '<i class="fa-regular fa-heart"></i>';
        }
        localStorage.setItem('elixir_favorites', JSON.stringify(favorites));
        updateFavCount();
    }

    function handleViewDetails(e) {
        e.preventDefault();
        const id = e.currentTarget.dataset.id;
        window.location.href = `product-details.html?id=${id}`;
    }

    function handleAddToCart(e) {
        e.preventDefault();
        const btn = e.currentTarget;
        const id = parseInt(btn.dataset.id);
        const name = btn.dataset.name;
        const price = parseFloat(btn.dataset.price);
        const img = btn.dataset.img;
        addToCart(id, name, price, img);
    }

    function animateCards() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
    }

   

    function burstHearts(x, y) {
        for (let i = 0; i < 12; i++) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.classList.add('heart-particle');
            const offsetX = (Math.random() - 0.5) * 60;
            const offsetY = (Math.random() - 0.5) * 50;
            heart.style.left = (x + offsetX) + 'px';
            heart.style.top = (y + offsetY) + 'px';
            heart.style.animationDelay = (Math.random() * 0.2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }
    }

    function updateFavCount() {
        let favorites = JSON.parse(localStorage.getItem('elixir_favorites') || '[]');
        const countSpan = document.querySelector('.favorite-count');
        if (countSpan) countSpan.innerText = favorites.length;
    }

    function addToCart(id, name, price, img) {
        let cart = JSON.parse(localStorage.getItem('elixir_cart') || '[]');
        const existing = cart.find(item => item.id === id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ id, name, price, img, quantity: 1 });
        }
        localStorage.setItem('elixir_cart', JSON.stringify(cart));
        
        showToast(`✅ تمت إضافة ${name} إلى السلة`);
        
        if (window.updateFloatingCart) window.updateFloatingCart();
    }

    function showToast(message) {
        const toast = document.getElementById('customToast');
        const toastText = document.getElementById('toastText');
        toastText.innerText = message;
        toast.style.display = 'flex';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    // ========== تعديل نص المشاركة ==========
    (function() {
        const originalShareHandler = async () => {
            const shareData = {
                title: 'Elixir | عروض وخصومات',
                text: '🔥 عروض وخصومات Elixir – خصومات تصل إلى 30% على منتجاتنا الطبيعية. تسوق الآن واستشر ذكاءنا الاصطناعي مجاناً.',
                url: window.location.href
            };

            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        prompt('📋 انسخ الرابط:', shareData.url);
                    }
                }
            } else {
                prompt('📋 انسخ الرابط والمحتوى وشاركه:', shareData.text + '\n\n' + shareData.url);
            }
        };

        setTimeout(() => {
            const shareBtn = document.querySelector('.share-fixed-btn');
            if (shareBtn) {
                const newBtn = shareBtn.cloneNode(true);
                shareBtn.parentNode.replaceChild(newBtn, shareBtn);
                newBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    originalShareHandler();
                });
            }
        }, 500);
    })();

    setTimeout(() => {
        const shareBtn = document.querySelector('.share-fixed-btn');
        if (shareBtn) shareBtn.style.display = 'flex';
    }, 300);

    // تشغيل العرض
    renderOffers();
    updateFavCount();
</script>

</body>
</html>

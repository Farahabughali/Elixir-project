<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elixir | عروض وخصومات</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="floating-cart.css">
    <link rel="stylesheet" href="floating-share.css">
    <link rel="stylesheet" href="offers.css">
</head>
<body>

<div class="container">
    <div class="main-header">
        <div class="logo-area">
            <a href="index.html" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
                <div class="logo-circle"><img src="asset/images/logo.png" alt="Logo"></div>
            </a>
            <div>
                <div class="web-name">Elixir</div>
                <div class="page-title">عروض وخصومات</div>
            </div>
        </div>
        <div class="ai-consult-area">
            <span class="help-text"> هل تحتاج لمساعدة في اختيار المنتجات المناسبة؟</span>
            <a href="chatbot.html" class="ai-consult-link"><i class="fas fa-robot"></i> استشر الذكاء الاصطناعي</a>
        </div>
    </div>

    <div class="offers-header">
        <h1> عروض وخصومات Elixir </h1>
        <div class="countdown-banner">
            <div class="countdown-label">
                <i class="fa-regular fa-hourglass-half"></i> ينتهي العرض خلال:
            </div>
            <div class="countdown-timer" id="offerTimer">
                <div class="timer-block"><span id="days">00</span><span>يوم</span></div>
                <div class="timer-block"><span id="hours">00</span><span>ساعة</span></div>
                <div class="timer-block"><span id="minutes">00</span><span>دقيقة</span></div>
                <div class="timer-block"><span id="seconds">00</span><span>ثانية</span></div>
            </div>
        </div>
    </div>

    <div class="products-grid" id="offersGrid"></div>

    <div class="back-home">
        <a href="index.html"><i class="fas fa-arrow-right"></i> العودة إلى الرئيسية</a>
    </div>
</div>

<div id="customToast" style="display:none; position:fixed; bottom:20px; right:20px; background:#438e56; color:white; padding:12px 20px; border-radius:30px; z-index:9999;">
    <i class="fas fa-check-circle"></i> <span id="toastText"></span>
</div>

<script src="floating-cart.js"></script>
<script src="floating-share.js"></script>

<script>
    // ========== منتجات العروض ==========
    const offersProducts = [
        { 
            id: 1, 
            name: "عسل طبيعي متعدد الأعشاب", 
            oldPrice: 150, 
            newPrice: 135, 
            discount: 10,
            img: "asset/images/herbalhoney.png"
        },
        { 
            id: 113, 
            name: "الليفة المغربية", 
            oldPrice: 70, 
            newPrice: 49, 
            discount: 30,
            img: "asset/images/moroccan-loofah.png"
        },
        { 
            id: 42, 
            name: "زيت الياسمين", 
            oldPrice: 45, 
            newPrice: 36, 
            discount: 20,
            img: "asset/images/jasmine-oil.png"
        }
    ];

    // ========== المؤقت العد التنازلي ==========
    let endDate = new Date(2026, 6, 6, 23, 59, 59);

    function updateCountdown() {
        const now = new Date().getTime();
        const distance = endDate - now;

        if (distance < 0) {
            document.getElementById("offerTimer").innerHTML = '<div class="timer-block"><span>انتهى</span><span>العرض</span></div>';
            return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((distance % (1000 * 60)) / 1000);

        document.getElementById("days").innerHTML = days < 10 ? "0" + days : days;
        document.getElementById("hours").innerHTML = hours < 10 ? "0" + hours : hours;
        document.getElementById("minutes").innerHTML = minutes < 10 ? "0" + minutes : minutes;
        document.getElementById("seconds").innerHTML = seconds < 10 ? "0" + seconds : seconds;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();

    // ========== حركة القلوب المتطايرة ==========
    function burstHearts(x, y) {
        for (let i = 0; i < 12; i++) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.classList.add('heart-particle');
            const offsetX = (Math.random() - 0.5) * 60;
            const offsetY = (Math.random() - 0.5) * 50;
            heart.style.left = (x + offsetX) + 'px';
            heart.style.top = (y + offsetY) + 'px';
            heart.style.animationDelay = (Math.random() * 0.2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }
    }

    // ========== دوال المفضلة ==========
    function updateFavCount() {
        let favorites = JSON.parse(localStorage.getItem('elixir_favorites') || '[]');
        const countSpan = document.querySelector('.favorite-count');
        if (countSpan) countSpan.innerText = favorites.length;
    }

    function toggleFavorite(icon, productId) {
        const rect = icon.getBoundingClientRect();
        burstHearts(rect.left + rect.width / 2, rect.top + rect.height / 2);
        
        let favorites = JSON.parse(localStorage.getItem('elixir_favorites') || '[]');
        const index = favorites.indexOf(productId);
        if (index === -1) {
            favorites.push(productId);
            icon.classList.add('active');
            icon.innerHTML = '<i class="fa-solid fa-heart"></i>';
        } else {
            favorites.splice(index, 1);
            icon.classList.remove('active');
            icon.innerHTML = '<i class="fa-regular fa-heart"></i>';
        }
        localStorage.setItem('elixir_favorites', JSON.stringify(favorites));
        updateFavCount();
    }

    // ========== عرض المنتجات ==========
    function renderOffers() {
        const grid = document.getElementById('offersGrid');
        let favorites = JSON.parse(localStorage.getItem('elixir_favorites') || '[]');

        if (offersProducts.length === 0) {
            grid.innerHTML = `<div class="no-products" style="text-align:center; padding:60px; background:rgba(255,255,255,0.85); border-radius:30px;"><i class="fas fa-tags"></i><br>لا توجد عروض حالياً<br>ترقبوا عروضنا القادمة!</div>`;
            return;
        }

        grid.innerHTML = offersProducts.map(product => {
            let isFav = favorites.includes(product.id);
            return `
                <div class="product-card fade-up">
                    <div class="discount-badge">-${product.discount}%</div>
                    <div class="fav-icon ${isFav ? 'active' : ''}" data-id="${product.id}">
                        <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart"></i>
                    </div>
                    <img class="product-img" src="${product.img}" alt="${product.name}" onerror="this.src='asset/images/placeholder.png'">
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="price-row">
                            <span class="old-price">${product.oldPrice} ₪</span>
                            <span class="new-price">${product.newPrice} ₪</span>
                        </div>
                        <div class="btn-group">
                            <button class="details-btn view-details" data-id="${product.id}"> عرض التفاصيل</button>
                            <button class="add-cart-btn add-to-cart" data-id="${product.id}" data-name="${product.name}" data-price="${product.newPrice}" data-img="${product.img}"> إضافة إلى السلة</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        document.querySelectorAll('.fav-icon').forEach(icon => {
            icon.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(icon.getAttribute('data-id'));
                toggleFavorite(icon, id);
            });
        });

        document.querySelectorAll('.view-details').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const id = btn.dataset.id;
                window.location.href = `product-details.html?id=${id}`;
            });
        });

        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const id = parseInt(btn.dataset.id);
                const name = btn.dataset.name;
                const price = parseFloat(btn.dataset.price);
                const img = btn.dataset.img;
                addToCart(id, name, price, img);
            });
        });

        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
    }

    // ========== إضافة إلى السلة ==========
    function addToCart(id, name, price, img) {
        let cart = JSON.parse(localStorage.getItem('elixir_cart') || '[]');
        const existing = cart.find(item => item.id === id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ id, name, price, img, quantity: 1 });
        }
        localStorage.setItem('elixir_cart', JSON.stringify(cart));
        
        showToast(`✅ تمت إضافة ${name} إلى السلة يتمنى ${name} أن ينال إعجابكم`);
        
        const headerBadge = document.querySelector('.cart-count');
        if (headerBadge) {
            const total = cart.reduce((sum, i) => sum + i.quantity, 0);
            headerBadge.innerText = total;
        }
        if (window.updateFloatingCart) window.updateFloatingCart();
    }

    function showToast(message) {
        const toast = document.getElementById('customToast');
        const toastText = document.getElementById('toastText');
        toastText.innerText = message;
        toast.style.display = 'flex';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    // تعديل نص المشاركة لصفحة العروض
 
    // ========== تعديل نص المشاركة لصفحة العروض ==========
    (function() {
        // تغيير نص المشاركة عند الضغط على الزر
        const originalShareHandler = async () => {
            const shareData = {
                title: 'Elixir | عروض وخصومات',
                text: '🔥 عروض وخصومات Elixir – خصومات تصل إلى 30% على منتجاتنا الطبيعية. تسوق الآن واستشر ذكاءنا الاصطناعي مجاناً.',
                url: window.location.href
            };

            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        prompt('📋 انسخ الرابط:', shareData.url);
                    }
                }
            } else {
                prompt('📋 انسخ الرابط والمحتوى وشاركه:', shareData.text + '\n\n' + shareData.url);
            }
        };

        // البحث عن زر المشاركة واستبدال حدثه
        setTimeout(() => {
            const shareBtn = document.querySelector('.share-fixed-btn');
            if (shareBtn) {
                // إزالة الحدث القديم وإضافة الحدث الجديد
                const newBtn = shareBtn.cloneNode(true);
                shareBtn.parentNode.replaceChild(newBtn, shareBtn);
                newBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    originalShareHandler();
                });
            }
        }, 500);
    })();

    // إظهار زر المشاركة فوراً
    setTimeout(() => {
        const shareBtn = document.querySelector('.share-fixed-btn');
        if (shareBtn) shareBtn.style.display = 'flex';
    }, 300);



    // إظهار زر المشاركة فوراً في صفحة العروض
    setTimeout(() => {
        const shareBtn = document.querySelector('.share-fixed-btn');
        if (shareBtn) shareBtn.style.display = 'flex';
    }, 300);

    renderOffers();
    updateFavCount();
</script>

</body>
</html>

    // تأثير Fade-up
    function applyFadeToCards() {
        const cards = document.querySelectorAll('.fav-card');
        cards.forEach(card => card.classList.add('fade-up'));
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });
        cards.forEach(card => observer.observe(card));
    }

    function renderWholesaleFavorites() {
        const favorites = JSON.parse(localStorage.getItem('elixir_wholesale_favorites') || '[]');
        const grid = document.getElementById('favGrid');
        const favProducts = wholesaleProducts.filter(p => favorites.includes(p.id));

        if (favProducts.length === 0) {
            grid.innerHTML = `
                <div class="empty-fav">
                    <i class="fa-regular fa-heart"></i>
                    <h2>لا توجد منتجات في مفضلة الجملة</h2>
                    <p>أضف منتجات إلى مفضلتك من متجر الجملة</p>
                    <a href="wholesale.html" class="start-btn">تصفح المنتجات </a>
                </div>
            `;
            return;
        }

        grid.innerHTML = favProducts.map(p => `
            <div class="fav-card">
                <img class="fav-img" src="${p.img}" alt="${p.name}" onerror="this.src='asset/images/placeholder.png'">
                <div class="fav-info">
                    <div class="fav-title">${p.name}</div>
                    <div class="fav-price">${p.price} ₪ (جملة)</div>
                    <button class="remove-fav-btn" data-id="${p.id}"> إزالة</button>
                </div>
            </div>
        `).join('');

        // ربط أزرار الإزالة
        document.querySelectorAll('.remove-fav-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const id = parseInt(btn.getAttribute('data-id'));
                let favs = JSON.parse(localStorage.getItem('elixir_wholesale_favorites') || '[]');
                favs = favs.filter(fid => fid !== id);
                localStorage.setItem('elixir_wholesale_favorites', JSON.stringify(favs));
                renderWholesaleFavorites();
            });
        });

        // تطبيق تأثير Fade-up
        applyFadeToCards();
    }

    renderWholesaleFavorites();
</script>

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>

    <style>
        .best-header {

            text-align: center;

        .no-results h3 {
            font-size: 1.5rem;
            color: #438e56;

        .no-results p {
            color: #888;
        }

            text-align: center;

        }

            text-decoration: none;

    function showToast(message) {
        const toast = document.getElementById('customToast');

    // ========== بطاقة الأعشاب ==========

    // ========== بطاقة البكجات ==========
    function createPackageCard(product) {
        let isFav = JSON.parse(localStorage.getItem('elixir_favorites') || '[]').includes(product.id);
        let bgColor = product.bgColor || "#fff3e0";
        let btnColor = product.btnColor || "#ef6c00";

                </div>
                <img class="package-img" src="${product.img}" onerror="this.src='asset/images/placeholder.png'" style="width:100%; height:180px; object-fit:cover;">
                <div class="package-info" style="padding:1rem; text-align:right;">
                    <div class="package-title" style="font-size:1.1rem; font-weight:700;">${product.name}</div>
                    <div class="package-desc" style="font-size:0.75rem; color:#666; margin:8px 0;">${(product.desc || "بكج متكامل").substring(0, 80)}</div>
                    <div class="price-row" style="display:flex; justify-content:space-between; align-items:center; margin-top:10px;">
                        <div>
                            <span class="price" style="font-weight:bold; color:#e74c3c; font-size:1.2rem;">${product.price} ₪</span>

                            <button class="add-cart" data-id="${product.id}" data-name="${product.name}" data-price="${product.price}" data-img="${product.img}" style="background:${btnColor}; color:white; border:none; padding:5px 12px; border-radius:30px;"> إضافة إلى السلة</button>

    // اختيار البطاقة المناسبة حسب القسم أو الفئة
    function getCard(product) {
        if (!product) return '';
        
        // إذا كان بكج
        if (product.section === 'packages') {
            return createPackageCard(product);
        }
        
        // حسب الفئة
        if (product.category === 'أعشاب طبيعية') return createHerbCard(product);
        if (product.category === 'زيوت مركزة') return createOilCard(product);
        if (product.category === 'بهارات') return createSpiceCard(product);
        if (product.category === 'منتجات عناية') return createCareCard(product);
        
        return createHerbCard(product);
    }

    // ========== حساب المنتجات الأكثر مبيعاً من الطلبات ==========
    function getBestSellingProductsFromOrders(limit = 12) {
        let allOrders = JSON.parse(localStorage.getItem('elixir_orders')) || [];
        let allProducts = JSON.parse(localStorage.getItem('elixir_products')) || [];
        let allPackages = JSON.parse(localStorage.getItem('elixir_packages')) || [];
        
        // دمج المنتجات والبكجات معاً
        let allItems = [...allProducts, ...allPackages.map(pkg => ({ ...pkg, isPackage: true, section: "packages" }))];
        
        let salesMap = new Map();
        
        allOrders.forEach(order => {
            if (order.items && order.items.length > 0) {
                order.items.forEach(item => {
                    const productName = item.name;
                    const quantity = item.qty || item.quantity || 1;
                    salesMap.set(productName, (salesMap.get(productName) || 0) + quantity);
                });
            }
        });
        
        let sortedProducts = Array.from(salesMap.entries())
            .map(([name, total]) => ({ name, total }))
            .sort((a, b) => b.total - a.total)
            .slice(0, limit);
        
        let bestSellingWithDetails = [];
        for (let i = 0; i < sortedProducts.length; i++) {
            let item = sortedProducts[i];
            let product = allItems.find(p => p.name === item.name);
            
            if (product) {
                bestSellingWithDetails.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    img: product.image || product.img || "asset/images/placeholder.png",
                    category: product.category,
                    desc: product.description || product.desc || product.usage,
                    usage: product.usage,
                    bgColor: product.bgColor,
                    btnColor: product.btnColor,
                    section: product.section || (product.isPackage ? "packages" : "herbs"),
                    totalSold: item.total,
                    rank: i + 1
                });
            } else {
                bestSellingWithDetails.push({
                    id: null,
                    name: item.name,
                    price: 0,
                    img: "asset/images/placeholder.png",
                    category: "منتجات",
                    desc: "",
                    totalSold: item.total,
                    rank: i + 1
                });
            }
        }
        
        return bestSellingWithDetails;
    }

    // ========== عرض المنتجات الأكثر مبيعاً ==========
    function renderBestSelling() {
        const grid = document.getElementById("bestSellingGrid");
        if (!grid) return;
        
        const bestSellingProducts = getBestSellingProductsFromOrders(12);
        
        if (bestSellingProducts.length === 0) {
            grid.innerHTML = `
                <div class="no-results">
                    <i class="fas fa-trophy"></i>
                    <h3>🏆 لا توجد منتجات مباعة بعد</h3>
                    <p>عندما يقوم العملاء بتقديم طلبات، ستظهر المنتجات الأكثر مبيعاً هنا تلقائياً</p>
                </div>
            `;
            return;
        }
        
        let html = '';
        for (let product of bestSellingProducts) {
            html += getCard(product);
        }
        grid.innerHTML = html;
        bindFavEvents(); 
        
        // ربط الأحداث
        document.querySelectorAll('.add-cart').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                let cart = JSON.parse(localStorage.getItem('elixir_cart')) || [];
                let existing = cart.find(item => item.id == this.dataset.id);
                if (existing) existing.quantity++;
                else cart.push({ 
                    id: parseInt(this.dataset.id), 
                    name: this.dataset.name, 
                    price: parseFloat(this.dataset.price), 
                    img: this.dataset.img, 
                    quantity: 1 
                });
                localStorage.setItem('elixir_cart', JSON.stringify(cart));
                showToast(`✅ تمت إضافة ${this.dataset.name} إلى السلة`);
                updateCartBadge();
                if (window.updateFloatingCart) window.updateFloatingCart();
            });
        });
        
        document.querySelectorAll('.view-details').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                window.location.href = `product-details.html?id=${this.dataset.id}`;
            });
        });
        
       // ========== دوال المفضلة (مثل الأعشاب) ==========
function updateFavorite(icon, productId) {
    let favorites = JSON.parse(localStorage.getItem('elixir_favorites')) || [];
    const index = favorites.indexOf(productId);
    if (index === -1) {
        favorites.push(productId);
        icon.classList.add('active');
        icon.innerHTML = '<i class="fa-solid fa-heart"></i>';
        showToast('❤️ تم إضافة المنتج إلى المفضلة');
    } else {
        favorites.splice(index, 1);
        icon.classList.remove('active');
        icon.innerHTML = '<i class="fa-regular fa-heart"></i>';
        showToast('💔 تم إزالة المنتج من المفضلة');
    }
    localStorage.setItem('elixir_favorites', JSON.stringify(favorites));
    
    // تحديث العدد في الهيدر
    const favCount = document.querySelector('.favorite-count');
    if (favCount) favCount.innerText = favorites.length;
}

function burstHearts(x, y) {
    for (let i = 0; i < 10; i++) {
        const heart = document.createElement('div');
        heart.innerHTML = '❤️';
        heart.classList.add('heart-particle');
        const offsetX = (Math.random() - 0.5) * 50;
        const offsetY = (Math.random() - 0.5) * 40;
        heart.style.left = (x + offsetX) + 'px';
        heart.style.top = (y + offsetY) + 'px';
        heart.style.animationDelay = (Math.random() * 0.2) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1000);
    }
}

// ربط أحداث المفضلة (مثل الأعشاب - باستخدام delegation على الحاوية)
function bindFavEvents() {
    const container = document.getElementById('bestSellingGrid');
    if (!container) return;
    
    container.addEventListener('click', (e) => {
        const heartIcon = e.target.closest('.fav-icon');
        if (!heartIcon) return;
        e.preventDefault();
        e.stopPropagation();
        
        const rect = heartIcon.getBoundingClientRect();
        burstHearts(rect.left + rect.width / 2, rect.top + rect.height / 2);
        
        const productId = parseInt(heartIcon.getAttribute('data-id'));
        updateFavorite(heartIcon, productId);
    });
}
    }

    function updateCartBadge() {
        const cart = JSON.parse(localStorage.getItem('elixir_cart')) || [];
        const total = cart.reduce((sum, item) => sum + item.quantity, 0);
        const badge = document.querySelector('.cart-count');
        if (badge) badge.innerText = total;
    }

    // زر الرجوع للأعلى
    const scrollBtn = document.getElementById('scrollTopBtn');
    if (scrollBtn) {
        window.addEventListener('scroll', () => {
            scrollBtn.style.display = window.scrollY > 300 ? 'flex' : 'none';
        });
        scrollBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }
    
    // تحديث عدد السلة
    updateCartBadge();
    
    // عرض المنتجات
    renderBestSelling();
    
    // الاستماع للتغييرات في localStorage
    window.addEventListener('storage', function(e) {
        if (e.key === 'elixir_orders' || e.key === 'elixir_products' || e.key === 'elixir_packages') {
            renderBestSelling();
        }
    });
</script>

<body>

<!-- الهيدر الثابت -->
<header>
    <div class="main-header">

</header>

<div class="container">
    <!-- شريط الفلتر -->
    <div class="filter-bar">
        <span class="filter-label"> تصفية المنتجات:</span>
        <select id="filterSelect" class="filter-select">
            <option value="all">الكل</option>
            <option value="تونر">تونر منعش</option>
            <option value="صابون">صابون طبيعي</option>
            <option value="مقشر">مقشرات طبيعية</option>
            <option value="مرطب">مرطبات وكريمات</option>
            <option value="أخرى">أخرى</option>
        </select>
        <button id="resetFilter" class="reset-filter"> إعادة ضبط</button>
    </div>

    <div class="products-grid" id="careGrid"></div>

    <div class="back-home">
        <a href="index.html"><i class="fas fa-arrow-right"></i> العودة إلى الرئيسية</a>
    </div>
</div>

<div id="customToast" class="toast-message">
    <i class="fas fa-check-circle"></i>
    <span id="toastText"></span>
</div>

<button id="scrollTopBtn" class="scroll-top-btn" style="display:none;">
    <i class="fas fa-arrow-up"></i>
</button>
<link rel="stylesheet" href="floating-cart.css">
<script src="floating-cart.js"></script>

        { id: 15, name: "ماسك العسل والشوفان والزبادي", category: "مقشر", desc: "ماسك طبيعي مغذي للبشرة، يساعد على ترطيبها وتنظيفها وتغذيتها.", price: 16, rating: 4.8, img: "asset/images/honey-oat-mask.jpg" },
        { id: 16, name: "مقشر السكر والليمون", category: "مقشر", desc: "مقشر طبيعي يُستخدم لتنظيف البشرة وتقشيرها، يساعد على إزالة الخلايا الميتة.", price: 14, rating: 4.5, img: "asset/images/lemon-scrub.jpg" },

        { id: 20, name: "لوشن الورد المرطب للجسم", category: "مرطب", desc: "لوشن خفيف القوام وسريع الامتصاص، يجمع بين انتعاش ماء الورد وفوائد الشاي الأبيض.", price: 40, rating: 4.6, img: "asset/images/rose-lotion-body.jpg" },

        { id: 22, name: "شمع الورد المرطب", category: "مرطب", desc: "قوالب شمعية صغيرة تذوب بمجرد ملامستها لحرارة الجلد، مصممة لعلاج جفاف المفاصل واليدين.", price: 25, rating: 4.5, img: "asset/images/rose-wax.jpg" },
        { id: 23, name: "جل الصبار (الألوفيرا)", category: "مرطب", desc: "جل طبيعي يُستخرج من أوراق الألوفيرا، يتميز بخصائصه المرطبة والمهدئة.", price: 18, rating: 4.8, img: "asset/images/aloe-gel.jpg" },
        { id: 24, name: "ماء الورد المقطر الطبيعي", category: "أخرى", desc: "ماء عطري طبيعي مستخلص من تقطير بتلات الورد، يُستخدم كتونر طبيعي وبخاخ منعش.", price: 15, rating: 4.7, img: "asset/images/rose-water.jpg" },
        { id: 25, name: "الليفة المغربية الأصلية", category: "أخرى", desc: "ليفة فاخرة مصممة خصيصاً للتقشير العميق ومساعدة البشرة على امتصاص الزيوت والكريمات بشكل أفضل.", price: 25, rating: 4.9, img: "asset/images/moroccan-loofah.png" },
        { id: 26, name: "طين الغسول المغربي الطبيعي", category: "أخرى", desc: "مستحضر تجميل طبيعي عبارة عن طين معدني يستخدم منذ قرون للعناية بالبشرة والشعر.", price: 20, rating: 4.6, img: "asset/images/ghassoul-clay.jpg" },
        { id: 27, name: "الحجر الخفاف الطبيعي", category: "أخرى", desc: "أداة تجميل طبيعية تستخدم لتقشير البشرة وتنظيفها وإزالة الجلد الميت.", price: 12, rating: 4.5, img: "asset/images/pumice-stone.jpg" },
        { id: 38, name: "بتلات الورد الطبيعية المجففة", category: "أخرى", desc: "أوراق ورد طبيعية مجففة بعناية، تستخدم في الاسترخاء والعناية الشخصية.", price: 10, rating: 4.8, img: "asset/images/rose-petals.jpg" },
        { id: 29, name: "كحل الإثمد الأصفهاني بماء الورد وماء زمزم", category: "أخرى", desc: "منتج تقليدي فاخر محضر من حجر الإثمد الأصلي، يمنح العين برودة وانتعاشاً.", price: 35, rating: 4.9, img: "asset/images/kohl.jpg" },
        { id: 30, name: "مرطب بلون دم الغزال للشفاه والخدود", category: "مرطب", desc: "منتج طبيعي مزدوج المفعول يجمع بين الترطيب واللون الوردي الطبيعي.", price: 30, rating: 4.7, img: "asset/images/ghazal.jpg" },
        { id: 31, name: "بودرة الورد الطبيعي", category: "أخرى", desc: "منتج طبيعي 100% متعدد الاستخدامات، يستخلص من الورد الطبيعي.", price: 18, rating: 4.6, img: "asset/images/rose-powder.jpg" },
        { id: 32, name: "الليفة الطبيعية (اللوفا)", category: "أخرى", desc: "ليفة فاخرة من قلب الطبيعة مصممة خصيصاً للتنظيف العميق للحصول على بشرة منتعشة.", price: 25, rating: 4.9, img: "asset/images/nature-loofah.png" },

    ];

    // ========== دوال العرض والفلاتر ==========
    function renderProducts(selectedCategory = 'all') {
        const grid = document.getElementById("careGrid");
        let filtered = careData;
        if (selectedCategory !== 'all') {
            filtered = careData.filter(item => item.category === selectedCategory);
        }
        if (filtered.length === 0) {
            grid.innerHTML = `<div class="no-results"><i class="fas fa-search"></i> لا توجد منتجات مطابقة للفلتر</div>`;
            return;
        }
        grid.innerHTML = filtered.map(item => {
            let categoryText = "";
            switch(item.category) {
                case "تونر": categoryText = "🌸 تونر منعش"; break;
                case "صابون": categoryText = "🧼 صابون طبيعي"; break;
                case "مقشر": categoryText = "✨ مقشر طبيعي"; break;
                case "مرطب": categoryText = "💧 مرطب وكريم"; break;
                case "زيت": categoryText = "💎 زيت للعناية"; break;
                default: categoryText = "🌸 عناية شخصية";
            }
            
            let isFav = false;
            let favorites = JSON.parse(localStorage.getItem('elixir_favorites')) || [];
            if (favorites.includes(item.id)) isFav = true;
            
            return `
            <div class="care-card" data-id="${item.id}">
                <div class="fav-icon ${isFav ? 'active' : ''}" data-id="${item.id}">
                    <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart"></i>
                </div>
                <img class="care-img" src="${item.img}" alt="${item.name}" onerror="this.src='asset/images/placeholder.png'">
                <div class="care-info">
                    <div class="care-cat">${categoryText}</div>
                    <div class="care-title">${item.name}</div>
                    <div class="care-desc">${item.desc.substring(0, 100)}${item.desc.length > 100 ? '...' : ''}</div>
                    <div class="price-row">
                        <span class="price">${item.price} ₪</span>
                        <div class="btn-group">
                            <button class="view-details" data-id="${item.id}" data-name="${item.name}"> عرض التفاصيل</button>
                            <button class="add-cart" data-id="${item.id}" data-name="${item.name}" data-price="${item.price}" data-img="${item.img}"> إضافة إلى السلة</button>
                        </div>
                    </div>
                </div>
            </div>
            `;
        }).join('');
        
        if (window.applyFadeToNewCards) window.applyFadeToNewCards();
        bindAddToCartEvents();
        bindViewDetailsEvents();
    }

    // ربط أزرار الإضافة إلى السلة
    function bindAddToCartEvents() {
        document.querySelectorAll('.add-cart').forEach(btn => {
            btn.removeEventListener('click', handleAddToCart);
            btn.addEventListener('click', handleAddToCart);
        });
    }
    
    function handleAddToCart(e) {
        e.preventDefault();
        const id = parseInt(e.currentTarget.getAttribute('data-id'));
        const name = e.currentTarget.getAttribute('data-name');
        const price = parseFloat(e.currentTarget.getAttribute('data-price'));
        const img = e.currentTarget.getAttribute('data-img');
        addToCart(id, name, price, img);
        showToast(`تمت إضافة ${name} بنجاح، يتمنى ${name} أن ينال إعجابكم 😊`);
    }
    
    function addToCart(id, name, price, img) {
        let cart = JSON.parse(localStorage.getItem('elixir_cart')) || [];
        const existing = cart.find(item => item.id === id);
        if (existing) existing.quantity++;
        else cart.push({ id, name, price, img, quantity: 1 });
        localStorage.setItem('elixir_cart', JSON.stringify(cart));
        updateCartBadge();
    }
    
    function updateCartBadge() {
        const cart = JSON.parse(localStorage.getItem('elixir_cart')) || [];
        const total = cart.reduce((sum, item) => sum + item.quantity, 0);
        const badge = document.querySelector('.cart-count');
        if (badge) badge.innerText = total;
    }
    
    function bindViewDetailsEvents() {
        document.querySelectorAll('.view-details').forEach(btn => {
            btn.removeEventListener('click', handleViewDetails);
            btn.addEventListener('click', handleViewDetails);
        });
    }
    
    function handleViewDetails(e) {
        e.preventDefault();
        const id = e.currentTarget.getAttribute('data-id');
        window.location.href = `product-details.html?id=${id}`;
    }
    
    // ========== المفضلة ==========
    function updateFavorite(icon, productId) {
        let favorites = JSON.parse(localStorage.getItem('elixir_favorites')) || [];
        const index = favorites.indexOf(productId);
        if (index === -1) {
            favorites.push(productId);
            icon.classList.add('active');
            icon.innerHTML = '<i class="fa-solid fa-heart"></i>';
        } else {
            favorites.splice(index, 1);
            icon.classList.remove('active');
            icon.innerHTML = '<i class="fa-regular fa-heart"></i>';
        }
        localStorage.setItem('elixir_favorites', JSON.stringify(favorites));
        const favCount = document.querySelector('.favorite-count');
        if (favCount) favCount.innerText = favorites.length;
    }
    
    function burstHearts(x, y) {
        for (let i = 0; i < 10; i++) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.classList.add('heart-particle');
            const offsetX = (Math.random() - 0.5) * 50;
            const offsetY = (Math.random() - 0.5) * 40;
            heart.style.left = (x + offsetX) + 'px';
            heart.style.top = (y + offsetY) + 'px';
            heart.style.animationDelay = (Math.random() * 0.2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }
    }
    
    // تفويض حدث القلب
    const grid = document.getElementById('careGrid');
    if (grid) {
        grid.addEventListener('click', (e) => {
            const heartIcon = e.target.closest('.fav-icon');
            if (!heartIcon) return;
            e.preventDefault();
            e.stopPropagation();
            const rect = heartIcon.getBoundingClientRect();
            burstHearts(rect.left + rect.width / 2, rect.top + rect.height / 2);
            const productId = parseInt(heartIcon.getAttribute('data-id'));
            updateFavorite(heartIcon, productId);
        });
    }
    
    // تأثير fade-up
    (function() {
        const elements = document.querySelectorAll('.care-card, .product-card, .collection-card, section');
        elements.forEach(el => el.classList.add('fade-up'));
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });
        elements.forEach(el => observer.observe(el));
        window.applyFadeToNewCards = function() {
            document.querySelectorAll('.care-card:not(.fade-up)').forEach(card => {
                card.classList.add('fade-up');
                observer.observe(card);
            });
        };
    })();
    
    // فلتر
    const filterSelect = document.getElementById('filterSelect');
    filterSelect.addEventListener('change', () => renderProducts(filterSelect.value));
    document.getElementById('resetFilter').addEventListener('click', () => {
        filterSelect.value = 'all';
        renderProducts('all');
    });
    
    // زر الرجوع للأعلى
    const scrollBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 300) scrollBtn.style.display = 'flex';
        else scrollBtn.style.display = 'none';
    });
    scrollBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    
    // توست
    function showToast(message) {
        const toast = document.getElementById('customToast');
        const toastText = document.getElementById('toastText');
        toastText.innerHTML = message;
        toast.style.display = 'flex';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }
    
    // تحديث عداد السلة عند التحميل
    updateCartBadge();
    renderProducts('all');
</script>
</body>
</html>

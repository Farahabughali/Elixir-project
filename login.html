<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elixer</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    
    <div class="card">
        <div class="image-placeholder">
            <img src="asset/images/logo.png" alt="Elixir Logo" style="width: 70px;">
        </div>

        <div class="hero-text">
            <p>🌿 استكشف قوة الطبيعة مع منتجاتنا العشبية<br>والزيوت العطرية الفلسطينية الأصلية </p>
        </div>

        <div class="titles">
            <h2 class="active">تسجيل الدخول</h2>
        </div>

        <form>
            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="tel" value="059*******" placeholder="رقم الهاتف">
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="كلمة المرور">
            </div>
        
            <div class="remember-forgot">
    
    <div class="forgot-link">
        <a href="forgot-password.html"><i class="far fa-question-circle"></i> نسيت كلمة المرور؟</a>
    </div>
    <div class="remember-me">
        <input type="checkbox" id="remember" name="remember">
        <label for="remember">تذكرني</label>
    </div>
</div>
            <button type="submit" class="login-btn" onclick="window.location.href='wholesale.html'">
                دخول <i class="fas fa-arrow-left"></i>
            </button>
        </form>

    </div>
</body>
</html>

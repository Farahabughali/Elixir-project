</header>

<div class="container">
    <div class="filter-bar">
        <span class="filter-label"> تصفية المنتجات:</span>
        <select id="filterSelect" class="filter-select">
            <option value="all">الكل</option>

            <option value="نباتي">زيوت نباتية ثابتة</option>
            <option value="للشعر">للشعر والبشرة</option>
        </select>
        <button id="resetFilter" class="reset-filter"> إعادة ضبط</button>
    </div>
    <div class="products-grid" id="oilsGrid"></div>
    <div class="back-home"><a href="index.html"><i class="fas fa-arrow-right"></i> العودة إلى الرئيسية</a></div>
</div>

<div id="customToast" class="toast-message"><i class="fas fa-check-circle"></i><span id="toastText"></span></div>
<button id="scrollTopBtn" class="scroll-top-btn" style="display:none;"><i class="fas fa-arrow-up"></i></button>

<link rel="stylesheet" href="floating-cart.css">
<script src="floating-cart.js"></script>
<script src="floating-share.js"></script>

<script>
    const oilsData = [
        { id: 38, name: "زيت اللافندر العطري", category: "عطري", desc: "مهدئ للأعصاب، يساعد على الاسترخاء والنوم العميق", price: 38, img: "asset/images/lavender.jpg" },
    { id: 39, name: "زيت الورد الجوري", category: "عطري", desc: "مضاد للشيخوخة، مرطب طبيعي للبشرة", price: 185, img: "asset/images/rose.jpg" },
    { id: 40, name: "زيت إكليل الجبل", category: "عطري", desc: "منشط للدورة الدموية، يقوي بصيلات الشعر", price: 55, img: "asset/images/rosemaryoil.png" },
    { id: 41, name: "زيت النعناع الفلفلي", category: "عطري", desc: "يخفف الصداع وانسداد الأنف، منعش ومنشط", price: 30, img: "asset/images/peppermint.jpg" },
    { id: 42, name: "زيت الياسمين", category: "عطري", desc: "مضاد للتوتر، يحسن المزاج، يمنح رائحة فواحة", price: 45, img: "asset/images/jasmine-oil.png" },
    { id: 43, name: "زيت شجرة الشاي", category: "عطري", desc: "مطهر طبيعي، مضاد لحب الشباب والفطريات", price: 42, img: "asset/images/teatree.jpg" },
    { id: 44, name: "زيت البابونج", category: "عطري", desc: "مهدئ للبشرة الحساسة، يخفف الالتهابات", price: 48, img: "asset/images/Chamomileoil.png" },
    { id: 45, name: "زيت البرتقال الحلو", category: "عطري", desc: "منشط للذهن، يخفف القلق، يضيء البشرة", price: 35, img: "asset/images/orangeoil.jpg" },
    { id: 46, name: "زيت الليمون", category: "عطري", desc: "مضاد للبكتيريا، ينقي الهواء، يمنح طاقة", price: 32, img: "asset/images/lemon.jpg" },
    { id: 47, name: "زيت اليانغ يانغ", category: "عطري", desc: "متوازن للهرمونات، يمنح رائحة استوائية جذابة", price: 50, img: "asset/images/ylang.jpg" },
    { id: 48, name: "زيت المريمية", category: "عطري", desc: "يساعد في تخفيف التعرق الليلي وأعراض سن اليأس", price: 40, img: "asset/images/sage.jpg" },
    { id: 49, name: "زيت الزعتر", category: "عطري", desc: "مضاد للسعال والتهاب الحلق، يقوي المناعة", price: 38, img: "asset/images/thyme.jpg" },
    { id: 50, name: "زيت الزيتون البكر الفلسطيني", category: "نباتي", desc: "مرطب طبيعي، غني بمضادات الأكسدة", price: 45, img: "asset/images/olive.jpg" },
    { id: 51, name: "زيت اللوز الحلو", category: "نباتي", desc: "مرطب عميق، غني بفيتامين E، مناسب لجميع البشرة", price: 42, img: "asset/images/almondoil.png" },
    { id: 52, name: "زيت جوز الهند العضوي", category: "نباتي", desc: "للشعر والبشرة، يرطب ويغذي بعمق", price: 35, img: "asset/images/coconut.jpg" },
    { id: 53, name: "زيت الأرجان المغربي", category: "نباتي", desc: "لترطيب البشرة والشعر، غني بمضادات الأكسدة", price: 75, img: "asset/images/argan.jpg" },
    { id: 54, name: "زيت الجوجوبا", category: "نباتي", desc: "مشابه لزيت البشرة الطبيعي، مناسب للبشرة الدهنية", price: 65, img: "asset/images/jojoba.jpg" },
    { id: 55, name: "زيت السمسم", category: "نباتي", desc: "غني بفيتامين E، يحمي البشرة من الشمس", price: 30, img: "asset/images/sesame.jpg" },
    { id: 56, name: "زيت الخروع", category: "نباتي", desc: "يطيل الشعر ويكثفه، ينعم الحواجب والرموش", price: 28, img: "asset/images/castor.jpg" },
    { id: 57, name: "زيت المشمش", category: "نباتي", desc: "خفيف وسريع الامتصاص، مناسب للبشرة الحساسة", price: 50, img: "asset/images/apricot.jpg" },
    { id: 58, name: "زيت بذور العنب", category: "نباتي", desc: "قابض طبيعي، مناسب للبشرة الدهنية والمختلطة", price: 40, img: "asset/images/grapeseed.jpg" },
    { id: 59, name: "زيت الأفوكادو", category: "نباتي", desc: "غني بالأحماض الدهنية، مثالي للبشرة الجافة والتالفة", price: 60, img: "asset/images/avocado.jpg" },
    { id: 60, name: "زيت الخروع الأسود", category: "للشعر", desc: "يقوي الشعر ويمنع التساقط، يطيل الرموش", price: 35, img: "asset/images/blackcastor.jpg" },
    { id: 62, name: "زيت اللوز المر", category: "للشعر", desc: "يفتح البشرة، يقلل الهالات السوداء", price: 38, img: "asset/images/bitteralmond.jpg" },
    { id: 63, name: "زيت الورد المسك", category: "للشعر", desc: "يقلل علامات التمدد والندبات", price: 55, img: "asset/images/mosquerose.jpg" },
    { id: 64, name: "زيت الأوكالبتوس", category: "للشعر", desc: "يفتح المجاري التنفسية، يخفف آلام العضلات", price: 32, img: "asset/images/eucalyptus.jpg" },
    { id: 65, name: "زيت القرنفل", category: "للشعر", desc: "مسكن لآلام الأسنان، مضاد للالتهابات", price: 30, img: "asset/images/clove.jpg" },
    { id: 66, name: "زيت الحبة السوداء", category: "للشعر", desc: "يقوي المناعة، يعالج مشاكل الجلد والشعر", price: 40, img: "asset/images/blackseed.jpg" },
    { id: 67, name: "زيت الباتشولي", category: "للشعر", desc: "مضاد للفطريات، يمنح رائحة ترابية دافئة", price: 45, img: "asset/images/patchouli.jpg" },
    ];

    function renderProducts(selectedCategory = 'all') {
        const grid = document.getElementById("oilsGrid");
        let filtered = oilsData;
        if (selectedCategory !== 'all') filtered = oilsData.filter(oil => oil.category === selectedCategory);
        if (filtered.length === 0) {
            grid.innerHTML = `<div class="no-results"><i class="fas fa-search"></i> لا توجد زيوت مطابقة للفلتر</div>`;
            return;
        }
        grid.innerHTML = filtered.map(oil => {
            let categoryText = "";
            if (oil.category === "عطري") categoryText = "زيت عطري";
            else if (oil.category === "نباتي") categoryText = "زيت نباتي ثابت";
            else categoryText = "للبشرة والشعر";
            let isFav = JSON.parse(localStorage.getItem('elixir_favorites') || []).includes(oil.id);
            return `
            <div class="oil-card">
                <div class="fav-icon ${isFav ? 'active' : ''}" data-id="${oil.id}"><i class="fa-${isFav ? 'solid' : 'regular'} fa-heart"></i></div>
                <img class="oil-img" src="${oil.img}" alt="${oil.name}" onerror="this.src='asset/images/placeholder.png'">
                <div class="oil-info">
                    <div class="oil-cat">${categoryText}</div>
                    <div class="oil-title">${oil.name}</div>
                    <div class="oil-desc">${oil.desc}</div>
                    <div class="price-row">
                        <span class="price">${oil.price} ₪</span>
                        <div class="btn-group">
                            <button class="view-details" data-id="${oil.id}" data-name="${oil.name}"> عرض التفاصيل</button>
                            <button class="add-cart" data-id="${oil.id}" data-name="${oil.name}" data-price="${oil.price}" data-img="${oil.img}"> إضافة إلى السلة</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
        if (window.applyFadeToNewCards) window.applyFadeToNewCards();
    }

    // ✅ تفويض الحدث لإضافة إلى السلة – هذه هي الإضافة الصحيحة
    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.add-cart');
        if (!btn) return;
        e.preventDefault();

        const id = parseInt(btn.dataset.id);
        const name = btn.dataset.name;
        const price = parseFloat(btn.dataset.price);
        const img = btn.dataset.img;

        let cart = JSON.parse(localStorage.getItem('elixir_cart') || '[]');
        const existing = cart.find(item => item.id === id);
        existing ? existing.quantity++ : cart.push({ id, name, price, img, quantity: 1 });
        localStorage.setItem('elixir_cart', JSON.stringify(cart));

        if (window.updateFloatingCart) window.updateFloatingCart();
        const headerBadge = document.querySelector('.cart-count');
        if (headerBadge) headerBadge.innerText = cart.reduce((sum, i) => sum + i.quantity, 0);

        const toast = document.getElementById('customToast');
        if (toast) {
            document.getElementById('toastText').innerText = `تمت إضافة ${name} بنجاح، يتمنى ${name} أن ينال إعجابكم 😊`;
            toast.style.display = 'flex';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    });

    // عرض التفاصيل
    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.view-details');
        if (btn) {
            e.preventDefault();
            const id = btn.dataset.id;
            if (id) window.location.href = 'product-details.html?id=' + id;
        }
    });
        // تأثير fade-up
    (function() {
        const elements = document.querySelectorAll('.oil-card, .product-card, .collection-card, section');
        elements.forEach(el => el.classList.add('fade-up'));
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });
        elements.forEach(el => observer.observe(el));
        window.applyFadeToNewCards = function() {
            document.querySelectorAll('.oil-card:not(.fade-up)').forEach(card => {
                card.classList.add('fade-up');
                observer.observe(card);
            });
        };
    })();

    // الفلتر
    const filterSelect = document.getElementById('filterSelect');
    filterSelect.addEventListener('change', () => renderProducts(filterSelect.value));
    document.getElementById('resetFilter').addEventListener('click', () => renderProducts('all'));

    // زر الرجوع للأعلى
    const scrollBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => scrollBtn.style.display = window.scrollY > 300 ? 'flex' : 'none');
    scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // البداية
    renderProducts('all');
    // ========== دوال المفضلة (مع الحفاظ على القلوب المتطايرة والتأثيرات) ==========
function burstHearts(x, y) {
    for (let i = 0; i < 12; i++) {
        const heart = document.createElement('div');
        heart.innerHTML = '❤️';
        heart.classList.add('heart-particle');
        const offsetX = (Math.random() - 0.5) * 60;
        const offsetY = (Math.random() - 0.5) * 50;
        heart.style.left = (x + offsetX) + 'px';
        heart.style.top = (y + offsetY) + 'px';
        heart.style.animationDelay = (Math.random() * 0.2) + 's';
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 1000);
    }
}

function updateFavCount() {
    let favorites = JSON.parse(localStorage.getItem('elixir_favorites') || '[]');
    const countSpan = document.querySelector('.favorite-count');
    if (countSpan) countSpan.innerText = favorites.length;
}

function toggleFavorite(icon, productId) {
    // تطاير القلوب
    const rect = icon.getBoundingClientRect();
    burstHearts(rect.left + rect.width / 2, rect.top + rect.height / 2);
    
    let favorites = JSON.parse(localStorage.getItem('elixir_favorites') || '[]');
    const index = favorites.indexOf(productId);
    
    if (index === -1) {
        favorites.push(productId);
        icon.classList.add('active');
        icon.innerHTML = '<i class="fa-solid fa-heart"></i>';
    } else {
        favorites.splice(index, 1);
        icon.classList.remove('active');
        icon.innerHTML = '<i class="fa-regular fa-heart"></i>';
    }
    localStorage.setItem('elixir_favorites', JSON.stringify(favorites));
    updateFavCount();
}

// ربط أحداث القلب بعد تحميل المنتجات
function attachFavEvents() {
    document.querySelectorAll('.fav-icon').forEach(icon => {
        icon.removeEventListener('click', window.favHandler);
        window.favHandler = (e) => {
            e.stopPropagation();
            const id = parseInt(icon.getAttribute('data-id'));
            toggleFavorite(icon, id);
        };
        icon.addEventListener('click', window.favHandler);
    });
}

// تعديل دالة renderProducts لربط أحداث القلب بعد التحديث (بدون كسر أي شيء)
const originalRender = renderProducts;
renderProducts = function(selectedCategory = 'all') {
    originalRender(selectedCategory);
    attachFavEvents();
};

// تشغيل ربط الأحداث بعد التحميل الأول
attachFavEvents();
updateFavCount();
</script>
</body>
</html>

    ];

    function renderProducts(selectedCategory = 'all') {
        const grid = document.getElementById("oilsGrid");
        let filtered = oilsData;
        if (selectedCategory !== 'all') {
            filtered = oilsData.filter(oil => oil.category === selectedCategory);
        }
        if (filtered.length === 0) {
            grid.innerHTML = `<div class="no-results"><i class="fas fa-search"></i> لا توجد زيوت مطابقة للفلتر</div>`;
            return;
        }
        grid.innerHTML = filtered.map(oil => {
    let categoryText = "";
    if (oil.category === "عطري") categoryText = "زيت عطري";
    else if (oil.category === "نباتي") categoryText = "زيت نباتي ثابت";
    else categoryText = "للبشرة والشعر";
    
    // التحقق إذا كان المنتج موجوداً في المفضلة (localStorage)
    let isFav = false;
    let favorites = JSON.parse(localStorage.getItem('elixir_favorites')) || [];
    if (favorites.includes(oil.id)) isFav = true;
    
    return `
    <div class="oil-card" data-id="${oil.id}">
        <div class="fav-icon ${isFav ? 'active' : ''}" data-id="${oil.id}">
            <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart"></i>
        </div>
        <img class="oil-img" src="${oil.img}" alt="${oil.name}" onerror="this.src='asset/images/placeholder.png'">
        <div class="oil-info">
            <div class="oil-cat">${categoryText}</div>
            <div class="oil-title">${oil.name}</div>
            <div class="oil-desc">${oil.desc}</div>
            <div class="price-row">
                <span class="price">${oil.price} ₪</span>
                <div class="btn-group">
                    <button class="view-details" data-id="${oil.id}" data-name="${oil.name}"> عرض التفاصيل</button>
                    <button class="add-cart" data-id="${oil.id}" data-name="${oil.name}" data-price="${oil.price}"> إضافة إلى السلة</button>
                </div>
            </div>
        </div>
    </div>
    `;
}).join('');
if (window.applyFadeToNewCards) window.applyFadeToNewCards();

// تأثير Fade-up البسيط
    (function() {
        // إضافة كلاس fade-up لجميع البطاقات والأقسام
        const elements = document.querySelectorAll('.oil-card, .product-card, .collection-card, section');
        elements.forEach(el => el.classList.add('fade-up'));

        // مراقب التمرير
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        // بدء المراقبة
        elements.forEach(el => observer.observe(el));

        // إذا كانت البطاقات تُضاف لاحقاً (مثل بعد الفلتر)، استخدمي هذا السطر داخل دالة renderProducts:
        window.applyFadeToNewCards = function() {
            document.querySelectorAll('.oil-card:not(.fade-up)').forEach(card => {
                card.classList.add('fade-up');
                observer.observe(card);
            });
        };
    })();

        document.querySelectorAll('.add-cart').forEach(btn => {
    btn.addEventListener('click', (e) => {
        e.preventDefault();
        const name = btn.getAttribute('data-name');
        const message = `تمت إضافة ${name} بنجاح، يتمنى ${name} أن ينال إعجابكم 😊`;
        showToast(message);
    });
});
        
     document.querySelectorAll('.view-details').forEach(btn => {
    btn.addEventListener('click', (e) => {
        e.preventDefault();
        const id = btn.getAttribute('data-id');
        // تأكدي أن اسم الملف صحيح
        window.location.href = 'product-details.html?id=' + id;
    });
});
    }
document.querySelectorAll('.view-details').forEach(btn => {
    btn.removeEventListener('click', handleViewDetails);
    btn.addEventListener('click', handleViewDetails);
});
// ========== إدارة المفضلة ==========
function updateFavoriteIcon(iconElement, productId) {
    let favorites = JSON.parse(localStorage.getItem('elixir_favorites')) || [];
    const index = favorites.indexOf(productId);
    if (index === -1) {
        favorites.push(productId);
        iconElement.classList.add('active');
        iconElement.innerHTML = '<i class="fa-solid fa-heart"></i>';
    } else {
        favorites.splice(index, 1);
        iconElement.classList.remove('active');
        iconElement.innerHTML = '<i class="fa-regular fa-heart"></i>';
    }
    localStorage.setItem('elixir_favorites', JSON.stringify(favorites));
}

// بعد إضافة البطاقات إلى DOM، نربط أحداث النقر على أيقونات القلب
function bindFavoriteEvents() {
    document.querySelectorAll('.fav-icon').forEach(icon => {
        icon.removeEventListener('click', handleFavoriteClick);
        icon.addEventListener('click', handleFavoriteClick);
    });
}

    // ========== 1. تأثير القلوب المتطايرة ==========
    function burstHearts(x, y) {
        for (let i = 0; i < 10; i++) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.classList.add('heart-particle');
            const offsetX = (Math.random() - 0.5) * 50;
            const offsetY = (Math.random() - 0.5) * 40;
            heart.style.left = (x + offsetX) + 'px';
            heart.style.top = (y + offsetY) + 'px';
            heart.style.animationDelay = (Math.random() * 0.2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }
    }

// مراقب التمرير (Intersection Observer)
    const fadeObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('visible');
            }
        });
    }, { threshold: 0.15 });

    // دالة لتطبيق التأثير على أي عناصر جديدة
    function applyFadeUpToElements(elements) {
        elements.forEach(el => {
            if (!el.classList.contains('fade-up')) {
                el.classList.add('fade-up');
                fadeObserver.observe(el);
            }
        });
    }

    // تطبيق التأثير على العناصر الثابتة عند تحميل الصفحة
    document.querySelectorAll('section, .product-card, .collection-card, .oil-card, .fav-card')
        .forEach(el => {
            el.classList.add('fade-up');
            fadeObserver.observe(el);
        });

    // إذا كان لديك دالة renderProducts (مثل في oils.html)، أضيفي داخلها هذا السطر:
    // applyFadeUpToElements(document.querySelectorAll('.oil-card, .product-card'));

    // ========== 3. ربط القلب بالمفضلة (مع تأثير القلوب) ==========
    function updateFavorite(icon, productId) {
        let favorites = JSON.parse(localStorage.getItem('elixir_favorites')) || [];
        const index = favorites.indexOf(productId);
        if (index === -1) {
            favorites.push(productId);
            icon.classList.add('active');
            icon.innerHTML = '<i class="fa-solid fa-heart"></i>';
        } else {
            favorites.splice(index, 1);
            icon.classList.remove('active');
            icon.innerHTML = '<i class="fa-regular fa-heart"></i>';
        }
        localStorage.setItem('elixir_favorites', JSON.stringify(favorites));
        const favCount = document.querySelector('.favorite-count');
        if (favCount) favCount.innerText = favorites.length;
    }

    // تفويض الحدث للنقر على القلب داخل الشبكة
    const grid = document.getElementById('oilsGrid');
    if (grid) {
        grid.addEventListener('click', (e) => {
            const heartIcon = e.target.closest('.fav-icon');
            if (!heartIcon) return;
            e.preventDefault();
            e.stopPropagation();
            const rect = heartIcon.getBoundingClientRect();
            burstHearts(rect.left + rect.width / 2, rect.top + rect.height / 2);
            const productId = parseInt(heartIcon.getAttribute('data-id'));
            updateFavorite(heartIcon, productId);
        });
    }

// استدعاء bindFavoriteEvents بعد كل عملية render
// ضع هذا السطر في نهاية دالة renderProducts بعد إضافة المحتوى
// وأضف أيضاً bindFavoriteEvents(); في نهاية الدالة
    const filterSelect = document.getElementById('filterSelect');
    filterSelect.addEventListener('change', () => renderProducts(filterSelect.value));
    document.getElementById('resetFilter').addEventListener('click', () => {
        filterSelect.value = 'all';
        renderProducts('all');
    });
    const scrollBtn = document.getElementById('scrollTopBtn');
window.addEventListener('scroll', () => {
    if (window.scrollY > 300) scrollBtn.style.display = 'flex';
    else scrollBtn.style.display = 'none';
});
scrollBtn.addEventListener('click', () => {
    window.scrollTo({ top: 0, behavior: 'smooth' });
});
    // دالة إظهار الرسالة العائمة
function showToast(message) {
    const toast = document.getElementById('customToast');
    const toastText = document.getElementById('toastText');
    toastText.innerHTML = message;
    toast.style.display = 'flex';
    setTimeout(() => {
        toast.style.display = 'none';
    }, 3000);
}
    // بعد إنشاء البطاقات وقبل إنهاء الدالة
bindFavoriteEvents();
renderProducts('all');
</script>

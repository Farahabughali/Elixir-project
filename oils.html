<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elixir | الزيوت الطبيعية والعطرية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="oils.css">
</head>
<body>

<header>
    <div class="main-header">
        <div class="header-right">
            <a href="index.html" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
                <div class="logo-circle"><img src="asset/images/logo.png" alt="Logo"></div>
                <span class="web-name">Elixir</span>
            </a>
            <a href="oils.html" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
                <span class="page-title-in-header">الزيوت الطبيعية والعطرية</span>
            </a>
        </div>
        <div class="header-left">
            <span class="help-text"> هل تحتاج لمساعدة في اختيار الزيت المناسب لك؟</span>
            <a href="chatbot.html" class="ai-consult-link"><i class="fas fa-robot"></i> استشر الذكاء الاصطناعي</a>
        </div>
    </div>
</header>

<div class="container">
    <div class="filter-bar">
        <span class="filter-label"> تصفية المنتجات:</span>
        <select id="filterSelect" class="filter-select">
            <option value="all">الكل</option>
            <option value="عطري">زيوت عطرية</option>
            <option value="نباتي">زيوت نباتية ثابتة</option>
            <option value="للشعر">للشعر والبشرة</option>
        </select>
        <button id="resetFilter" class="reset-filter"> إعادة ضبط</button>
    </div>
    <div class="products-grid" id="oilsGrid"></div>
    <div class="back-home"><a href="index.html"><i class="fas fa-arrow-right"></i> العودة إلى الرئيسية</a></div>
</div>

<div id="customToast" class="toast-message"><i class="fas fa-check-circle"></i><span id="toastText"></span></div>
<button id="scrollTopBtn" class="scroll-top-btn" style="display:none;"><i class="fas fa-arrow-up"></i></button>

<link rel="stylesheet" href="floating-cart.css">
<script src="floating-cart.js"></script>

<script>
    const oilsData = [
        { id: 1, name: "زيت اللافندر العطري", category: "عطري", desc: "مهدئ للأعصاب، يساعد على الاسترخاء والنوم العميق", price: 18, rating: 4.5, img: "asset/images/lavender.jpg" },
        { id: 2, name: "زيت الورد الجوري", category: "عطري", desc: "مضاد للشيخوخة، مرطب طبيعي للبشرة", price: 55, rating: 4.7, img: "asset/images/rose.jpg" },
        { id: 3, name: "زيت إكليل الجبل", category: "علاجي وللشعر", desc: " منشط للدورة الدموية، يقوي بصيلات الشعر، يقلل القشرة", rating: 4.9, price: 22, img: "asset/images/rosemaryoil.png" },
        { id: 4, name: "زيت النعناع الفلفلي", category: "عطري", desc: "يخفف الصداع وانسداد الأنف، منعش ومنشط", price: 15, rating: 4.7, img: "asset/images/peppermint.jpg" },
        { id: 5, name: "زيت التوليب", category: "عطري", desc: "رائحة عطرية رقيقة، يعمل كمرطب ممتاز للبشرة الجافة ومهدئ قوي يخفف من الإجهاد الذهني والتوتر العاطفي", price: 22, rating: 4.8, img: "asset/images/tulip-oil.png" },
        { id: 6, name: "زيت الفانيلا", category: "عطري وعلاجي", desc: "يبعث على شعور بالراحة، وتحسين الحالة المزاجية ومضاد للالتهابات وتعزيز أجواء المنزل", price: 12, rating: 4.8, img: "asset/images/vanilla-oil.png" },
        { id: 7, name: "زيت الياسمين", category: "عطري", desc: "مضاد للتوتر، يحسن المزاج، يمنح رائحة فواحة", price: 20, rating: 4.8, img: "asset/images/jasmine-oil.png" },
        { id: 8, name: "زيت شجرة الشاي", category: "علاجي", desc: "مطهر طبيعي، مضاد لحب الشباب والفطريات، صحة الشعر وفروة الرأس", price: 19, rating: 4.4, img: "asset/images/teatree.jpg" },
        { id: 9, name: "زيت البابونج", category: "علاجي", desc: "مهدئ للبشرة الحساسة، يخفف الالتهابات", price: 20, rating: 4.5, img: "asset/images/chamomileoil.png" },
        { id: 10, name: "زيت البرتقال الحلو", category: "عطري", desc: "منشط للذهن، يخفف القلق، يضيء البشرة", price: 16, rating: 4.6, img: "asset/images/orangeoil.jpg" },
        { id: 11, name: "زيت الليمون", category: "عطري", desc: "مضاد للبكتيريا، ينقي الهواء، يمنح طاقة", price: 15, rating: 4.5, img: "asset/images/lemon.jpg" },
        { id: 12, name: "زيت اليانغ يانغ", category: "عطري", desc: "متوازن للهرمونات، يمنح رائحة استوائية جذابة", price: 24, rating: 4.7, img: "asset/images/ylang.jpg" },
        { id: 13, name: "زيت المريمية", category: "علاجي", desc: "يساعد في تقليل ظهور الشيب وأعراض سن اليأس ومقاوم للشيخوخة", price: 18, rating: 4.7, img: "asset/images/sage.jpg" },
        { id: 14, name: "زيت الزعتر", category: "علاجي", desc: "مضاد للسعال والتهاب الحلق، يقوي المناعة", price: 17, img: "asset/images/thyme.jpg" },
        { id: 15, name: "زيت الزيتون البكر الفلسطيني", category: "نباتي", desc: "مرطب طبيعي، غني بمضادات الأكسدة", price: 20, img: "asset/images/olive.jpg" },
        { id: 16, name: "زيت اللوز الحلو", category: "نباتي", desc: "مرطب عميق، غني بفيتامين E، مناسب لجميع البشرة", price: 18, img: "asset/images/almondoil.png" },
        { id: 17, name: "زيت جوز الهند العضوي", category: "نباتي", desc: "للشعر والبشرة، يرطب ويغذي بعمق", price: 16, img: "asset/images/coconut.jpg" },
        { id: 18, name: "زيت الأرجان المغربي", category: "للشعر", desc: "لترطيب البشرة والشعر، غني بمضادات الأكسدة", price: 35, img: "asset/images/argan.jpg" },
        { id: 19, name: "زيت الجوجوبا", category: "نباتي", desc: "مشابه لزيت البشرة الطبيعي، مناسب للبشرة الدهنية", price: 30, img: "asset/images/jojoba.jpg" },
        { id: 20, name: "زيت السمسم", category: "نباتي", desc: "غني بفيتامين E، يحمي البشرة من الشمس", price: 14, img: "asset/images/sesame.jpg" },
        { id: 21, name: "زيت الخروع", category: "للشعر", desc: "يطيل الشعر ويكثفه، ينعم الحواجب والرموش", price: 13, img: "asset/images/castor.jpg" },
        { id: 22, name: "زيت المشمش", category: "للبشرة", desc: "خفيف وسريع الامتصاص، مناسب للبشرة الحساسة", price: 22, rating: 4.7, img: "asset/images/apricot.jpg" },
        { id: 23, name: "زيت بذور العنب", category: "نباتي", desc: "قابض طبيعي، مناسب للبشرة الدهنية والمختلطة", price: 18, rating: 4.6, img: "asset/images/grapeseed.jpg" },
        { id: 24, name: "زيت الأفوكادو", category: "للبشرة", desc: "غني بالأحماض الدهنية، مثالي للبشرة الجافة والتالفة", price: 28, rating: 4.8, img: "asset/images/avocado.jpg" },
        { id: 25, name: "زيت الخروع الأسود", category: "للشعر", desc: "ترطيب الشعر الجاف، التالف", price: 16, rating: 4.5, img: "asset/images/blackcastor.jpg" },
        { id: 26, name: "زيت اللوز المر", category: "للشعر والبشرة", desc: "يفتح البشرة، يقلل الهالات السوداء، تعزيز نمو الشعر", price: 17, rating: 4.6, img: "asset/images/bitteralmond.jpg" },
        { id: 27, name: "زيت الورد المسكي", category: "للبشرة", desc: "يقلل علامات التمدد والندبات والبقع الداكنة، ترطيب البشرة", price: 25, rating: 4.7, img: "asset/images/mosquerose.jpg" },
        { id: 28, name: "زيت الأوكالبتوس", category: "للشعر", desc: "يفتح المجاري التنفسية، يخفف آلام العضلات", price: 15, rating: 4.5, img: "asset/images/eucalyptus.jpg" },
        { id: 29, name: "زيت القرنفل", category: "للشعر", desc: "مسكن لآلام الأسنان، مضاد للالتهابات", price: 14, rating: 4.4, img: "asset/images/clove.jpg" },
        { id: 30, name: "زيت الحبة السوداء", category: "للشعر", desc: "يقوي المناعة، يعالج مشاكل الجلد والشعر", price: 18, img: "asset/images/blackseed.jpg" },
        { id: 31, name: "زيت الباتشولي", category: "للشعر", desc: "مضاد للفطريات، يمنح رائحة ترابية دافئة", price: 20, img: "asset/images/patchouli.jpg" }
    ];

    function renderProducts(selectedCategory = 'all') {
        const grid = document.getElementById("oilsGrid");
        let filtered = oilsData;
        if (selectedCategory !== 'all') filtered = oilsData.filter(oil => oil.category === selectedCategory);
        if (filtered.length === 0) {
            grid.innerHTML = `<div class="no-results"><i class="fas fa-search"></i> لا توجد زيوت مطابقة للفلتر</div>`;
            return;
        }
        grid.innerHTML = filtered.map(oil => {
            let categoryText = "";
            if (oil.category === "عطري") categoryText = "زيت عطري";
            else if (oil.category === "نباتي") categoryText = "زيت نباتي ثابت";
            else categoryText = "للبشرة والشعر";
            let isFav = JSON.parse(localStorage.getItem('elixir_favorites') || []).includes(oil.id);
            return `
            <div class="oil-card">
                <div class="fav-icon ${isFav ? 'active' : ''}" data-id="${oil.id}"><i class="fa-${isFav ? 'solid' : 'regular'} fa-heart"></i></div>
                <img class="oil-img" src="${oil.img}" alt="${oil.name}" onerror="this.src='asset/images/placeholder.png'">
                <div class="oil-info">
                    <div class="oil-cat">${categoryText}</div>
                    <div class="oil-title">${oil.name}</div>
                    <div class="oil-desc">${oil.desc}</div>
                    <div class="price-row">
                        <span class="price">${oil.price} ₪</span>
                        <div class="btn-group">
                            <button class="view-details" data-id="${oil.id}" data-name="${oil.name}"> عرض التفاصيل</button>
                            <button class="add-cart" data-id="${oil.id}" data-name="${oil.name}" data-price="${oil.price}" data-img="${oil.img}"> إضافة إلى السلة</button>
                        </div>
                    </div>
                </div>
            </div>`;
        }).join('');
        if (window.applyFadeToNewCards) window.applyFadeToNewCards();
    }

    // ✅ تفويض الحدث لإضافة إلى السلة – هذه هي الإضافة الصحيحة
    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.add-cart');
        if (!btn) return;
        e.preventDefault();

        const id = parseInt(btn.dataset.id);
        const name = btn.dataset.name;
        const price = parseFloat(btn.dataset.price);
        const img = btn.dataset.img;

        let cart = JSON.parse(localStorage.getItem('elixir_cart') || '[]');
        const existing = cart.find(item => item.id === id);
        existing ? existing.quantity++ : cart.push({ id, name, price, img, quantity: 1 });
        localStorage.setItem('elixir_cart', JSON.stringify(cart));

        if (window.updateFloatingCart) window.updateFloatingCart();
        const headerBadge = document.querySelector('.cart-count');
        if (headerBadge) headerBadge.innerText = cart.reduce((sum, i) => sum + i.quantity, 0);

        const toast = document.getElementById('customToast');
        if (toast) {
            document.getElementById('toastText').innerText = `تمت إضافة ${name} بنجاح، يتمنى ${name} أن ينال إعجابكم 😊`;
            toast.style.display = 'flex';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    });

    // عرض التفاصيل
    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.view-details');
        if (btn) {
            e.preventDefault();
            const id = btn.dataset.id;
            if (id) window.location.href = 'product-details.html?id=' + id;
        }
    });

    // الفلتر
    const filterSelect = document.getElementById('filterSelect');
    filterSelect.addEventListener('change', () => renderProducts(filterSelect.value));
    document.getElementById('resetFilter').addEventListener('click', () => renderProducts('all'));

    // زر الرجوع للأعلى
    const scrollBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => scrollBtn.style.display = window.scrollY > 300 ? 'flex' : 'none');
    scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // البداية
    renderProducts('all');
</script>
</body>
</html>

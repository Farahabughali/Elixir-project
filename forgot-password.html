<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Elixir | إعادة تعيين كلمة المرور - تجار الجملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="forgot-password.css">
</head>
<body>
    <div class="reset-card">
        <div class="icon-circle">
            <i class="fas fa-key"></i>
        </div>
        <h1>إعادة تعيين كلمة المرور</h1>
        <p class="subtitle">لتجار الجملة·
            <br> سيتم إرسال كلمة المرور الجديدة عبر رسالة نصية (SMS) إلى رقم هاتفك.</p>

        <div id="successMessage" class="message-box">
            <i class="fas fa-check-circle"></i> تم إرسال كلمة المرور الجديدة إلى رقم الهاتف المدخل.
        </div>
        <div id="errorMessage" class="error-box">
            <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
        </div>

        <form id="resetForm">
            <div class="input-group">
                <i class="fas fa-phone-alt"></i>
                <input type="tel" id="phone" placeholder="رقم الهاتف (مثال: 0599123456)" required>
            </div>
            <div class="input-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="newPassword" placeholder="كلمة المرور الجديدة" required>
            </div>
            <div class="input-group">
                <i class="fas fa-check-circle"></i>
                <input type="password" id="confirmPassword" placeholder="تأكيد كلمة المرور الجديدة" required>
            </div>
            <button type="submit" class="btn-send">
                <i class="fas fa-paper-plane"></i> إرسال كلمة المرور عبر SMS
            </button>
        </form>

        <hr>
        <a href="login.html" class="back-link">
        <a href="login.html" class="fas fa-arrow-right">         العودة إلى تسجيل الدخول
        </a>
        </a>
    </div>

</body>
</html>

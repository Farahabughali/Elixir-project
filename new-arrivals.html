<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elixir | جديدنا</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="floating-cart.css">
    <link rel="stylesheet" href="floating-share.css">
    <link rel="stylesheet" href="new-arrivals.css">
</head>
<body>

<div class="container">
    <div class="main-header">
        <div class="logo-area">
            <a href="index.html" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
                <div class="logo-circle"><img src="asset/images/logo.png" alt="Logo"></div>
            </a>
            <div>
                <div class="web-name">Elixir</div>
                <div class="page-title">جديدنا</div>
            </div>
        </div>
        <div class="ai-consult-area">
            <span class="help-text"> هل تحتاج لمساعدة في اختيار المنتجات المناسبة؟</span>
            <a href="chatbot.html" class="ai-consult-link"><i class="fas fa-robot"></i> استشر الذكاء الاصطناعي</a>
        </div>
    </div>

    <div class="new-header">
        <h1> جديدنا </h1>
    </div>

    <div class="products-grid" id="newArrivalsGrid"></div>

    <div class="back-home">
        <a href="index.html"><i class="fas fa-arrow-right"></i> العودة إلى الرئيسية</a>
    </div>
</div>

<div id="customToast" style="display:none; position:fixed; bottom:20px; right:20px; background:#438e56; color:white; padding:12px 20px; border-radius:30px; z-index:9999;">
    <i class="fas fa-check-circle"></i> <span id="toastText"></span>
</div>

<script src="floating-cart.js"></script>
<script src="floating-share.js"></script>

<script>
    // ========== المنتجات الثابتة (تضل للأبد) ==========
    const FIXED_PRODUCTS = [
        { 
            id: 51, 
            name: "زيت اللوز الحلو العضوي", 
            price: 15, 
            img: "asset/images/almondoil.png",
            isFixed: true  // علامة إنه منتج ثابت
        },
        { 
            id: 84, 
            name: "جارام مسالا بهار هندي", 
            price: 35, 
            img: "asset/images/garammasala.png",
            isFixed: true
        },
        { 
            id: 91, 
            name: "تونر البابونج", 
            price: 58, 
            img: "asset/images/chamomiletoner.png",
            isFixed: true
        }
    ];

    // ========== تحميل المنتجات (ثابتة + من الأدمن) ==========
    function getAllNewArrivals() {
        // 1. جلب المنتجات المؤقتة من localStorage (اللي يضيفها الأدمن)
        let tempProducts = JSON.parse(localStorage.getItem('elixir_new_arrivals') || '[]');
        
        // 2. فلترة المنتجات المؤقتة: اللي لم تنتهي صلاحيتها (7 أيام)
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        let validTempProducts = tempProducts.filter(product => {
            // المنتجات اللي مالها expiryDate (الثابتة) نضيفها من مكان ثاني
            if (!product.expiryDate) return true;
            const expiryDate = new Date(product.expiryDate);
            expiryDate.setHours(0, 0, 0, 0);
            return expiryDate >= today;
        });
        
        // تحديث localStorage إذا تغيرت القائمة
        if (validTempProducts.length !== tempProducts.length) {
            localStorage.setItem('elixir_new_arrivals', JSON.stringify(validTempProducts));
        }
        
        // 3. دمج المنتجات الثابتة + المنتجات المؤقتة
        let allProducts = [...FIXED_PRODUCTS, ...validTempProducts];
        
        // إزالة أي تكرار (لو صدفة نفس الـ id)
        const uniqueIds = new Set();
        allProducts = allProducts.filter(product => {
            if (uniqueIds.has(product.id)) return false;
            uniqueIds.add(product.id);
            return true;
        });
        
        return allProducts;
    }

    // ========== عرض المنتجات في الصفحة ==========
    function renderNewArrivals() {
        const grid = document.getElementById('newArrivalsGrid');
        let products = getAllNewArrivals();
        let favorites = JSON.parse(localStorage.getItem('elixir_favorites') || '[]');

        if (products.length === 0) {
            grid.innerHTML = `<div class="no-products" style="text-align:center; padding:60px; background:rgba(255,255,255,0.85); border-radius:30px;">
                <i class="fas fa-gift" style="font-size:50px; color:#438e56;"></i><br>
                <strong style="font-size:20px;">لا توجد منتجات جديدة حالياً</strong><br>
                <span style="color:#666;">ترقبوا إضافاتنا القادمة!</span>
            </div>`;
            return;
        }

        grid.innerHTML = products.map(product => {
            let isFav = favorites.includes(product.id);
            const productImg = product.img && product.img !== "" ? product.img : "asset/images/placeholder.png";
            
            return `
                <div class="product-card fade-up">
                    <div class="new-badge"><i class="fas fa-sparkle"></i> جديد</div>
                    <div class="fav-icon ${isFav ? 'active' : ''}" data-id="${product.id}">
                        <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart"></i>
                    </div>
                    <img class="product-img" src="${productImg}" alt="${product.name}" onerror="this.src='asset/images/placeholder.png'">
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="price-row">
                            <span class="price">${parseFloat(product.price).toFixed(2)} ₪</span>
                            ${product.oldPrice ? `<span class="old-price">${product.oldPrice} ₪</span>` : ''}
                        </div>
                        <div class="btn-group">
                            <button class="details-btn view-details" data-id="${product.id}"> عرض التفاصيل</button>
                            <button class="add-cart-btn add-to-cart" data-id="${product.id}" data-name="${product.name}" data-price="${product.price}" data-img="${productImg}"> إضافة إلى السلة</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        attachEventListeners();
        animateCards();
    }

    function attachEventListeners() {
        document.querySelectorAll('.fav-icon').forEach(icon => {
            icon.removeEventListener('click', handleFavClick);
            icon.addEventListener('click', handleFavClick);
        });

        document.querySelectorAll('.view-details').forEach(btn => {
            btn.removeEventListener('click', handleViewDetails);
            btn.addEventListener('click', handleViewDetails);
        });

        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.removeEventListener('click', handleAddToCart);
            btn.addEventListener('click', handleAddToCart);
        });
    }

    function handleFavClick(e) {
        e.stopPropagation();
        const icon = e.currentTarget;
        const id = parseInt(icon.getAttribute('data-id'));
        const rect = icon.getBoundingClientRect();
        burstHearts(rect.left + rect.width / 2, rect.top + rect.height / 2);
        
        let favorites = JSON.parse(localStorage.getItem('elixir_favorites') || '[]');
        const index = favorites.indexOf(id);
        if (index === -1) {
            favorites.push(id);
            icon.classList.add('active');
            icon.innerHTML = '<i class="fa-solid fa-heart"></i>';
        } else {
            favorites.splice(index, 1);
            icon.classList.remove('active');
            icon.innerHTML = '<i class="fa-regular fa-heart"></i>';
        }
        localStorage.setItem('elixir_favorites', JSON.stringify(favorites));
        updateFavCount();
    }

    function handleViewDetails(e) {
        e.preventDefault();
        const id = e.currentTarget.dataset.id;
        window.location.href = `product-details.html?id=${id}`;
    }

    function handleAddToCart(e) {
        e.preventDefault();
        const btn = e.currentTarget;
        const id = parseInt(btn.dataset.id);
        const name = btn.dataset.name;
        const price = parseFloat(btn.dataset.price);
        const img = btn.dataset.img;
        addToCart(id, name, price, img);
    }

    function animateCards() {
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
    }

    // ========== حركة القلوب المتطايرة ==========
    function burstHearts(x, y) {
        for (let i = 0; i < 12; i++) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.classList.add('heart-particle');
            const offsetX = (Math.random() - 0.5) * 60;
            const offsetY = (Math.random() - 0.5) * 50;
            heart.style.left = (x + offsetX) + 'px';
            heart.style.top = (y + offsetY) + 'px';
            heart.style.animationDelay = (Math.random() * 0.2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }
    }

    // ========== دوال السلة والمفضلة ==========
    function updateFavCount() {
        let favorites = JSON.parse(localStorage.getItem('elixir_favorites') || '[]');
        const countSpan = document.querySelector('.favorite-count');
        if (countSpan) countSpan.innerText = favorites.length;
    }

    function addToCart(id, name, price, img) {
        let cart = JSON.parse(localStorage.getItem('elixir_cart') || '[]');
        const existing = cart.find(item => item.id === id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ id, name, price, img, quantity: 1 });
        }
        localStorage.setItem('elixir_cart', JSON.stringify(cart));
        
        showToast(`✅ تمت إضافة ${name} إلى السلة`);
        
        if (window.updateFloatingCart) window.updateFloatingCart();
    }

    function showToast(message) {
        const toast = document.getElementById('customToast');
        const toastText = document.getElementById('toastText');
        toastText.innerText = message;
        toast.style.display = 'flex';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    // ========== تعديل نص المشاركة ==========
    (function() {
        const originalShareHandler = async () => {
            const shareData = {
                title: 'Elixir | جديدنا',
                text: '🎁 اكتشف أحدث المنتجات الطبيعية في Elixir – أعشاب، زيوت، ومستحضرات ورد فاخرة. تسوق الآن واستشر ذكاءنا الاصطناعي مجاناً.',
                url: window.location.href
            };

            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        prompt('📋 انسخ الرابط:', shareData.url);
                    }
                }
            } else {
                prompt('📋 انسخ الرابط والمحتوى وشاركه:', shareData.text + '\n\n' + shareData.url);
            }
        };

        setTimeout(() => {
            const shareBtn = document.querySelector('.share-fixed-btn');
            if (shareBtn) {
                const newBtn = shareBtn.cloneNode(true);
                shareBtn.parentNode.replaceChild(newBtn, shareBtn);
                newBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    originalShareHandler();
                });
            }
        }, 500);
    })();

    // ========== تشغيل التنظيف التلقائي كل ساعة ==========
    function cleanExpiredArrivals() {
        let arrivals = JSON.parse(localStorage.getItem('elixir_new_arrivals') || '[]');
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        const validArrivals = arrivals.filter(product => {
            if (!product.expiryDate) return true;
            const expiryDate = new Date(product.expiryDate);
            expiryDate.setHours(0, 0, 0, 0);
            return expiryDate >= today;
        });
        
        if (validArrivals.length !== arrivals.length) {
            localStorage.setItem('elixir_new_arrivals', JSON.stringify(validArrivals));
            renderNewArrivals();
        }
    }

    // التنظيف عند تحميل الصفحة وكل ساعة
    cleanExpiredArrivals();
    setInterval(cleanExpiredArrivals, 3600000);

    // تشغيل العرض
    renderNewArrivals();
    updateFavCount();
    
    // إظهار زر المشاركة
    setTimeout(() => {
        const shareBtn = document.querySelector('.share-fixed-btn');
        if (shareBtn) shareBtn.style.display = 'flex';
    }, 300);
</script>

</body>
</html>

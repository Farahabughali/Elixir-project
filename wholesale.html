<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elixir | متجر الجملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="wholesale.css">
    <link rel="stylesheet" href="wholesale-search-modal.css">
    <link rel="stylesheet" href="wholesale-floating-cart.css">
</head>
<body>

<!-- الهيدر -->
<header>
    <div class="main-header">
        <div class="header-right">
            <div class="header-icons">
                <a href="wholesale-favorite.html" class="icon-btn">
                    <span class="wholesale-fav-count" id="wholesaleFavCount">0</span>
                    <i class="fa-regular fa-heart"></i>
                </a>
                <div class="cart-wrapper">
                    <a href="wholesale-cart.html" class="icon-btn cart-icon">
                        <span class="cart-count">0</span>
                        <i class="fa-solid fa-cart-shopping"></i>
                    </a>
                </div>
                <button class="icon-btn search-icon" onclick="openWholesaleSearchModal()">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>
        </div>

        <div class="header-center">
            <a href="wholesale.html" style="display: flex; flex-direction: column; align-items: center; text-decoration: none;">
                <div class="logo-circle">
                    <img src="asset/images/logo.png" alt="Logo">
                </div>
                <span class="web-name">Elixir| متجر الجملة</span>
            </a>
        </div>

        <div class="header-left">
            <button class="purchase-history-btn" onclick="window.location.href='orders-history.html'">سجل المشتريات</button>
        </div>
    </div>
</header>
<br><br>

<div class="container">
    <div class="filter-bar">
        <span class="filter-label"> اختر الفئة:</span>
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">الكل</button>
            <button class="filter-btn" data-filter="herbs">أعشاب طبيعية</button>
            <button class="filter-btn" data-filter="oils">زيوت طبيعية وعطرية</button>
            <button class="filter-btn" data-filter="spices">بهارات</button>
            <button class="filter-btn" data-filter="care">عناية شخصية & ورد</button>
        </div>
    </div>

    <div class="products-grid" id="wholesaleGrid"></div>

    <div class="back-home">
        <a href="index.html"><i class="fas fa-arrow-right"></i> العودة إلى الرئيسية</a>
    </div>
</div>

<div id="customToast" class="toast-message">
    <i class="fas fa-check-circle"></i>
    <span id="toastText"></span>
</div>

<button id="scrollTopBtn" class="scroll-top-btn" style="display:none;">
    <i class="fas fa-arrow-up"></i>
</button>

<!-- نافذة البحث لتاجر الجملة -->
<div id="wholesaleSearchModal" class="search-modal-overlay">
    <div class="search-modal-container">
        <div class="search-header">
            <h3><i class="fas fa-search"></i> بحث في متجر الجملة</h3>
            <button class="close-search" id="closeWholesaleSearchBtn">&times;</button>
        </div>
        <div class="search-input-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="wholesaleSearchInput" placeholder="ابحث عن منتج... زيت، عشبة، بهار..." autocomplete="off">
        </div>
        <div id="wholesaleSearchResults" class="search-results"></div>
    </div>
</div>

<script src="wholesale-search-data.js"></script>
<script src="wholesale-search-modal.js"></script>
<script src="wholesale-floating-cart.js"></script>

<script>
    // ========== منتجات الجملة ==========

            { id: 108, name: "القرفة", retail: 10, wholesale: 7, img: "asset/images/cinnamon.jpg", category: "herbs" },
            { id: 109, name: "البردقوش", retail: 13, wholesale: 10, img: "asset/images/marjoram.jpg", category: "herbs" },
            { id: 110, name: "الشمر", retail: 11, wholesale: 8, img: "asset/images/fennel.jpg", category: "herbs"},
            { id: 111, name: "العرقسوس", retail: 9, wholesale: 7, img: "asset/images/licorice.jpg", category: "herbs" },
            { id: 112, name: "القراص", retail: 10, wholesale: 8, img: "asset/images/nettle.jpg", category: "herbs"}
        ],
        oils: [
            { id: 201, name: "زيت اللافندر العطري", retail: 18, wholesale: 14, img: "asset/images/lavender.jpg", category: "oils" },
            { id: 202, name: "زيت الورد الجوري", retail: 55, wholesale: 45, img: "asset/images/rose.jpg", category: "oils" },
            { id: 203, name: "زيت إكليل الجبل", retail: 22, wholesale: 17, img: "asset/images/rosemaryoil.png", category: "oils" },
            { id: 204, name: "زيت شجرة الشاي", retail: 19, wholesale: 15, img: "asset/images/teatree.jpg", category: "oils" },
            { id: 205, name: "زيت النعناع الفلفلي", retail: 15, wholesale: 12, img: "asset/images/peppermint.jpg", category: "oils"},
            { id: 206, name: "زيت الياسمين", retail: 20, wholesale: 16, img: "asset/images/jasmine-oil.png", category: "oils"},
            { id: 207, name: "زيت البابونج", retail: 20, wholesale: 16, img: "asset/images/chamomileoil.png", category: "oils" },
            { id: 208, name: "زيت البرتقال الحلو", retail: 16, wholesale: 12, img: "asset/images/orangeoil.jpg", category: "oils"},
            { id: 209, name: "زيت الليمون", retail: 15, wholesale: 12, img: "asset/images/lemon.jpg", category: "oils"},
            { id: 210, name: "زيت الزيتون البكر", retail: 20, wholesale: 16, img: "asset/images/olive.jpg", category: "oils"},
            { id: 211, name: "زيت اللوز الحلو", retail: 18, wholesale: 14, img: "asset/images/almondoil.png", category: "oils" },
            { id: 212, name: "زيت جوز الهند", retail: 16, wholesale: 12, img: "asset/images/coconut.jpg", category: "oils"}
        ],
        spices: [
            { id: 301, name: "بهارات مشكلة", retail: 12, wholesale: 9, img: "asset/images/spice-mix.jpg", category: "spices" },
            { id: 302, name: "غارام ماسالا", retail: 22, wholesale: 17, img: "asset/images/garam-masala.jpg", category: "spices" },
            { id: 303, name: "بهارات شاورما", retail: 12, wholesale: 9, img: "asset/images/shawarma-spice.jpg", category: "spices" },
            { id: 304, name: "بابريكا", retail: 9, wholesale: 7, img: "asset/images/paprika.jpg", category: "spices"},
            { id: 305, name: "كركم", retail: 9, wholesale: 7, img: "asset/images/turmeric-spice.jpg", category: "spices" },
            { id: 306, name: "فلفل أسود", retail: 8, wholesale: 6, img: "asset/images/black-pepper.jpg", category: "spices"},
            { id: 307, name: "كمون", retail: 7, wholesale: 5, img: "asset/images/cumin-spice.jpg", category: "spices"},
            { id: 308, name: "كزبرة", retail: 6, wholesale: 4, img: "asset/images/coriander-spice.jpg", category: "spices" },
            { id: 309, name: "هيل", retail: 25, wholesale: 20, img: "asset/images/cardamom-spice.jpg", category: "spices"},
            { id: 310, name: "قرنفل", retail: 12, wholesale: 9, img: "asset/images/clove-spice.jpg", category: "spices"},
            { id: 311, name: "زنجبيل مطحون", retail: 10, wholesale: 8, img: "asset/images/ginger-spice.jpg", category: "spices"},
            { id: 312, name: "قرفة مطحونة", retail: 10, wholesale: 8, img: "asset/images/cinnamon-spice.jpg", category: "spices"}
        ],
        care: [
            { id: 401, name: "صابون زيت الزيتون", retail: 18, wholesale: 14, img: "asset/images/olive-soap.jpg", category: "care"},
            { id: 402, name: "صابونة الفحم النشط", retail: 22, wholesale: 17, img: "asset/images/charcoal-soap.jpg", category: "care" },
            { id: 403, name: "الصابون الأفريقي", retail: 28, wholesale: 22, img: "asset/images/african-soap.jpg", category: "care" },
            { id: 404, name: "صابون العسل", retail: 20, wholesale: 16, img: "asset/images/honey-soap.jpg", category: "care" },
            { id: 405, name: "صابون الصبار", retail: 21, wholesale: 17, img: "asset/images/aloe-soap.jpg", category: "care"},
            { id: 406, name: "زبدة الشيا", retail: 30, wholesale: 24, img: "asset/images/shea-butter.jpg", category: "care" },
            { id: 407, name: "كريم الورد", retail: 28, wholesale: 22, img: "asset/images/rose-cream.jpg", category: "care" },
            { id: 408, name: "جل الصبار", retail: 18, wholesale: 14, img: "asset/images/aloe-gel.jpg", category: "care" },
            { id: 409, name: "ماء الورد", retail: 15, wholesale: 12, img: "asset/images/rose-water.jpg", category: "care"},
            { id: 410, name: "الليفة المغربية", retail: 25, wholesale: 20, img: "asset/images/moroccan-loofah.png", category: "care" },
            { id: 411, name: "طين الغسول", retail: 20, wholesale: 16, img: "asset/images/ghassoul-clay.jpg", category: "care" },
            { id: 412, name: "صابون فيتامين سي", retail: 25, wholesale: 20, img: "asset/images/vitc-soap.jpg", category: "care"},
            { id: 414, name: "مقشر السكر بالورد", retail: 22, wholesale: 17, img: "asset/images/rose-scrub.jpg", category: "care" }
        ]
    };

    let currentFilter = "all";

    // ========== دوال المفضلة ==========
    function updateWholesaleBadges() {
        const fav = JSON.parse(localStorage.getItem('elixir_wholesale_favorites') || '[]');
        const favBadge = document.getElementById('wholesaleFavCount');
        if (favBadge) favBadge.innerText = fav.length;
    }

    function burstWholesaleHearts(x, y) {
        for (let i = 0; i < 12; i++) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.classList.add('wholesale-heart-particle');
            const offsetX = (Math.random() - 0.5) * 60;
            const offsetY = (Math.random() - 0.5) * 50;
            heart.style.left = (x + offsetX) + 'px';
            heart.style.top = (y + offsetY) + 'px';
            heart.style.animationDelay = (Math.random() * 0.2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }
    }

    function toggleWholesaleFavorite(icon, productId) {
        const rect = icon.getBoundingClientRect();
        burstWholesaleHearts(rect.left + rect.width / 2, rect.top + rect.height / 2);
        
        let favorites = JSON.parse(localStorage.getItem('elixir_wholesale_favorites') || '[]');
        const index = favorites.indexOf(productId);
        if (index === -1) {
            favorites.push(productId);
            icon.classList.add('active');
            icon.innerHTML = '<i class="fa-solid fa-heart"></i>';
        } else {
            favorites.splice(index, 1);
            icon.classList.remove('active');
            icon.innerHTML = '<i class="fa-regular fa-heart"></i>';
        }
        localStorage.setItem('elixir_wholesale_favorites', JSON.stringify(favorites));
        updateWholesaleBadges();
    }

    // ========== عرض المنتجات ==========
    function renderProducts() {
        const grid = document.getElementById("wholesaleGrid");
        let allProducts = [];
        
        if (currentFilter === "all") {
            allProducts = [
                ...wholesaleProducts.herbs,
                ...wholesaleProducts.oils,
                ...wholesaleProducts.spices,
                ...wholesaleProducts.care
            ];
        } else {
            allProducts = wholesaleProducts[currentFilter] || [];
        }

        if (allProducts.length === 0) {
            grid.innerHTML = `<div class="no-results"><i class="fas fa-search"></i> لا توجد منتجات في هذه الفئة</div>`;
            return;
        }

        let favorites = JSON.parse(localStorage.getItem('elixir_wholesale_favorites') || '[]');

        grid.innerHTML = allProducts.map(product => {
            let categoryText = "";
            switch(product.category) {
                case "herbs": categoryText = "🌿 أعشاب طبيعية"; break;
                case "oils": categoryText = "💧 زيوت طبيعية"; break;
                case "spices": categoryText = "🧂 بهارات"; break;
                case "care": categoryText = "🌸 عناية شخصية & ورد"; break;
            }
            let isFav = favorites.includes(product.id);
            return `
            <div class="wholesale-card" data-id="${product.id}">
                <div class="wholesale-fav-icon ${isFav ? 'active' : ''}" data-id="${product.id}">
                    <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart"></i>
                </div>
                <img class="wholesale-img" src="${product.img}" alt="${product.name}" onerror="this.src='asset/images/placeholder.png'">
                <div class="wholesale-info">
                    <div class="wholesale-cat">${categoryText}</div>
                    <div class="wholesale-title">${product.name}</div>
                    <div class="wholesale-desc">${product.desc || ''}</div>
                    <div class="price-row">
                        <span class="old-price">${product.retail} ₪</span>
                        <span class="wholesale-price">${product.wholesale} ₪ (جملة)</span>
                    </div>
                    <div class="wholesale-actions">
                        <button class="view-details-btn" data-id="${product.id}"> عرض التفاصيل</button>
                        <button class="add-wholesale-cart" data-id="${product.id}" data-name="${product.name}" data-price="${product.wholesale}" data-img="${product.img}"> إضافة إلى السلة</button>
                    </div>
                </div>
            </div>
            `;
        }).join('');

        document.querySelectorAll('.wholesale-fav-icon').forEach(icon => {
            icon.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(icon.getAttribute('data-id'));
                toggleWholesaleFavorite(icon, id);
            });
        });

        document.querySelectorAll('.add-wholesale-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const id = parseInt(btn.getAttribute('data-id'));
                const name = btn.getAttribute('data-name');
                const price = parseFloat(btn.getAttribute('data-price'));
                const img = btn.getAttribute('data-img');
                addToWholesaleCart(id, name, price, img);
                showToast(`✅ تمت إضافة ${name} إلى سلة الجملة`);
            });
        });

        document.querySelectorAll('.view-details-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const id = btn.getAttribute('data-id');
                window.location.href = `product-details.html?id=${id}`;
            });
        });

        if (window.applyFadeToWholesaleCards) window.applyFadeToWholesaleCards();
    }

    // ========== دوال السلة ==========
    function addToWholesaleCart(id, name, price, img) {
        let cart = JSON.parse(localStorage.getItem('elixir_wholesale_cart')) || [];
        const existing = cart.find(item => item.id === id);
        if (existing) existing.quantity++;
        else cart.push({ id, name, price, img, quantity: 1 });
        localStorage.setItem('elixir_wholesale_cart', JSON.stringify(cart));
        updateWholesaleCartBadge();
    }

    function updateWholesaleCartBadge() {
        const cart = JSON.parse(localStorage.getItem('elixir_wholesale_cart')) || [];
        const total = cart.reduce((sum, item) => sum + item.quantity, 0);
        const badge = document.querySelector('.cart-count');
        if (badge) badge.innerText = total;
    }

    function showToast(message) {
        const toast = document.getElementById('customToast');
        const toastText = document.getElementById('toastText');
        toastText.innerHTML = message;
        toast.style.display = 'flex';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    // فلترة
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-filter');
            renderProducts();
        });
    });

    // تأثير Fade-up
    (function() {
        const elements = document.querySelectorAll('.wholesale-card');
        elements.forEach(el => el.classList.add('fade-up'));
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });
        elements.forEach(el => observer.observe(el));
        window.applyFadeToWholesaleCards = function() {
            document.querySelectorAll('.wholesale-card:not(.fade-up)').forEach(card => {
                card.classList.add('fade-up');
                observer.observe(card);
            });
        };
    })();

    // زر الرجوع للأعلى
    const scrollBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 300) scrollBtn.style.display = 'flex';
        else scrollBtn.style.display = 'none';
    });
    scrollBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    

// فتح النافذة
function openWholesaleSearchModal() {
    const modal = document.getElementById('wholesaleSearchModal');
    if (modal) modal.style.display = 'flex';
    document.getElementById('wholesaleSearchInput')?.focus();
}

// إغلاق النافذة
function closeWholesaleSearchModal() {
    document.getElementById('wholesaleSearchModal').style.display = 'none';
}

// البحث
document.getElementById('wholesaleSearchInput')?.addEventListener('input', function(e) {
    const q = e.target.value.toLowerCase();
    const results = wholesaleSearchData.filter(p => p.name.toLowerCase().includes(q));
    const container = document.getElementById('wholesaleSearchResults');
    if (!container) return;
    if (!q) { container.innerHTML = '<div class="no-results">✨ ابدأ الكتابة</div>'; return; }
    if (results.length === 0) { container.innerHTML = '<div class="no-results">❌ لا توجد نتائج</div>'; return; }
    container.innerHTML = results.map(p => `
        <div class="result-item" onclick="window.location.href='${p.link}'">
            <img src="${p.img}" style="width:50px;height:50px;border-radius:10px;">
            <div><strong>${p.name}</strong><br>${p.category} - ${p.price} ₪</div>
        </div>
    `).join('');
});

// إغلاق النافذة بالضغط على الـ X
document.getElementById('closeWholesaleSearchBtn')?.addEventListener('click', closeWholesaleSearchModal);
// إغلاق النافذة بالضغط على الخلفية
document.getElementById('wholesaleSearchModal')?.addEventListener('click', function(e) {
    if (e.target === this) closeWholesaleSearchModal();
});

    updateWholesaleCartBadge();
    updateWholesaleBadges();
    renderProducts();
</script>
</body>
</html>

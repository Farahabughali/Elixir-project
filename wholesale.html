<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elixir | متجر الجملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="wholesale.css">
</head>
<body>

<!-- الهيدر -->
<header>
    <div class="main-header">
        <div class="header-right">
            <div class="header-icons">
                <a href="favorite.html" class="icon-btn favorite-icon">
                    <span class="favorite-count">0</span>
                    <i class="fa-regular fa-heart"></i>
                </a>
                <div class="cart-wrapper">
                    <a href="cart.html" class="icon-btn cart-icon">
                        <span class="cart-count">0</span>
                        <i class="fa-solid fa-cart-shopping"></i>
                    </a>
                </div>
                <a href="#" class="icon-btn search-icon">
                    <i class="fa-brands fa-sistrix"></i>
                </a>
            </div>
        </div>

        <div class="header-center">
            <a href="wholesale.html" style="display: flex; flex-direction: column; align-items: center; text-decoration: none;">
                <div class="logo-circle">
                    <img src="asset/images/logo.png" alt="Logo">
                </div>
                <span class="web-name">Elixir| متجر الجملة</span>
            </a>
        </div>

        <div class="header-left">
            <button class="purchase-history-btn" onclick="window.location.href='purchase-history.html'">سجل المشتريات</button>
        </div>
    </div>
</header>

<div class="container">
    <!-- فلتر الفئات -->
    <div class="filter-bar">
        <span class="filter-label"> اختر الفئة:</span>
        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">الكل</button>
            <button class="filter-btn" data-filter="herbs">أعشاب طبيعية</button>
            <button class="filter-btn" data-filter="oils">زيوت طبيعية وعطرية</button>
            <button class="filter-btn" data-filter="spices">بهارات</button>
            <button class="filter-btn" data-filter="care">عناية شخصية & ورد</button>
        </div>
    </div>

    <div class="products-grid" id="wholesaleGrid"></div>

    <div class="back-home">
        <a href="index.html"><i class="fas fa-arrow-right"></i> العودة إلى الرئيسية</a>
    </div>
</div>

<div id="customToast" class="toast-message">
    <i class="fas fa-check-circle"></i>
    <span id="toastText"></span>
</div>

<button id="scrollTopBtn" class="scroll-top-btn" style="display:none;">
    <i class="fas fa-arrow-up"></i>
</button>

<script>
    // ========== منتجات الجملة (مأخوذة من الكود الفعلي مع سعر جملة مخفض) ==========
    const wholesaleProducts = {
        herbs: [
            { id: 101, name: "البابونج", retail: 12, wholesale: 9, img: "asset/images/chamomileherb.jpg", category: "herbs" },
            { id: 102, name: "الزعتر", retail: 14, wholesale: 11, img: "asset/images/thymeherb.jpg", category: "herbs" },
            { id: 103, name: "المريمية", retail: 15, wholesale: 12, img: "asset/images/sageherb.jpg", category: "herbs" },
            { id: 104, name: "الحبة السوداء", retail: 18, wholesale: 14, img: "asset/images/blackseedherb.jpg", category: "herbs" },
            { id: 105, name: "اليانسون", retail: 11, wholesale: 8, img: "asset/images/anise.jpg", category: "herbs" },
            { id: 106, name: "الكركديه", retail: 9, wholesale: 7, img: "asset/images/hibiscus.jpg", category: "herbs" },
            { id: 107, name: "الزنجبيل", retail: 12, wholesale: 9, img: "asset/images/ginger.jpg", category: "herbs" },
            { id: 108, name: "القرفة", retail: 10, wholesale: 7, img: "asset/images/cinnamon.jpg", category: "herbs" },
            { id: 109, name: "البردقوش", retail: 13, wholesale: 10, img: "asset/images/marjoram.jpg", category: "herbs" },
            { id: 110, name: "الشمر", retail: 11, wholesale: 8, img: "asset/images/fennel.jpg", category: "herbs" },
            { id: 111, name: "العرقسوس", retail: 9, wholesale: 7, img: "asset/images/licorice.jpg", category: "herbs" },
            { id: 112, name: "القراص", retail: 10, wholesale: 8, img: "asset/images/nettle.jpg", category: "herbs" }
        ],
        oils: [
            { id: 201, name: "زيت اللافندر العطري", retail: 18, wholesale: 14, img: "asset/images/lavender.jpg", category: "oils" },
            { id: 202, name: "زيت الورد الجوري", retail: 55, wholesale: 45, img: "asset/images/rose.jpg", category: "oils" },
            { id: 203, name: "زيت إكليل الجبل", retail: 22, wholesale: 17, img: "asset/images/rosemaryoil.png", category: "oils" },
            { id: 204, name: "زيت شجرة الشاي", retail: 19, wholesale: 15, img: "asset/images/teatree.jpg", category: "oils" },
            { id: 205, name: "زيت النعناع الفلفلي", retail: 15, wholesale: 12, img: "asset/images/peppermint.jpg", category: "oils" },
            { id: 206, name: "زيت الياسمين", retail: 20, wholesale: 16, img: "asset/images/jasmine-oil.png", category: "oils" },
            { id: 207, name: "زيت البابونج", retail: 20, wholesale: 16, img: "asset/images/chamomileoil.png", category: "oils" },
            { id: 208, name: "زيت البرتقال الحلو", retail: 16, wholesale: 12, img: "asset/images/orangeoil.jpg", category: "oils" },
            { id: 209, name: "زيت الليمون", retail: 15, wholesale: 12, img: "asset/images/lemon.jpg", category: "oils" },
            { id: 210, name: "زيت الزيتون البكر الفلسطيني", retail: 20, wholesale: 16, img: "asset/images/olive.jpg", category: "oils" },
            { id: 211, name: "زيت اللوز الحلو", retail: 18, wholesale: 14, img: "asset/images/almondoil.png", category: "oils" },
            { id: 212, name: "زيت جوز الهند العضوي", retail: 16, wholesale: 12, img: "asset/images/coconut.jpg", category: "oils" }
        ],
        spices: [
            { id: 301, name: "بهارات مشكلة (عربية)", retail: 12, wholesale: 9, img: "asset/images/spice-mix.jpg", category: "spices" },
            { id: 302, name: "بهارات غارام ماسالا", retail: 22, wholesale: 17, img: "asset/images/garam-masala.jpg", category: "spices" },
            { id: 303, name: "بهارات شاورما", retail: 12, wholesale: 9, img: "asset/images/shawarma-spice.jpg", category: "spices" },
            { id: 304, name: "بابريكا", retail: 9, wholesale: 7, img: "asset/images/paprika.jpg", category: "spices" },
            { id: 305, name: "كركم", retail: 9, wholesale: 7, img: "asset/images/turmeric-spice.jpg", category: "spices" },
            { id: 306, name: "فلفل أسود مطحون", retail: 8, wholesale: 6, img: "asset/images/black-pepper.jpg", category: "spices" },
            { id: 307, name: "كمون", retail: 7, wholesale: 5, img: "asset/images/cumin-spice.jpg", category: "spices" },
            { id: 308, name: "كزبرة جافة مطحونة", retail: 6, wholesale: 4, img: "asset/images/coriander-spice.jpg", category: "spices" },
            { id: 309, name: "هيل (حبهان)", retail: 25, wholesale: 20, img: "asset/images/cardamom-spice.jpg", category: "spices" },
            { id: 310, name: "قرنفل", retail: 12, wholesale: 9, img: "asset/images/clove-spice.jpg", category: "spices" },
            { id: 311, name: "زنجبيل مطحون", retail: 10, wholesale: 8, img: "asset/images/ginger-spice.jpg", category: "spices" },
            { id: 312, name: "قرفة مطحونة", retail: 10, wholesale: 8, img: "asset/images/cinnamon-spice.jpg", category: "spices" }
        ],
        care: [
            { id: 401, name: "صابون زيت الزيتون الطبيعي", retail: 18, wholesale: 14, img: "asset/images/olive-soap.jpg", category: "care" },
            { id: 402, name: "صابونة الفحم النشط", retail: 22, wholesale: 17, img: "asset/images/charcoal-soap.jpg", category: "care" },
            { id: 403, name: "الصابون الأفريقي الأسود التقليدي", category: "صابون", desc: "صابون طبيعي عضوي يصنع يدوياً من مواد خام من أفريقيا، يعتبر غذاءً متكاملاً للبشرة والشعر.", price: 28, rating: 4.9, img: "asset/images/african-soap.jpg" },
            { id: 404, name: "صابون العسل الطبيعي", retail: 20, wholesale: 16, img: "asset/images/honey-soap.jpg", category: "care" },
            { id: 405, name: "صابون الصبار الطبيعي", retail: 21, wholesale: 17, img: "asset/images/aloe-soap.jpg", category: "care" },
            { id: 406, name: "زبدة الشيا", retail: 30, wholesale: 24, img: "asset/images/shea-butter.jpg", category: "care" },
            { id: 407, name: "كريم الورد المركز", retail: 28, wholesale: 22, img: "asset/images/rose-cream.jpg", category: "care" },
            { id: 408, name: "جل الصبار (الألوفيرا)", retail: 18, wholesale: 14, img: "asset/images/aloe-gel.jpg", category: "care" },
            { id: 409, name: "ماء الورد المقطر الطبيعي", retail: 15, wholesale: 12, img: "asset/images/rose-water.jpg", category: "care" },
            { id: 410, name: "الليفة المغربية الأصلية", retail: 25, wholesale: 20, img: "asset/images/moroccan-loofah.png", category: "care" },
            { id: 411, name: "طين الغسول المغربي الطبيعي", retail: 20, wholesale: 16, img: "asset/images/ghassoul-clay.jpg", category: "care" },
            { id: 412, name: "صابون فيتامين سي المبيّضة", category: "صابون", price: 25, rating: 4.8, img: "asset/images/vitc-soap.jpg" },
          { id: 414, name: "مقشر السكر بالورد وزيت جوز الهند", category: "مقشر", price: 22, rating: 4.9, img: "asset/images/rose-scrub.jpg" },

        ]
    };

    let currentFilter = "all";

    function renderProducts() {
        const grid = document.getElementById("wholesaleGrid");
        let allProducts = [];
        
        if (currentFilter === "all") {
            allProducts = [
                ...wholesaleProducts.herbs,
                ...wholesaleProducts.oils,
                ...wholesaleProducts.spices,
                ...wholesaleProducts.care
            ];
        } else {
            allProducts = wholesaleProducts[currentFilter] || [];
        }

        if (allProducts.length === 0) {
            grid.innerHTML = `<div class="no-results"><i class="fas fa-search"></i> لا توجد منتجات في هذه الفئة</div>`;
            return;
        }

        grid.innerHTML = allProducts.map(product => {
            let categoryText = "";
            switch(product.category) {
                case "herbs": categoryText = " أعشاب طبيعية"; break;
                case "oils": categoryText = " زيوت طبيعية"; break;
                case "spices": categoryText = " بهارات"; break;
                case "care": categoryText = " عناية شخصية & ورد"; break;
            }
            return `
            <div class="wholesale-card" data-id="${product.id}">
                <img class="wholesale-img" src="${product.img}" alt="${product.name}" onerror="this.src='asset/images/placeholder.png'">
                <div class="wholesale-info">
                    <div class="wholesale-cat">${categoryText}</div>
                    <div class="wholesale-title">${product.name}</div>
                    <div class="price-row">
                        <span class="old-price">${product.retail} ₪</span>
                        <span class="wholesale-price">${product.wholesale} ₪ (جملة)</span>
                    </div>
                    <button class="add-wholesale-cart" data-id="${product.id}" data-name="${product.name}" data-price="${product.wholesale}" data-img="${product.img}">🛒 إضافة إلى سلة الجملة</button>
                </div>
            </div>
            `;
        }).join('');

        // ربط أزرار الإضافة
        document.querySelectorAll('.add-wholesale-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const id = parseInt(btn.getAttribute('data-id'));
                const name = btn.getAttribute('data-name');
                const price = parseFloat(btn.getAttribute('data-price'));
                const img = btn.getAttribute('data-img');
                addToWholesaleCart(id, name, price, img);
                showToast(`✅ تمت إضافة ${name} إلى سلة الجملة`);
            });
        });
    }

    function addToWholesaleCart(id, name, price, img) {
        let cart = JSON.parse(localStorage.getItem('elixir_wholesale_cart')) || [];
        const existing = cart.find(item => item.id === id);
        if (existing) existing.quantity++;
        else cart.push({ id, name, price, img, quantity: 1 });
        localStorage.setItem('elixir_wholesale_cart', JSON.stringify(cart));
        updateWholesaleCartBadge();
    }

    function updateWholesaleCartBadge() {
        const cart = JSON.parse(localStorage.getItem('elixir_wholesale_cart')) || [];
        const total = cart.reduce((sum, item) => sum + item.quantity, 0);
        const badge = document.querySelector('.cart-count');
        if (badge) badge.innerText = total;
    }

    function showToast(message) {
        const toast = document.getElementById('customToast');
        const toastText = document.getElementById('toastText');
        toastText.innerHTML = message;
        toast.style.display = 'flex';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    // فلترة
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentFilter = btn.getAttribute('data-filter');
            renderProducts();
        });
    });

    // زر الرجوع للأعلى
    const scrollBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => {
        if (window.scrollY > 300) scrollBtn.style.display = 'flex';
        else scrollBtn.style.display = 'none';
    });
    scrollBtn.addEventListener('click', () => {
        window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    updateWholesaleCartBadge();
    renderProducts();
</script>
</body>
</html>

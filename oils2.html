<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elixir | الزيوت الطبيعية والعطرية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="oils.css">
</head>
<body>

<header>
    <div class="main-header">
        <div class="header-right">
            <a href="index2.html" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
                <div class="logo-circle"><img src="asset/images/logo.png" alt="Logo"></div>
                <span class="web-name">Elixir</span>
            </a>
            <a href="oils2.html" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
                <span class="page-title-in-header">الزيوت الطبيعية والعطرية</span>
            </a>
        </div>
        <div class="header-left">
            <span class="help-text"> هل تحتاج لمساعدة في اختيار الزيت المناسب لك؟</span>
            <a href="chatbot.html" class="ai-consult-link"><i class="fas fa-robot"></i> استشر الذكاء الاصطناعي</a>
        </div>
    </div>
</header>

<div class="container">
    <div class="filter-bar">
        <span class="filter-label"> تصفية المنتجات:</span>
        <select id="filterSelect" class="filter-select">
            <option value="all">الكل</option>
            <option value="عطري">زيوت عطرية</option>
            <option value="نباتي">زيوت نباتية ثابتة</option>
            <option value="للشعر">للشعر والبشرة</option>
        </select>
        <button id="resetFilter" class="reset-filter"> إعادة ضبط</button>
    </div>
    <div class="products-grid" id="oilsGrid"></div>
    <div class="back-home"><a href="index2.html"><i class="fas fa-arrow-right"></i> العودة إلى الرئيسية</a></div>
</div>

<div id="customToast" class="toast-message"><i class="fas fa-check-circle"></i><span id="toastText"></span></div>
<button id="scrollTopBtn" class="scroll-top-btn" style="display:none;"><i class="fas fa-arrow-up"></i></button>

<link rel="stylesheet" href="floating-cart.css">
<script src="floating-cart.js"></script>

<script>
    // ====== جميع الزيوت (21 منتج) ======
    const oilsData = [
        { id: 1, name: "زيت اللافندر العطري", category: "عطري", desc: "مهدئ للأعصاب، يساعد على الاسترخاء والنوم العميق", price: 18, img: "asset/images/lavender.jpg" },
        { id: 2, name: "زيت الورد الجوري", category: "عطري", desc: "مضاد للشيخوخة، مرطب طبيعي للبشرة", price: 55, img: "asset/images/rose.jpg" },
        { id: 3, name: "زيت إكليل الجبل", category: "للشعر", desc: "منشط للدورة الدموية، يقوي بصيلات الشعر، يقلل القشرة", price: 22, img: "asset/images/rosemaryoil.png" },
        { id: 4, name: "زيت النعناع الفلفلي", category: "عطري", desc: "يخفف الصداع وانسداد الأنف، منعش ومنشط", price: 15, img: "asset/images/peppermint.jpg" },
        { id: 5, name: "زيت شجرة الشاي", category: "عطري", desc: "مطهر طبيعي، مضاد لحب الشباب والفطريات", price: 19, img: "asset/images/teatree.jpg" },
        { id: 6, name: "زيت الزيتون البكر", category: "نباتي", desc: "مرطب طبيعي، غني بمضادات الأكسدة", price: 20, img: "asset/images/olive.jpg" },
        { id: 7, name: "زيت جوز الهند", category: "نباتي", desc: "للشعر والبشرة، يرطب ويغذي بعمق", price: 16, img: "asset/images/coconut.jpg" },
        { id: 8, name: "زيت الخروع", category: "للشعر", desc: "يطيل الشعر ويكثفه، ينعم الحواجب والرموش", price: 13, img: "asset/images/castor.jpg" },
        { id: 9, name: "زيت اللوز الحلو", category: "نباتي", desc: "مرطب عميق، غني بفيتامين E", price: 18, img: "asset/images/almondoil.png" },
        { id: 10, name: "زيت الأرجان", category: "للشعر", desc: "لترطيب البشرة والشعر، غني بمضادات الأكسدة", price: 35, img: "asset/images/argan.jpg" },
        { id: 11, name: "زيت الجوجوبا", category: "نباتي", desc: "مشابه لزيت البشرة الطبيعي، مناسب للبشرة الدهنية", price: 30, img: "asset/images/jojoba.jpg" },
        { id: 12, name: "زيت السمسم", category: "نباتي", desc: "غني بفيتامين E، يحمي البشرة من الشمس", price: 14, img: "asset/images/sesame.jpg" },
        { id: 13, name: "زيت البابونج", category: "عطري", desc: "مهدئ للبشرة الحساسة، يخفف الالتهابات", price: 20, img: "asset/images/chamomileoil.png" },
        { id: 14, name: "زيت الياسمين", category: "عطري", desc: "مضاد للتوتر، يحسن المزاج، يمنح رائحة فواحة", price: 20, img: "asset/images/jasmine-oil.png" },
        { id: 15, name: "زيت الورد المسكي", category: "للشعر", desc: "يقلل علامات التمدد والندبات والبقع الداكنة", price: 25, img: "asset/images/mosquerose.jpg" },
        { id: 16, name: "زيت الخروع الأسود", category: "للشعر", desc: "ترطيب الشعر الجاف، التالف", price: 16, img: "asset/images/blackcastor.jpg" },
        { id: 17, name: "زيت اللوز المر", category: "للشعر", desc: "يفتح البشرة، يقلل الهالات السوداء، تعزيز نمو الشعر", price: 17, img: "asset/images/bitteralmond.jpg" },
        { id: 18, name: "زيت الأوكالبتوس", category: "عطري", desc: "يفتح المجاري التنفسية، يخفف آلام العضلات", price: 15, img: "asset/images/eucalyptus.jpg" },
        { id: 19, name: "زيت القرنفل", category: "عطري", desc: "مسكن لآلام الأسنان، مضاد للالتهابات", price: 14, img: "asset/images/clove.jpg" },
        { id: 20, name: "زيت الحبة السوداء", category: "للشعر", desc: "يقوي المناعة، يعالج مشاكل الجلد والشعر", price: 18, img: "asset/images/blackseed.jpg" },
        { id: 21, name: "زيت الباتشولي", category: "للشعر", desc: "مضاد للفطريات، يمنح رائحة ترابية دافئة", price: 20, img: "asset/images/patchouli.jpg" }
    ];

    // ====== عرض المنتجات مع دعم العروض ======
    function renderProducts() {
        const grid = document.getElementById("oilsGrid");
        const filterVal = document.getElementById('filterSelect').value;
        let filtered = filterVal === 'all' ? oilsData : oilsData.filter(o => o.category === filterVal);
        
        const offers = JSON.parse(localStorage.getItem('elixir_offers') || '[]');
        
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="no-results"><i class="fas fa-search"></i> لا توجد زيوت مطابقة للفلتر</div>';
            return;
        }
        
        grid.innerHTML = filtered.map(oil => {
            let catText = oil.category === "عطري" ? "زيت عطري" : (oil.category === "نباتي" ? "زيت نباتي ثابت" : "للبشرة والشعر");
            let isFav = JSON.parse(localStorage.getItem('elixir_favorites') || '[]').includes(oil.id);
            const offer = offers.find(o => o.productId === oil.id && o.section === "oils");
            const displayPrice = offer ? offer.newPrice : oil.price;
            const hasOffer = !!offer;
            
            return `
                <div class="oil-card" data-id="${oil.id}" style="position:relative;">
                    <div class="fav-icon ${isFav ? 'active' : ''}" data-id="${oil.id}">
                        <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart"></i>
                    </div>
                    ${hasOffer ? `<span class="offer-badge-small" style="position:absolute; top:12px; left:12px; background:#e74c3c; color:white; padding:3px 8px; border-radius:20px; font-size:11px; z-index:5;">-${offer.discount}%</span>` : ''}
                    <img class="oil-img" src="${oil.img}" alt="${oil.name}" onerror="this.src='asset/images/placeholder.png'">
                    <div class="oil-info">
                        <div class="oil-cat">${catText}</div>
                        <div class="oil-title">${oil.name}</div>
                        <div class="oil-desc">${oil.desc}</div>
                        <div class="price-row">
                            <span class="price">${displayPrice} ₪</span>
                            <div class="btn-group">
                                <button class="view-details" data-id="${oil.id}"> عرض التفاصيل</button>
                                <button class="add-cart" data-id="${oil.id}" data-name="${oil.name}" data-price="${displayPrice}" data-img="${oil.img}"> إضافة إلى السلة</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
        
        addAdminButtons();
    }

    // ====== إضافة أزرار الإدارة ======
    function addAdminButtons() {
        document.querySelectorAll('.oil-card').forEach(card => {
            if (!card.querySelector('.admin-product-btn')) {
                const addCartBtn = card.querySelector('.add-cart');
                const productId = addCartBtn ? parseInt(addCartBtn.dataset.id) : null;
                if (productId) {
                    const adminBtn = document.createElement('div');
                    adminBtn.className = 'admin-product-btn';
                    adminBtn.innerHTML = '<i class="fas fa-plus"></i>';
                    adminBtn.onclick = (e) => {
                        e.stopPropagation();
                        showAdminDropdown(productId, adminBtn);
                    };
                    card.appendChild(adminBtn);
                }
            }
        });
    }

    // ====== إدارة الأدمن (جديدنا + عروض) ======
    function showAdminDropdown(productId, btnElement) {
        document.querySelectorAll('.admin-dropdown').forEach(d => d.classList.remove('show'));
        
        let dropdown = btnElement.parentElement.querySelector('.admin-dropdown');
        if (!dropdown) {
            dropdown = document.createElement('div');
            dropdown.className = 'admin-dropdown';
            dropdown.innerHTML = `
                <a href="#" onclick="addToNewArrivals(${productId}); return false;">
                    <i class="fas fa-star"></i> إضافة إلى جديدنا
                </a>
                <a href="#" onclick="openDiscountModal(${productId}); return false;">
                    <i class="fas fa-percent"></i> إضافة إلى العروض
                </a>
            `;
            btnElement.parentElement.appendChild(dropdown);
        }
        dropdown.classList.toggle('show');
        
        setTimeout(() => {
            document.addEventListener('click', function closeDropdown(e) {
                if (!dropdown.contains(e.target) && !btnElement.contains(e.target)) {
                    dropdown.classList.remove('show');
                    document.removeEventListener('click', closeDropdown);
                }
            });
        }, 10);
    }

    // ====== إضافة إلى جديدنا ======
   // ====== إضافة إلى جديدنا (النسخة المصححة) ======
window.addToNewArrivals = function(productId) {
    // البحث عن المنتج في oilsData
    const product = oilsData.find(p => p.id === productId);
    if (!product) { 
        showToast("❌ المنتج غير موجود"); 
        document.querySelectorAll('.admin-dropdown').forEach(d => d.classList.remove('show'));
        return;
    }
    
    console.log("➕ جاري إضافة المنتج:", product.name);
    
    let newArrivals = JSON.parse(localStorage.getItem('elixir_new_arrivals') || '[]');
    
    // التحقق من عدم التكرار
    if (newArrivals.some(p => p.id === productId)) {
        showToast(`⚠️ "${product.name}" موجود بالفعل في جديدنا`);
        document.querySelectorAll('.admin-dropdown').forEach(d => d.classList.remove('show'));
        return;
    }
    
    // تحديد النص المناسب للتصنيف
    let catText = "";
    if (product.category === "عطري") catText = "زيت عطري";
    else if (product.category === "نباتي") catText = "زيت نباتي ثابت";
    else catText = "للبشرة والشعر";
    
    // إضافة المنتج
    const newItem = {
        id: product.id,
        name: product.name,
        price: product.price,
        img: product.img,
        category: product.category,
        section: "oils",
        catText: catText,
        desc: product.desc,
        addedAt: new Date().toISOString()
    };
    
    newArrivals.push(newItem);
    localStorage.setItem('elixir_new_arrivals', JSON.stringify(newArrivals));
    
    console.log("✅ تم الحفظ، عدد المنتجات في جديدنا:", newArrivals.length);
    showToast(`✅ تم إضافة "${product.name}" إلى قسم جديدنا`);
    
    // إغلاق القائمة المنسدلة
    document.querySelectorAll('.admin-dropdown').forEach(d => d.classList.remove('show'));
};

    // ====== إضافة عرض مع تاريخ انتهاء ======
    window.openDiscountModal = function(productId) {
        const product = oilsData.find(p => p.id === productId);
        if (!product) return;
        
        document.querySelectorAll('.admin-dropdown').forEach(d => d.classList.remove('show'));
        
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        const minDate = tomorrow.toISOString().split('T')[0];
        const defaultEndDate = new Date();
        defaultEndDate.setDate(defaultEndDate.getDate() + 30);
        const defaultDate = defaultEndDate.toISOString().split('T')[0];
        
        const overlay = document.createElement('div');
        overlay.className = 'discount-modal-overlay';
        overlay.innerHTML = `
            <div class="discount-modal">
                <h3>🎯 إضافة "${product.name}" إلى العروض</h3>
                <input type="number" id="discountPercent" placeholder="نسبة الخصم (%)" min="1" max="90" style="width:100%; padding:10px; margin:10px 0; border-radius:12px; border:1px solid #ddd;">
                <label style="display:block; text-align:right; font-size:14px; margin-top:10px;">📅 تاريخ انتهاء العرض:</label>
                <input type="date" id="endDate" value="${defaultDate}" min="${minDate}" style="width:100%; padding:10px; margin:10px 0; border-radius:12px; border:1px solid #ddd;">
                <p style="font-size:12px; color:#888; text-align:right;">⚠️ إذا تركت التاريخ فارغاً سيكون العرض دائماً</p>
                <div style="display: flex; gap: 10px; justify-content: center; margin-top: 15px;">
                    <button id="confirmDiscountBtn" style="background: #438e56; color: white; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer;">تأكيد</button>
                    <button id="cancelDiscountBtn" style="background: #ccc; color: #333; border: none; padding: 8px 20px; border-radius: 30px; cursor: pointer;">إلغاء</button>
                </div>
            </div>
        `;
        document.body.appendChild(overlay);
        
        document.getElementById('confirmDiscountBtn').onclick = () => {
            const discountPercent = parseInt(document.getElementById('discountPercent').value);
            if (!discountPercent || discountPercent < 1 || discountPercent > 90) {
                showToast("⚠️ الرجاء إدخال نسبة خصم صحيحة (1-90)");
                return;
            }
            const endDate = document.getElementById('endDate').value;
            let offers = JSON.parse(localStorage.getItem('elixir_offers') || '[]');
            const existingIndex = offers.findIndex(o => o.productId === productId);
            const newPrice = (product.price * (100 - discountPercent) / 100).toFixed(2);
            const offerData = {
                id: Date.now(), productId: productId, productName: product.name,
                productPrice: product.price, productImg: product.img, discount: discountPercent,
                newPrice: newPrice, startDate: new Date().toISOString().split('T')[0],
                endDate: endDate || "", active: true, createdAt: new Date().toISOString(),
                section: "oils", category: product.category, desc: product.desc
            };
            if (existingIndex !== -1) offers[existingIndex] = { ...offers[existingIndex], ...offerData };
            else offers.push(offerData);
            localStorage.setItem('elixir_offers', JSON.stringify(offers));
            overlay.remove();
            renderProducts();
        };
        document.getElementById('cancelDiscountBtn').onclick = () => overlay.remove();
        overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
    };

    // ====== إضافة إلى السلة ======
    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.add-cart');
        if (!btn) return;
        e.preventDefault();
        let cart = JSON.parse(localStorage.getItem('elixir_cart') || '[]');
        let existing = cart.find(item => item.id == btn.dataset.id);
        if (existing) existing.quantity++;
        else cart.push({ id: parseInt(btn.dataset.id), name: btn.dataset.name, price: parseFloat(btn.dataset.price), img: btn.dataset.img, quantity: 1 });
        localStorage.setItem('elixir_cart', JSON.stringify(cart));
        if (window.updateFloatingCart) window.updateFloatingCart();
        let badge = document.querySelector('.cart-count');
        if (badge) badge.innerText = cart.reduce((s,i) => s + i.quantity, 0);
        showToast(`✅ تمت إضافة ${btn.dataset.name} إلى السلة`);
    });

    // ====== المفضلة ======
    document.addEventListener('click', function(e) {
        const icon = e.target.closest('.fav-icon');
        if (!icon) return;
        e.preventDefault();
        e.stopPropagation();
        const id = parseInt(icon.dataset.id);
        let favorites = JSON.parse(localStorage.getItem('elixir_favorites') || '[]');
        let index = favorites.indexOf(id);
        if (index === -1) {
            favorites.push(id);
            icon.classList.add('active');
            icon.innerHTML = '<i class="fa-solid fa-heart"></i>';
        } else {
            favorites.splice(index, 1);
            icon.classList.remove('active');
            icon.innerHTML = '<i class="fa-regular fa-heart"></i>';
        }
        localStorage.setItem('elixir_favorites', JSON.stringify(favorites));
        
        // تأثير قلوب متطايرة
        const rect = icon.getBoundingClientRect();
        for (let i = 0; i < 8; i++) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.style.position = 'fixed';
            heart.style.left = (rect.left + rect.width / 2 + (Math.random() - 0.5) * 40) + 'px';
            heart.style.top = (rect.top + rect.height / 2 + (Math.random() - 0.5) * 30) + 'px';
            heart.style.fontSize = (Math.random() * 10 + 12) + 'px';
            heart.style.pointerEvents = 'none';
            heart.style.zIndex = '9999';
            heart.style.opacity = '1';
            heart.style.transition = 'all 0.8s ease-out';
            document.body.appendChild(heart);
            setTimeout(() => { heart.style.opacity = '0'; heart.style.transform = 'translateY(-50px)'; }, 10);
            setTimeout(() => heart.remove(), 800);
        }
    });

    // ====== عرض التفاصيل ======
    document.addEventListener('click', function(e) {
        const btn = e.target.closest('.view-details');
        if (btn) {
            e.preventDefault();
            window.location.href = `product-details.html?id=${btn.dataset.id}`;
        }
    });

    function showToast(msg) {
        const toast = document.getElementById('customToast');
        if (toast) {
            document.getElementById('toastText').innerText = msg;
            toast.style.display = 'flex';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
    }

    // الفلتر
    document.getElementById('filterSelect').addEventListener('change', () => renderProducts());
    document.getElementById('resetFilter').addEventListener('click', () => {
        document.getElementById('filterSelect').value = 'all';
        renderProducts();
    });

    // زر الرجوع للأعلى
    const scrollBtn = document.getElementById('scrollTopBtn');
    window.addEventListener('scroll', () => scrollBtn.style.display = window.scrollY > 300 ? 'flex' : 'none');
    scrollBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    function initCartBadge() {
        const cart = JSON.parse(localStorage.getItem('elixir_cart') || '[]');
        const total = cart.reduce((s,i) => s + i.quantity, 0);
        const badge = document.querySelector('.cart-count');
        if (badge) badge.innerText = total;
        if (window.updateFloatingCart) window.updateFloatingCart();
    }
    
    initCartBadge();
    renderProducts();
</script>
</body>
</html>

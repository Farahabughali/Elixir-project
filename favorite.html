// ========== دالة عرض المنتجات المحفوظة ==========
function displayFavorites() {
    let favorites = JSON.parse(localStorage.getItem('elixir_favorites')) || [];
    const emptyStateDiv = document.getElementById('emptyState');
    const favoritesContentDiv = document.getElementById('favoritesContent');
    const grid = document.getElementById('favoritesGrid');

    if (favorites.length === 0) {
        emptyStateDiv.classList.remove('hidden');
        favoritesContentDiv.classList.add('hidden');
        return;
    }

    emptyStateDiv.classList.add('hidden');
    favoritesContentDiv.classList.remove('hidden');

    const favProducts = allProducts.filter(p => favorites.includes(p.id));
    if (favProducts.length === 0) {
        grid.innerHTML = `<div class="empty-message" style="text-align:center; padding:2rem;">⚠️ بعض المنتجات لم تعد متوفرة</div>`;
        return;
    }

    let html = '';
    favProducts.forEach(product => {
        let categoryText = "";
        if (product.category === "عطري") categoryText = "زيت عطري";
        else if (product.category === "نباتي") categoryText = "زيت نباتي ثابت";
        else categoryText = "للبشرة والشعر";

        html += `
            <div class="fav-card" data-id="${product.id}">
                <img class="fav-img" src="${product.img}" alt="${product.name}" onerror="this.src='asset/images/placeholder.png'">
                <div class="fav-info">
                    <div class="fav-cat">${categoryText}</div>
                    <div class="fav-title">${product.name}</div>
                    <div class="fav-desc">${product.desc}</div>
                    <div class="price-row">
                        <span class="price">${product.price} ₪</span>
                        <button class="remove-fav" data-id="${product.id}"><i class="fa-regular fa-trash-can"></i> إزالة</button>
                    </div>
                </div>
            </div>
        `;
    });
    grid.innerHTML = html;
    if (window.applyFadeToFavCards) window.applyFadeToFavCards();

    // ربط أزرار الإزالة
    document.querySelectorAll('.remove-fav').forEach(btn => {
        btn.addEventListener('click', (e) => {
            const id = parseInt(btn.getAttribute('data-id'));
            removeFromFavorites(id);
        });
    });
}

// ========== دالة الإزالة من المفضلة ==========
function removeFromFavorites(productId) {
    let favorites = JSON.parse(localStorage.getItem('elixir_favorites')) || [];
    const newFavorites = favorites.filter(id => id !== productId);
    localStorage.setItem('elixir_favorites', JSON.stringify(newFavorites));
    displayFavorites();
    updateFavCountInHeader();
}
  
// تأثير Fade-up البسيط
    (function() {
        // إضافة كلاس fade-up لجميع البطاقات والأقسام
        const elements = document.querySelectorAll('.oil-card, .product-card, .collection-card, section');
        elements.forEach(el => el.classList.add('fade-up'));

        // مراقب التمرير
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.1 });

        // بدء المراقبة
        elements.forEach(el => observer.observe(el));

        // إذا كانت البطاقات تُضاف لاحقاً (مثل بعد الفلتر)، استخدمي هذا السطر داخل دالة renderProducts:
        window.applyFadeToNewCards = function() {
            document.querySelectorAll('.oil-card:not(.fade-up)').forEach(card => {
                card.classList.add('fade-up');
                observer.observe(card);
            });
        };
    })();

// ========== تحديث عدد المفضلة في الهيدر ==========
function updateFavCountInHeader() {
    let favorites = JSON.parse(localStorage.getItem('elixir_favorites')) || [];
    const countSpan = document.querySelector('.favorite-count');
    if (countSpan) countSpan.innerText = favorites.length;
}

// ========== بدء التشغيل عند تحميل الصفحة ==========

<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elixir | إتمام الطلب</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="checkout.css">
</head>
<body>

<div class="hero-banner">
    <img src="asset/images/logo.png" alt="Elixir Logo" style="width: 80px; height: 80px; border-radius: 50%; margin-bottom: 10px; border: 2px solid white;">
    <h1>Elixir</h1>
    <p>جوهر الطبيعة بروح فلسطينية – أعشاب، زيوت، بهارات عالمية وعربية، منتجات للعناية الشخصية وأخرى</p>
</div>

<div class="checkout-grid">
    <!-- قسم المنتجات مع الصور والتحكم -->
    <div class="cart-section">
        <h2><i class="fas fa-box-open"></i> منتجاتك</h2>
        <div id="cartItemsList" class="cart-items"></div>
        <div id="cartTotal" class="cart-total"></div>
        <div class="note">
        ⚠️ يضاف عليه رسوم التوصيل حسب منطقتك والتي هي معتمدة من شركة التوصيل </div>
        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html" class="back-link"><i class="fas fa-arrow-right"></i> العودة إلى التسوق</a>
        </div>
    </div>

    <!-- قسم بيانات العميل -->
    <div class="info-section">
        <h2><i class="fas fa-user-check"></i> معلومات التوصيل</h2>
        <div class="form-group">
            <label>الاسم الكامل</label>
            <input type="text" id="fullName" placeholder="مثال: سارة أحمد">
        </div>
        <div class="form-group">
            <label>رقم الهاتف</label>
            <input type="tel" id="phone" placeholder="0598 000 000">
        </div>
        <div class="form-group">
            <label>عنوان التوصيل</label>
            <textarea id="address" rows="2" placeholder="المدينة، الشارع، رقم المنزل"></textarea>
        </div>
        <div class="form-group">
            <label>طريقة الدفع</label>
            <select id="paymentMethod">
                <option value="cash">💵 دفع عند الاستلام</option>
            </select>
        </div>
        <button class="btn-submit" id="confirmOrderBtn"><i class="fas fa-check-circle"></i> تأكيد الطلب</button>
    </div>
</div>

<div class="footer-policies">
    <div class="policy-badge"><i class="fas fa-exchange-alt"></i> استبدال خلال 24 س</div>
    <div class="policy-badge"><i class="fas fa-ban"></i> استرجاع ممنوع</div>
    <div class="policy-badge"><i class="fas fa-truck"></i> توصيل سريع</div>
</div>

<script>
    // عرض السلة + صور + تحكم كامل
    function renderCart() {
        let cart = JSON.parse(localStorage.getItem('elixir_cart') || '[]');
        const container = document.getElementById('cartItemsList');
        const totalContainer = document.getElementById('cartTotal');

        if (!cart.length) {
            container.innerHTML = '<div style="text-align:center;padding:40px;">🛒 سلة التسوق فارغة <br> ⚠️ أضف منتجات أولاً</div>';
            totalContainer.innerHTML = '';
            return;
        }

        let html = '';
        let total = 0;

        cart.forEach((item, idx) => {
            const itemTotal = item.price * item.quantity;
            total += itemTotal;
            html += `
                <div class="cart-item" data-index="${idx}">
                    <img class="cart-item-img" src="${item.img}" alt="${item.name}" onerror="this.src='asset/images/placeholder.png'">
                    <div class="cart-item-details">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">${item.price} ₪</div>
                        <div class="cart-item-actions">
                            <button class="qty-btn decQty" data-idx="${idx}">-</button>
                            <span class="item-qty">${item.quantity}</span>
                            <button class="qty-btn incQty" data-idx="${idx}">+</button>
                            <button class="remove-item-btn" data-idx="${idx}"><i class="fa-regular fa-trash-can"></i> حذف</button>
                        </div>
                    </div>
                    <div style="font-weight:bold; color:#2c5f2d;">${itemTotal} ₪</div>
                </div>
            `;
        });

        container.innerHTML = html;
        totalContainer.innerHTML = ` الإجمالي: ${total} ₪`;

        // أحداث الزيادة والنقصان والحذف
        document.querySelectorAll('.decQty').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let idx = parseInt(btn.dataset.idx);
                let cart = JSON.parse(localStorage.getItem('elixir_cart'));
                if (cart[idx].quantity > 1) cart[idx].quantity--;
                else cart.splice(idx, 1);
                localStorage.setItem('elixir_cart', JSON.stringify(cart));
                renderCart();
            });
        });
        document.querySelectorAll('.incQty').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let idx = parseInt(btn.dataset.idx);
                let cart = JSON.parse(localStorage.getItem('elixir_cart'));
                cart[idx].quantity++;
                localStorage.setItem('elixir_cart', JSON.stringify(cart));
                renderCart();
            });
        });
        document.querySelectorAll('.remove-item-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                let idx = parseInt(btn.dataset.idx);
                let cart = JSON.parse(localStorage.getItem('elixir_cart'));
                cart.splice(idx, 1);
                localStorage.setItem('elixir_cart', JSON.stringify(cart));
                renderCart();
            });
        });
    }

    // تأكيد الطلب
    function submitOrder() {
        const name = document.getElementById('fullName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const address = document.getElementById('address').value.trim();
        const payment = document.getElementById('paymentMethod').value;
        let cart = JSON.parse(localStorage.getItem('elixir_cart') || '[]');

        if (!name || !phone || !address) {
            alert('❌ الرجاء تعبئة جميع البيانات');
            return;
        }
        if (cart.length === 0) {
            alert('❌ سلتك فارغة');
            return;
        }

        let total = 0;
        cart.forEach(item => total += item.price * item.quantity);

        const newOrder = {
            id: Date.now(),
            name, phone, address,
            payment: payment === 'cash' ? 'دفع عند الاستلام' : 'تحويل بنكي',
            items: cart.map(item => ({
                name: item.name,
                quantity: item.quantity,
                price: item.price,
                total: item.price * item.quantity,
                img: item.img
            })),
            total: total,
            date: new Date().toLocaleString('ar-EG'),
            status: 'جديد'
        };

        let orders = JSON.parse(localStorage.getItem('elixir_orders') || '[]');
        orders.unshift(newOrder);
        localStorage.setItem('elixir_orders', JSON.stringify(orders));

        localStorage.removeItem('elixir_cart');
        alert(`✅ تم استلام طلبك رقم ${newOrder.id}`);
        window.location.href = 'index.html';
    }

    document.getElementById('confirmOrderBtn').addEventListener('click', submitOrder);
    renderCart();
</script>

</body>
</html>

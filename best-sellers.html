<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elixir | الأكثر مبيعاً</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="floating-cart.css">
    <link rel="stylesheet" href="floating-share.css">
    <link rel="stylesheet" href="best-sellers.css">
    <style>
        /* إضافة ستايل بسيط للترقيم */
        .rank-number {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #e74c3c;
            color: white;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 12px;
            z-index: 10;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-header">
        <div class="logo-area">
            <a href="index.html" style="display: flex; align-items: center; gap: 15px; text-decoration: none;">
                <div class="logo-circle"><img src="asset/images/logo.png" alt="Logo"></div>
            </a>
            <div>
                <div class="web-name">Elixir</div>
                <div class="page-title">الأكثر مبيعاً</div>
            </div>
        </div>
        <div class="ai-consult-area">
            <span class="help-text"> هل تحتاج لمساعدة في اختيار المنتجات المناسبة؟</span>
            <a href="chatbot.html" class="ai-consult-link"><i class="fas fa-robot"></i> استشر الذكاء الاصطناعي</a>
        </div>
    </div>

    <div class="best-header">
        <h1>🏆 الأكثر مبيعًا</h1>
    </div>

    <div class="products-grid" id="bestSellersGrid"></div>

    <div class="back-home">
        <a href="index.html"><i class="fas fa-arrow-right"></i> العودة إلى الرئيسية</a>
    </div>
</div>

<div id="customToast" style="display:none; position:fixed; bottom:20px; right:20px; background:#438e56; color:white; padding:12px 20px; border-radius:30px; z-index:9999;">
    <i class="fas fa-check-circle"></i> <span id="toastText"></span>
</div>

<script src="floating-cart.js"></script>
<script src="floating-share.js"></script>

<script>
    // ========== المنتجات الافتراضية (احتياط إذا ما في طلبات) ==========
    const defaultBestSellers = [
        { 
            id: 38, 
            name: "زيت اللافندر العطري", 
            price: 38, 
            img: "asset/images/lavender.jpg"
        },
        { 
            id: 6, 
            name: "إكليل الجبل", 
            price: 55, 
            img: "asset/images/rosemary.png"
        },
        { 
            id: 39, 
            name: "زيت الورد الجوري", 
            price: 185, 
            img: "asset/images/rose.jpg"
        }
    ];

    // ========== حساب المنتجات الأكثر مبيعاً من الطلبات (عدد المرات) ==========
    function getBestSellingProductsFromOrders(limit = 12) {
        // جلب الطلبات من localStorage
        let allOrders = JSON.parse(localStorage.getItem('elixir_orders')) || [];
        let allProducts = JSON.parse(localStorage.getItem('elixir_products')) || [];
        let allPackages = JSON.parse(localStorage.getItem('elixir_packages')) || [];
        
        // دمج المنتجات والبكجات
        let allItems = [...allProducts, ...allPackages.map(pkg => ({ ...pkg, isPackage: true, section: "packages" }))];
        
        // إذا ما في طلبات، نرجع المنتجات الافتراضية
        if (allOrders.length === 0) {
            console.log("📭 لا توجد طلبات، عرض المنتجات الافتراضية");
            return defaultBestSellers.map((item, index) => ({ ...item, rank: index + 1, totalSold: 0 }));
        }
        
        // حساب عدد المرات اللي انطلب فيها كل منتج
        let requestCountMap = new Map();
        
        allOrders.forEach(order => {
            if (order.items && order.items.length > 0) {
                const productsInThisOrder = new Set();
                order.items.forEach(item => {
                    productsInThisOrder.add(item.name);
                });
                productsInThisOrder.forEach(productName => {
                    requestCountMap.set(productName, (requestCountMap.get(productName) || 0) + 1);
                });
            }
        });
        
        // إذا ما في منتجات انطلبت (الطلبات فاضية)
        if (requestCountMap.size === 0) {
            return defaultBestSellers.map((item, index) => ({ ...item, rank: index + 1, totalSold: 0 }));
        }
        
        // ترتيب حسب عدد المرات
        let sortedProducts = Array.from(requestCountMap.entries())
            .map(([name, count]) => ({ name, total: count }))
            .sort((a, b) => b.total - a.total)
            .slice(0, limit);
        
        // إضافة التفاصيل الكاملة لكل منتج
        let bestSellingWithDetails = [];
        for (let i = 0; i < sortedProducts.length; i++) {
            let item = sortedProducts[i];
            let product = allItems.find(p => p.name === item.name);
            
            if (product) {
                bestSellingWithDetails.push({
                    id: product.id,
                    name: product.name,
                    price: product.price,
                    img: product.image || product.img || "asset/images/placeholder.png",
                    category: product.category,
                    desc: product.description || product.desc || product.usage,
                    totalSold: item.total,
                    rank: i + 1
                });
            } else {
                // إذا المنتج غير موجود في allItems (مشكلة)
                bestSellingWithDetails.push({
                    id: null,
                    name: item.name,
                    price: 0,
                    img: "asset/images/placeholder.png",
                    totalSold: item.total,
                    rank: i + 1
                });
            }
        }
        
        return bestSellingWithDetails;
    }

    // ========== حركة القلوب المتطايرة ==========
    function burstHearts(x, y) {
        for (let i = 0; i < 12; i++) {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.classList.add('heart-particle');
            const offsetX = (Math.random() - 0.5) * 60;
            const offsetY = (Math.random() - 0.5) * 50;
            heart.style.left = (x + offsetX) + 'px';
            heart.style.top = (y + offsetY) + 'px';
            heart.style.animationDelay = (Math.random() * 0.2) + 's';
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 1000);
        }
    }

    // ========== دوال المفضلة ==========
    function updateFavCount() {
        let favorites = JSON.parse(localStorage.getItem('elixir_favorites') || '[]');
        const countSpan = document.querySelector('.favorite-count');
        if (countSpan) countSpan.innerText = favorites.length;
    }

    function toggleFavorite(icon, productId) {
        const rect = icon.getBoundingClientRect();
        burstHearts(rect.left + rect.width / 2, rect.top + rect.height / 2);
        
        let favorites = JSON.parse(localStorage.getItem('elixir_favorites') || '[]');
        const index = favorites.indexOf(productId);
        if (index === -1) {
            favorites.push(productId);
            icon.classList.add('active');
            icon.innerHTML = '<i class="fa-solid fa-heart"></i>';
        } else {
            favorites.splice(index, 1);
            icon.classList.remove('active');
            icon.innerHTML = '<i class="fa-regular fa-heart"></i>';
        }
        localStorage.setItem('elixir_favorites', JSON.stringify(favorites));
        updateFavCount();
    }

    // ========== عرض المنتجات (ديناميكي مع الاحتياط) ==========
    function renderBestSellers() {
        const grid = document.getElementById('bestSellersGrid');
        let favorites = JSON.parse(localStorage.getItem('elixir_favorites') || '[]');
        
        // جلب المنتجات الأكثر مبيعاً (تلقائياً من الطلبات أو المنتجات الافتراضية)
        const bestSellingProducts = getBestSellingProductsFromOrders(12);
        
        if (bestSellingProducts.length === 0) {
            grid.innerHTML = `<div class="no-products" style="text-align:center; padding:60px; background:rgba(255,255,255,0.85); border-radius:30px;">
                <i class="fas fa-crown" style="font-size: 3rem; color: #438e56;"></i>
                <p style="margin-top: 15px;">🏆 لا توجد منتجات متاحة حالياً</p>
            </div>`;
            return;
        }

        grid.innerHTML = bestSellingProducts.map(product => {
            let isFav = favorites.includes(product.id);
            return `
                <div class="product-card fade-up">
                    <div class="rank-number">🏆 #${product.rank}</div>
                    <div class="best-badge">الأكثر مبيعاً</div>
                    <div class="fav-icon ${isFav ? 'active' : ''}" data-id="${product.id}">
                        <i class="fa-${isFav ? 'solid' : 'regular'} fa-heart"></i>
                    </div>
                    <img class="product-img" src="${product.img}" alt="${product.name}" onerror="this.src='asset/images/placeholder.png'">
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="price-row">
                            <span class="price">${product.price} ₪</span>
                        </div>
                        <div class="btn-group">
                            <button class="details-btn view-details" data-id="${product.id}"> عرض التفاصيل</button>
                            <button class="add-cart-btn add-to-cart" data-id="${product.id}" data-name="${product.name}" data-price="${product.price}" data-img="${product.img}"> إضافة إلى السلة</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        // ربط أحداث المفضلة
        document.querySelectorAll('.fav-icon').forEach(icon => {
            icon.addEventListener('click', (e) => {
                e.stopPropagation();
                const id = parseInt(icon.getAttribute('data-id'));
                if (!isNaN(id)) toggleFavorite(icon, id);
            });
        });

        // ربط أحداث عرض التفاصيل
        document.querySelectorAll('.view-details').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const id = btn.dataset.id;
                window.location.href = `product-details.html?id=${id}`;
            });
        });

        // ربط أحداث إضافة إلى السلة
        document.querySelectorAll('.add-to-cart').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const id = parseInt(btn.dataset.id);
                const name = btn.dataset.name;
                const price = parseFloat(btn.dataset.price);
                const img = btn.dataset.img;
                addToCart(id, name, price, img);
            });
        });

        // تأثير ظهور البطاقات
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) entry.target.classList.add('visible');
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-up').forEach(el => observer.observe(el));
    }

    // ========== إضافة إلى السلة ==========
    function addToCart(id, name, price, img) {
        let cart = JSON.parse(localStorage.getItem('elixir_cart') || '[]');
        const existing = cart.find(item => item.id === id);
        if (existing) {
            existing.quantity++;
        } else {
            cart.push({ id, name, price, img, quantity: 1 });
        }
        localStorage.setItem('elixir_cart', JSON.stringify(cart));
        
        showToast(`✅ تمت إضافة ${name} إلى السلة`);
        
        const headerBadge = document.querySelector('.cart-count');
        if (headerBadge) {
            const total = cart.reduce((sum, i) => sum + i.quantity, 0);
            headerBadge.innerText = total;
        }
        if (window.updateFloatingCart) window.updateFloatingCart();
    }

    function showToast(message) {
        const toast = document.getElementById('customToast');
        const toastText = document.getElementById('toastText');
        toastText.innerText = message;
        toast.style.display = 'flex';
        setTimeout(() => {
            toast.style.display = 'none';
        }, 3000);
    }

    // ========== تعديل نص المشاركة ==========
    (function() {
        const originalShareHandler = async () => {
            const shareData = {
                title: 'Elixir | الأكثر مبيعاً',
                text: '🏆 اكتشف الأكثر مبيعاً في Elixir – منتجاتنا الطبيعية الأكثر طلباً من عملائنا. تسوق الآن واستشر ذكاءنا الاصطناعي مجاناً.',
                url: window.location.href
            };

            if (navigator.share) {
                try {
                    await navigator.share(shareData);
                } catch (err) {
                    if (err.name !== 'AbortError') {
                        prompt(' انسخ الرابط:', shareData.url);
                    }
                }
            } else {
                prompt(' انسخ الرابط والمحتوى وشاركه:', shareData.text + '\n\n' + shareData.url);
            }
        };

        setTimeout(() => {
            const shareBtn = document.querySelector('.share-fixed-btn');
            if (shareBtn) {
                const newBtn = shareBtn.cloneNode(true);
                shareBtn.parentNode.replaceChild(newBtn, shareBtn);
                newBtn.addEventListener('click', (e) => {
                    e.preventDefault();
                    originalShareHandler();
                });
            }
        }, 500);
    })();

    // إظهار زر المشاركة
    setTimeout(() => {
        const shareBtn = document.querySelector('.share-fixed-btn');
        if (shareBtn) shareBtn.style.display = 'flex';
    }, 300);

    // تشغيل العرض
    renderBestSellers();
    updateFavCount();
    
    // الاستماع للتغييرات في localStorage (لو أضيف طلب جديد)
    window.addEventListener('storage', function(e) {
        if (e.key === 'elixir_orders' || e.key === 'elixir_products' || e.key === 'elixir_packages') {
            console.log("🔄 تم تحديث البيانات، إعادة تحميل الأكثر مبيعاً");
            renderBestSellers();
        }
    });
</script>

</body>
</html>
